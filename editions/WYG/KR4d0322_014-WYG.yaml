body:
  text: 滄洲塵缶編巻十四宋程公許撰䇿問試閤職䇿問聖人以天下為一家以中國為一人方其文軌之同而聲教之無不被也庶土交正登載於禹貢之書串夷載路洋溢於周雅之詠奚必地險以為固而闗塞以為阻乎然王公設險以守其國素具於習坎之彖辭而重門擊柝以待暴客黄帝堯舜已有取乎豫備之義則因險以為守固天地自然之勢而先事以制變亦有國者之所不可忽者乎自今觀之裂土以封建王畿不過千里而君尊臣卑内中國而外夷狄分位森著民物無不適其安意者公天下而不以為一已之私故能長治而久安耶自小雅盡廢中國始困於四夷之交侵阡陌開井田廢罷侯置守合天下以奉一人富無倫貴無敵矣而天下之變常伏乎人之所不慮由秦漢而下以及隋唐理亂廢興先後一轍然則先王公天下之意不亦思之熟而計之審歟我國家自建炎南渡事體適與吳蜀東晉同然孫呉不能并蜀蜀不能兼吳而荆州則三國交争彼此未嘗全有其勝勢也東晉立國蜀境已不𨽻職方桓温尅復旋得旋失終晉之世經理中夏落落難成天下大勢離之易而合之艱抑亦有數存焉茍人為之不周而一諉之於數可乎孔明之初見昭烈也首論荆州北據漢沔利盡南海東連吳㑹西通巴蜀為用武之國此特為昭烈畫取荆州計耳而異日蒋琬亦謂東西并力首尾掎角雖未能速得如志且當分裂蠶食先摧其支黨則二相所見固畧同矣曷為而昭烈下峽為羽報讐孔明明知其不然而不以諫乃追悼於已死之法孝直乎魯肅吕䝉皆孫氏智謀之臣也肅欲撫羽與之同仇及䝉為之代遂欲急取羽以全據長江羽斃而南郡並為䝉有吳之形勢張矣然鼎足屹峙併力掎角之始謀不可復就蜀固失之吳亦豈為善計乎抑孔明琬肅猶未忘驅馳於中原而䝉之志不過盡有長江以為守乎庾元規事晉以興復自任表其弟懌為梁州刺史鎮魏興翼為南郡太守鎮江陵陳囂為梁州刺史趣漢中遣參軍李松攻巴郡江陽若有意連綴荆蜀而名浮才短妄意乎神州之圖石城未徙而邾城先陷則其所謂蜀弱胡强先有事於趙者無乃攻堅攻瑕先後之不審耶亮死而翼繼之戎政嚴明經畧深逺滅胡取蜀意向已定襄陽移鎮不為失䇿向使家國情事未至嬰懐天假之年積榖繕軍克奮後舉詎知其不能取蜀以圖趙乎厥後桓温以雄材英略談笑取蜀如振槁遂由江陵襄陽趣武闗别命司馬勲出子午道軍威之振前所未有然渡㶚水而不至長安則温之失也秦堅之入寇也東西萬里水陸齊進而蜀漢之兵亦順流而下使非淮淝奏捷之神速則江左事力寧不艱扵運掉由是言之吳荆蜀連衡之勢可全而不可虧可合而不可散也審矣雖然吳蜀依山阻水劉備有雄才諸葛亮善治國孫權識虛實陸遜見兵勢據險守要汎舟江湖皆難猝謀此賈詡為魏主慮也謝安桓冲江表偉才君臣和睦上下一心未易可圖此權翼為秦堅謀也據此而論則立國雖以山川為險而非人才以為之用則地險其可専恃乎今日蜀境已空而猶幸其未為敵據荆州孤立而猶幸其能為我守然漢中門户久為彼家計之儲襄樊喉衿又為彼蹈藉之久以今鑒昔猶可得而支綴否乎夫孔明用一隅之蜀連嵗出師而人不告勞不過曰賞罰必信開誠心布公道顧雍逺不逮孔明亦能以江東數十郡抗全魏之師不過曰選用文武将吏隨能任使若夫王導寛和得衆歴事三帝備歴艱難而遂能立國江左者一百年謝安石以徳度鎮物處分素定從容應敵而終能奏捷淮淝克永晉祚大抵守邊禦敵雖託之疆塲之臣而制勝折衝當屬之廟堂之上事不素備謀不素講人才不素蓄視敵之來去以為欣戚茍以之撐拄目前可也若夫扶顛持危而自任以天下之重者夫豈無其道耶蜀将如闗張龎統吳将如周瑜魯肅志長命短天下重惜之而馬超黄忠趙雲費禕吕䝉程普歩隲甘寧輩皆智勇絶倫足以當一面魏延驍勇欲以竒兵間道與大軍㑹孔明信用其説安知三秦之不歸於漢而陸遜抗父子謂夷陵為國之西門如其有虞當傾國争之其精識逺慮卓然有大過人者何吳蜀将才之富也夫古之所謂名将者要必挾才畧渉史傳臨機料敵知彼知己而不但以一鬬為能事一勝為絶人不然碌碌庸材㧞起行伍而屬之以三軍之司命不亦殆乎哉古今同是天下也而人才之乏若此可不思所以作新之乎曹公破荆州下江陵有席巻江東之志迎拒之説未决周公瑾遽畫四䇿與劉葛併力破之赤壁之下魏使至吳張昭折其驕蹇使退而有江東将相豈能下人之嘆而鄧芝之為蜀報聘於孫氏也從容應答并魏之後王未識天命則戰争方始専對之才若是敵情烏得而不攝國威烏得而不張而典午過江中外大臣惟知厲兵秣馬為禦寇之謀而未嘗啟口及一和字人心未泯於正理故能轉弱以為强茍邊備不輯於平時狡謀輕信於黠敵以堂堂之中國而甘心為讐人役曽是為得計乎二君學自聖門思以才奮習孫吳韜畧以擢上第惟朱華剏置舍人之員阜陵所以寵異右科為将帥儲材也掖垣給札邦有故常其以今日之事機參之方䇿之成敗條析派别明著於篇昔司馬徳操有云儒生俗士豈識時務識時務者當在俊傑願從二君質其所以然有司當第以獻試上舍生䇿題己亥秋湯之盤有銘武王受太公之戒所御器物咸有銘古先哲王明睿生知道徳純備一動息一顰笑無非天理之流行而戒謹恐懼其嚴若此豈人心之易於弛雖聖人亦不可一日而忘其規警耶唐太宗以十漸不克終之疏列屏障以自省後世稱之曰賢君明皇以山水圖代無逸圖開元天寳之理亂以判敬肆勞逸一念之嵳信可畏耶我國家自藝祖造邦欽重儒學太宗繼之盖用意於稽古禮文之事嘗書孝經勒碑於祕書監又自以聖意製座右欹器真宗為之論所御玉宸殿儲經史八千巻不雜他書仁宗在御嵗久孫奭所上無逸圖揭之講閣聖徳光大謹終如始哲宗以吕公所纂尚書論語孝經要義百篇書寫觀覽又用吕大防之奏圖仁宗三十六事於坐隅髙宗中天投戈講義而九經皆手書石刻孝宗嗣服亦於清燕之所掲敬天之圖奕葉繼承心法相授以至於我皇上甫登大寳即營緝熙殿髹漆金刻為座右銘罷朝則御講帷閲章疏寒暑不輟一十六年於兹矣頃又摘六經之有闗於天道者章分句析親御翰墨為敬天十二圖製叙䟦係其顛末步趨乎祖宗之典訓規範乎聖賢之格言仍命道山摹勒琬琰斯文之重天下之福也季秋吉日辛夘九筵穆卜先期申警蔬食齋居言欵清宫凍雨飄灑祼饗世室隂凝未舒逮羽衛導行玉輅趣駕雲翳一掃晴景四開都人駢首以觀天仗之森嚴天顔之肅穆而後喜可知也丙夜禁門啟鑰臣工駿奔上端冕入就次月星明朗樂舞和愉穹示顧歆克竣熙事頒賀肆赦典儀備舉質以前三嵗烈風雷雨之變異思成之慶寧易致耶豈敬天圖之作忱念孚格不専於犧牲玉帛之薦乎天人相與之際殆未可以私意測然以上之遜志典學豈今之寅畏而昔乃不然乎意者鼎雉申戒雲漢懼災天固以是啟商周之中興與不然隂晴轉移於飜覆手間雖父母之於子訓告保恵亦不如是之懇惻也善言天者必有以證於人璿璣玉衡以齊七政舜之察天文以審已之當天心與否也二曜薄蝕五緯錯行日官所書殆無虚月則乾象之失其軌豈無其故歟地平天成六府三事允治禹之治水以九疇彛倫之敘而成功也炎官甫戢海若加横隄揵衝决生民昏墊則五行之失其性亦豈無所兆歟致中和天地位萬物育盈宇宙之間有一物不得其所君人者之責也旱魃肆虐飛蝗遺種近畿一稔㡬出天幸東浙薦饑寧無後憂則玉燭之不調得無有任其咎者歟春秋謂一為元外吳楚而内中國小雅盡廢則吳楚交侵而中國微聖人之所憂也今敵既滅兵備不輯國威不張疆土日蹙則天道之助順何乃寂無其應歟雖然氣運之有盈虚物理之有信屈如前所述猶可諉之造化以俟天定至於人事之與天理參者抑亦有當議焉無曠庶官天工人其代之今班序布滿簪弁森列若不乏才也而白駒空谷猶不免於金玉其音經營四方或無預於出入風議則好惡之拂人性無乃枉直有未辨耶天佑下民作之君師今赦宥數頒寛恤有詔若不忘吾民也而中洲鴻鴈四境之流離莫救魴魚頳尾内地之根本日撥則載舟覆舟之可畏無乃思慮有未及耶洪範八政食貨為先今公私儲積匱於軍興而縣官之費用不為之裁損風俗之僭奢不為之限量楮幣日濫増錢不已銅鏹日耗銷毁莫戢節以制度豈無術以救其弊耶王公設險法象天地今襄漢形勢荒殘日久淮蜀奥壤䖍劉幾盡閫制角立遇敵而莫相為援兵将怯懦濫賞而未嘗加罰折柳樊圃将何䇿以起其弱耶天意之未孚者既如彼人為之未至者又如此反覆參騐則禋祀之饗祐固可以覘悔禍於上蒼而徳政之有闕恐未足以銷咎徴於既往或謂上之篤意務學小心事帝非不恭且恪也而隂陽家所謂百六之數適相參㑹其交度也固有時九曜運行迭相盈縮其進退也自有序審如是則恵廸吉從逆凶如影響惟先格王正厥事乃為虚語乎諦觀敬天之圖心畫謹嚴先後如一退朝燕坐聲色翫好决莫能為徳性之移而道途竊議尚有過於責難者皇自敬徳要不必以人言為忤而益當以髙明光大加之意非茍知之亦允蹈之無徇其名而既其實則怨汝詈汝其有補於學問者不既多乎天不逺人隨念昭格聖學就将而不已聖徳日新而又新易危為安用祈天永命豈不同此一機耶諸君詠皇化於辟雍之涯歴嵗滋久菑畬經籍佩服禮義銖積寸累由是而升堯舜君民乃無負於所學豈特區區為利禄温飽計哉其探索天人性命之源發揚帝王心法之奥有可以匡世屯禆聖治者正學以言有司将㧞其尤以獻於上箴敬天圖箴臣公許恭覩陛下尊御宸極十有六載究心圖治食息靡遑退御緝熙尚以燕閒摘六經之訓有闗於省躬修行弭災兆祥者親御翰墨纂為十有二圖繫以聖製序䟦揭諸殿幄仍命祕館摹刻堅珉㑹季秋吉辛肇禋重屋先期蔬食備整齋荘欵謁道祖入太室祼隂雲閣雨綏我思成玉輅戒嚴羽衛森列晴曦穿漏塗潦以乾逮中夕皇帝入自崑崙素壁流空珠緯交粲天顔肅穆不懈益䖍端冕危立以須拜貺辟公左右樂舞和懌望燎而退班賀紫宸移仗御樓肆大宥於天下嘉氣布濩歡聲翕合較以嵗丙申雷雨之異兹為慶成無疑矣嗚呼敬與肆一念之分而影響之不爽若是天逺人乎哉臣以卑鄙供職於著庭郎省被過誤之寵復使分直掖垣奎壁之光焜燿凡目而跪奉祝冊又得覩禮容之盛職在議論文墨責難陳善不當以菲拙廢用採虞人之遺意拜手稽首裁成敬天圖箴一篇昧死獻之闕下寸忠毣毣望陛下以天戒之不可忽天庥之不可玩晝思夕惕致知力行拯天歩之艱用祈天永命臣公許不勝拳拳伏惟睿慈俯賜採擇箴曰莫髙者天蒼蒼其色孰主張是以生以殖名之曰帝統御三極帝何言哉疇得而測何視聴自我民而降災祥在徳王受天命作民父母民之戚休即上帝喜怒無曰不可俄而度監觀有赫無曰不可階而升不顯亦臨在昔帝王允蹈斯理無一步而非靈承無一念而非顧諟惟時惟幾相儆於有虞之朝夙夜毖祀申戒於成周之世於穆我后亦惟鑒兹念天命之難諶永言保之垂拱御朝緝熙清燕一十二圖經訓之鉤纂百千萬言心畫之精贍以内省致其粹精以力行體其剛健嚴恭奚待於圭幣之執馨香豈専於黍稷之薦嗚呼惟命之申以徳克配惟徳之配匪學則怠載籍所傳成憲斯在自後世之道學不明而先王之心法斯晦祠官祕祝之除五畤路車之増孝文非不知秉心之祗肅夫何神氣集為五彩玉杯刻曰延夀乃誤以譎詐為可慿美氣浮雲陽之壇白雲出肅然之封世宗非不知備物以尊崇夫何寳鼎神䇿之授白玉鏤牒之祕乃妄意於神人之通斯皆悖經籍之訓惟異學之宗茍祭祀之黷奚祉福之䝉我祖宗則不然酌情文而益損圓丘之柴燎有取乎郊特牲九筵之禋享匪殢於公玉帶翼翼一忱洋洋如在曽孫篤之十有六期被衮冕以見上帝五宗祀而一郊祠往在丙申祼太室而景氣明霽胡烈風雷雨大警於登謌合享之際乃今嵗秋謁清宫而霧雨慄慘胡璧月珠星輝映於壇陛陟降之宵得非遇晴而喜喜則肆而敬心弛敬心一弛帝動威而警之以抑畏因雨而懼懼則戒而聖心悟聖心一悟帝鑒觀而賚之以眷顧故曰惟上帝不常作善降之百祥作不善降之百殃又曰天之所助者順人之所助者信位乎兩間奈何不敬勿謂日月薄蝕星曜錯行為躔度交㑹之常徳政失則謫見三光勿謂旱乾水溢陽愆隂伏雖盛世所不免徳政失則兆為災變勿謂已往之咎證可置而勿問譴告所加曷嘗虚其應勿謂晴景之協禱可卜於眷祐怠忽一萌或移為眚咎相古之人樂不忘憂已治若未治雖休弗敢休其在於今可弗深戒外焉强敵之慿陵内則百度之蠱壊渉大水罔知津涯寝積薪厝火其下是宜念辛螫之徴可不聞善言而拜欽哉莫見乎隠瞻威咫尺莫顯乎微舉足千里無徇其名而汩其真無縟於文而薄於誠蠖濩蜵蜎必如我将我享之不敢愆嚮晦入息必如在廟在宫之不敢斁天命不已謹終如始天命不易罔俾失墜位曰天位保之以祗畏禄曰天禄守之以謙牧天官不可任非才以瘝厥職天爵不可牽私恩而厚親昵天民所當矜毋若楚茨之傷吾仁天倫所當睦盍念角弓之親九族禮曰天秩其謹察於内庭崇卑之式罪則天討其無忘於淮蜀䖍劉之暴敢言之氣伸猶埃氛不能滓天徳之清明蠧財之穽窒猶妖眚不能癘天産之民物國勢之弱可强當若威弧之射天狼國威之僨可植當如列星之拱天極於戲敬天有嗇應天以實一念感移桴鼓其疾胡不觀申公之説顧力行何如荀卿之言真積力久則入敬則日强學則日益方寸湛然與天為一天心克享天變乃息天步斯寧天休其格於萬斯年子孫千億小臣司文伸紙濡筆敢告丞弼所其無逸偈上後溪劉閣學以金銀字金剛經説偈恭以某官先生繇大乘果伍應縁示現福慧具足慈威雙運與佛菩薩同一妙明就養五綿載逢初度夀開九袠神清氣和且内梱夫人設帨紀祥甫後十日備福昌熾榮耀緌紳某幸以三生香火縁親䝉授記被檄劒外阻於稱觴大人以舊藏金銀字大士頌金剛經一軸命某為先生夀敢託此述成偈語一篇少伸善頌如來藏有大經巻無古無今無成壊巻之可納一毫端舒之彌綸於法界衆生與佛同受持謂有定法便虛假祇園食飽洗鉢坐何曽有意一塲話空生强起鑿太虚立字安名為般若三十二相不可著况有卵胎并濕化要知人與法俱空何須到岸筏方舍雙林大士更周遮來對蕭翁閒拍報至今唱頌四十九同此經傳四天下稽首後溪老尊宿第一義諦最深解以宿誓願悲濟心具堅固力清浄戒父子孫曽一道塲良窳精粗大爐冶綵衣堂上春融融後先十日㪺夀斝耆齡天為開九袠後學心知宗大雅吾親千里意勤劬授我軸書字端楷金銀絢爛滿雲藍是不誑語真語者鬼神祕䕶知幾年持以夀翁翁勿詫願翁覺性日圓明願翁眉夀備純嘏如金剛體不可壊以大方便福朝野亦願吾親夀似翁嵗嵗持觴拜堂下鴈湖先生揆初在旦某以家藏唐畫熾盛光如來像一軸祝先生夀稽首説偈云十方世界香水海如微塵數無邊億諸佛各以本誓願遍坐道塲作饒益稽首兩足熾盛光具有廣大神通力剛風其上羅諸天日月星宿與梵釋手持宫殿充妙供雨香花雲作嚴飾慈悲為車衆寳聚載以萬行波羅蜜周游三界一彈指善行何曾有轍迹我曽禮足持祕呪寳繪偶得唐人筆素縑一幅幾斷爛丹青慘澹古顔色巍巍趺坐寳蓮臺冠佩環趨星拱極未論畫手入何品成壊難以有相詰龍天守䕶敢不戒一㑹靈山儼如昔恭惟鴈湖老尊宿佛地位人人不識偶年與世作依怙意倦還歸弄泉石願持畫本祝修齡往與浄名分半席刀兵之刼遍大地三界同聚一火宅要須開士運悲心立大津梁拯羣溺豈同小乘専利已塊守空山縛禪寂金輪慈光耀今古願與我公占夀籍向來摩頂經授記堅拂許令親入室夜深急雪欲齊腰少室巖前好消息
