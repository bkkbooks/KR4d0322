body:
  text: 滄洲塵缶編巻十宋程公許撰七言律詩溪亭春日二首借屋三間俯近郊溪流如練繞蘭皋聊同彭澤歸栽菊肯向𤣥都問種桃别久心情渾漫浪相㸔鬚髪轉蕭騷只因舊學荒尤甚政藉談餘為櫛薅極目青天蜀道難無因長坂得聯驂思鄉浪費腸囘九行世何妨臂折三楊栁風微生百媚棠梨晝永帶餘酣天涯猶賴春娛客那得鄰山寄一菴丙子寅月九日五鼓夢餘憶舊作因用韻業識縈牽豈自由幸逢此刧在儒流昏昏心似未磨鏡役役身如不纜舟聞道無縁時已晚養生欠術鬢先秋向平可謂真男子家事無闗五嶽遊立秋後三日得二侄并侄孫家書萬里書來印籀紅慰情何但萬金同懸絲性命幸存活掃地生涯甘阨窮老去憂心長似醉秋來衰鬢亂飛蓬故園未有西歸日且願平安信數通施明可自湘潭還霅川以詩編相示摘其中重陽一篇次韻題似明可勌游何似雁隨陽愁緒知添幾線長歸路驛梅多未破吟邊汀芷藹餘香寄聲鷗鷺舊同社可奈鷖鳬紛着行乞與東風一吹送偃松猶及共流觴重陽即事爛漫三年藥市遊飢驅忽到字江頭凄凉風色欄干暮靉靆晴雲䆉稏秋紅葉不知人恨逺黄花慣與客供愁諸君正爾癡官事誰共髙吟百尺樓題秋芳菊蝶圗故山嵗嵗霜秋杪手折黄花岸接䍦粉蝶笑窺人老大玉蛆撩動句新竒雨荒靖節醉吟處風亂韓慿飛舞時卧展新圗續歸夢晚香有味我同誰子思賦中秋翫月詞借韻作詩山路相呼游冶盤何妨月下更追歡情知一夕秋無價㸔徹三更酒未䦨衰鬢侵愁羞自照囘腸索句大應難可能散髪扁舟去一到垂虹亭上㸔以梨橙寄景韓景韓有詩來謝因和韻奉答離腸不耐食張梨併裹橙金遣使齎薄饋羞同園吏菜好詞空費外孫虀含消漢苑夢頻渇霜落洞庭書續題莫遣楚嬌多勸飲怨歌難解太常妻和洪司令春日客懐二首寂寂春愁何許來詩翁得句凌歐梅一百五日火將換二十四風花遞開玉壘新詩未題遍鏡山歸夢寧須催人生田舎差足樂我亦欲尋榿木栽好風排闥錦囊來咀味真如渇望梅櫻筍算無多日事棠梨約有幾分開社醅熟倩提壺勸春種忙應布榖催早願時清歸亦好小山幽桂賸須栽和可道約同館於都統衙至理𤣥同孔老瞿客塵覺似漸消除一生嚼蠟有餘味兩載離家能幾書君已灰心參祖意我猶滯相問童初寳巖不作桑間戀榆館能來慰索居謝檢閲牟存叟袖啟相訪井絡西瞻刧火殘天涯執手語含酸鄉人為把子虛誦國典能推良吏難老我棲遲同燕雀送君翔翥上鴛鸞長風借與還鄉便猶喜白鷗盟未寒為王山尹子渚賦潛齋末句寄聲葉新之斯文宗緒自河南妙處元非故紙鑽萬里夢歸伊闕逺一牕静對玉峰攢林深霧豹南山隱海濶風鵬北溟摶刻楮自憐無一補寫心寄與故人㸔彦尹姪追送至南江猶子匆匆遽索違三甥小住未為非追隨寛作一程計摻執那知幾嵗歸唳鶴警寒排字密浴鷗嬉暖着羣飛物情撩我離情黯射䇿催來覲日畿送葉鎮之釋褐授信州推官歸台州天涯一見便綢繆二十年間詫兩優不以聲名誇衆雋欲將文行輩前修懐章趂酌椒觴夀分幙還尋璧水游蜀客念歸歸路梗卜鄰儻許傍丹丘别凌雲士友三生縁法熟嘉州乗興俄成十月留山水縱觀方得趣交朋莫逆忽抽頭淋漓張飲梅花岸慘淡分攜杜若洲恨欠白崖陪杖屨春風和暖及同游别謝徳芳艤棹江干得欵留曾將避世與君謀誰知事變即勘定端藉儒先寛顧憂分陜續書勞㑹計借籌偶暇語綢繆分攜竟作春風約梅驛瞻雲黯暮愁别帥垣登舟泝江暫來偶作兩旬留下榻慚非孺子儔西閣夜䦨猶跋燭北嵒晩霽趣歸舟髙城囘首烟波暝短棹支頤水國秋嵗晚束書岷下去梁園空復羡枚鄒和喬擇善别若水韻尼嶺飈遊不可期寥空無路寄幽思階蘭競秀有誰省貝錦傷讒徒爾為黙坐勿書殷浩怪擬騷休作楚臣悲君㸔雪澗凌霄幹長有􅆴􅆴緑滿枝沙津連日風雨阻行舟發即晴寄李成之江陵五日惡風雨知我欲行舒小晴渺渺雲沙連恨逺𡨕𡨕烟樹喚愁生上牢下牢險入夢東瀼西瀼詩有聲同是天涯更分手銷魂風月與誰平虛舟相逐至岳陽録示舊日避風詩和韻紀事繫船三日風當止雨欲逗晴雲亂飛沽酒店家都是薄買蔬山市晩方歸客裝淹速信難料友社歡諧知可依喚起元真共心賞桃花流水鱖魚肥得臺檄視堰至上皇設黄籙㑹親友自逺而至者孫承父表兄用晦弟彦威有年彦尹彦濟四姪勝父王甥虛中句甥司馬行父宗人季然共十七人次日首途久雨開霽肅敞芝壇大面峰擬慿方寸遡璇穹夜牕滴盡三更雨曉霧吹開萬壑風孤鶴肯來隨伴去十龜相逐賞心同未應佳氣髙臺擅一覽西岷面勢雄成都踰旬隂冷深冬時節借館超悟得子敬徳夫二兄相晤語差慰寂寥屯隂不動紫金盤三月凄風横作寒待旦重衾纔得暖感時對酒祇長歎黑雲何日三舍避黄道中天萬目㸔不有對床清夜語客懐何以解憂端送道傳姪補中國學二首竹林挺挺固多賢子更姱修鼎盛年一縷千鈞扶世緒三條八韻壓儒先辟雍振鷺翔而集幽谷鳴鶯自此遷可但積分縻好爵事須學識細磨研氷霜一節感親恩褒詔東來耀里門孝敬自能通造物否臧勿用較煩言靈椿未老須三釜折桂歸來共一尊須信倚門朝夕望未容六館駐何蕃余拉威濟取山路歸家用光獨泝江再和見貽仍同賦冠藤衣葛自蕭閒嵒壑精神繪畫難着脚兎庭聊試險同盟鷗社未應寒快晴山色凝朝采急雨江流吼夜灘近日詩情差覺勝賸加礲錯怕人㸔遊中巖晴烟如春尤覺林壑之勝也晴嵐煗翠中巖寺十二年間得再遊三筍龕深香不散萬松山擁霧難收鷲峰付囑雖常住雁蕩經行豈易求欲識老師真面目白雲深處澗泉流陪尚書遊中巖夜大風雨尚書及任卿史石泉皆耆年徳清諧季并余以晩輩侍中天臺殿倚竛竮憶昨深登六嵗零霧鎻巖扉須玉鑰雲扶革履上青冥三峰静對厖眉秀雙璧驚囘醉眼醒風雨三更龍象集祖師意㫖付誰聽泛舟登弁山祥應宫之絶頂望太湖窺黄龍洞過倪尚書雲巖蘋浪蹴帆移别浦筍輿邀我度遙岑雲開震澤水銀溢風掠洞庭螺翠深神井千尋龍起蟄幽巖四面石成林蘇仙詩句倪公賦倪尚書有雲巖賦萬古清風僭嗣音道山諸丈置酒飲餞秀埜園以詩謝别去國飄然一障乗都門祖帳集華簪黄梅未雨熱如沸白葛當風凉滿襟江國頗堪千里寄蓬山遙想五雲深論思禁闥須公等肯念交盟數寄音遊道何二山晩飲倪氏玉湖草草盤蔬一酒壺虎巖小憩轉金輿静觀生物春風裏笑拂詩牌刧火餘余有舊題一詩牌火後尚存寺僧掲之雲峰閤散䇿松隂寒悄悄擷香梅逕雪踈踈歸航未迫西山暮碧浪湖邊㸔網魚馬當山往事空聞傳記誇石磯依舊鎻晴霾定知貝闕通溟極誰着叢祠倚斷崖乞與一帆風借便應憐萬里客傷懐文章有體神知否霞鶩雖工語類俳夜過馬當山獨載詩書趂野航自憐漂泊度時光殘年準擬登牛首連夜匆忙過馬當古廟荒寒江浸影斷崖悽慘石凝霜壯懐未分甘衰老囘首長懐恨更長廬山雪倚天無數玉巉巖心覺廬山是雪山未暇雙林尋净侣試招五老對蒼顔逺遊借問有何好勝賞何曾容暫閒却恨此生雲水脚誤隨人去踏塵寰姑蘇臺館娃陳迹久蓬蒿留得蘇臺數仞髙隔水雲山青斷絶繞城溝蕩碧周遭遙憐讓國清風逺忍見連艘戰血鏖滿目凄凉千古事長洲仍舊栁如繅絶勝亭入眼江郊杜集中勝游何必恨匆匆糢糊樹木丹青古詰曲汀沙篆籀工昬曉之分含一氣乾坤底處是全功西南佳境冥搜遍總合亭前立下風題江東陳氏江亭漁艇閒撑過水東亂雲含雨晚溟濛絶憐郊墅依林壑更拓軒牕貯竹風剰與烟波開靄杳却須菑翳略踈通閒居可忍虛吟嘯載酒來時社友同題巴東縣秋風亭萬山寂寂巴東縣千古堂堂冦長官野水可無詩問訊秋風長對淚汍瀾著樓無地儘渠詫折箠立功非我難君㸔公安一梢竹向來許國寸心丹同楊景韓飲虞獻子江亭用壁間文與可韻晴灘屬玉翫烟霏照眼琅玕碧四圍堂䕃白茅娛子美江吟净練憶元暉誰家鼔吹觀遊去何處笭箵罷釣歸尚想江南圗畫裏風帆夜落道人磯自七曲祠下乗馬至上亭二首征鞍不怕朔風顛攬盡魚鳬氣脉全秦嶺劒攢青不斷潼江帶小碧相連五雲樓殿元皇宅一柱西南半壁天分職幽明兩無愧玉闗快馬洗風烟仗衛森嚴九虎闗從前錯為敵人寛那知黄竹瑶池夢歴盡青天蜀道難囘首烟塵三輔隔驚心風雨五更寒淋鈴一曲上亭驛好並千秋金鏡㸔宿驛亭和前韻末句屬可道千里因人作逺遊一畨風景釀清秋眼明驚羽新碕岸心折狼烟舊戍樓山驛解鞍才晩霽夜床驚雨滚溪流壁間唐律須揚㩁却恨宗風隔果州遊玉林午飯九曲池觀偃松過法華院至上方觀東坡題柱晚至沈氏小玲瓏施兄攜酒來㑹施本成都人僑居湖三世矣玉林散䇿才亭午九曲流觴對偃松脱盡皮膚見真實卧㸔桃李競丰容上方細㸔錐沙刻丈室連澆玉乳濃蜀客相逢天萬里不妨暖酌小玲瓏劒門壯心低劒類龜藏北度闗山稍激昻誰遣五丁通蜀險擘開雙劒倚天長山川豈為姦雄誤形勢終歸道徳强輸與雲遊癡寳誌喦前冷㸔㡬興亡過萬里橋辛巳春仲二十五日送别先君於此俛仰四年不勝感愴漲緑平堤萬里橋安輿欲去此遲留了知薪盡無餘火猶復情癡認刻舟終古不磨方寸恨深恩未有一分酬囘頭菽水中年樂擁袂汎瀾涕莫收曉過羅江縣霽雲破曉湧金盤夙駕馳驅萬古安雲葢展開山色潤羅之上有雲葢山寺甚秀羅紋蹙動水光寒周遭曲港栁彫碧㸃綴遙林楓渥丹游子莫誇工覓句竟輸老衲一蒲團東川懐古平生不踏東川路乗興春風爛漫游文冢姓名懸日月書堂寃憤慘林丘欲呼千載醉魂起那復少陵詩句遒啼鳥不知人意緒弄晴剛自説春愁步自南定樓至海觀南定樓西徑女牆等閒傑觀借相羊山連六詔夐深阻城挾三江交淼茫薄晚渡船人意急清秋倚檻客情荒乾坤殺氣凄凉甚浮海吾寧逐磬襄浙江觀潮浙岸攜觴差一日秋風吹爽軼層霄怒濤奮擊三千里壯觀元同十八潮蓬閬何曾雲海隔偓佺未散玉京潮琴髙背穏容追逐借與天風逓玉簫十日祭先農拂曉過劉寺喔喔晨鷄喚出城籃輿兀睡忽天明偶因半路松招客始覺空山雨未晴蘸水一梢偏韻勝攙空萬壑自天成奉祠猶得搜竒觀始信容臺職最清綿竹大中祥符寺通悟聖師所創寺前老栢係師手植因賦此六百年前事異哉二龍委骨致瓌材雖然懸䜟識興廢要以無心為去來寺裏塔模天竺様門前栢是聖師栽若將鴈嶺較喧寂寂定光中定一咍賦栁池寺䕶國靈泉僖宗幸蜀病卧寺中飲此泉得愈賜此佳名忍淚淋泠過上亭栁池泂酌重消魂脱身蜀道千山險屈指開元㡬葉孫鴆毒由來藏袵席瘡痍未易補乾坤行人但賞三泉冷興替相尋可復論借宿靈隠翌旦曉粥後步遊上竺華鯨吼粥月朦朧滿意枝笻落手中金碧三分靈鷲嶺烟雲髙峙補陁峰一貧未辦莊嚴供御前所供寳冠纓絡玉瓶玉鑪金鉢分茶盞九品堅持憶念功欲問耳根參透處曉寒山静數聲鐘題總持寺息臺山上最髙峰異事相傳管氏童三官松下奕棋為管氏童延夀籍此山之本事也檀幣昔嫌三窟擅齋盂今喜十方同曩為律居分三房施金皆為僧所擅自叅政李公請為先福道塲擇僧茂終為開山拓開兎窟併為十方丈有叢林氣象中宵急灑竹間雨萬壑俄喧松下風欲記徽絃寫心事賞音喚起石林翁題羅江雲葢寺二首山中有羅仙車轍跡紹興中有權老詩甚佳雲葢山前往返頻過門不入愧山靈晩烟莽蒼亂流去夜雨淋浪欹枕聽遍索寺碑尋往話但餘轍跡䕶禪扄老權有句堪呈佛誰為援毫刻翠屏處處名山屐齒留儘忙也合此閒游重樓髙壓青螺頂二水横分白鷺洲嵗月儘饒僧結足風烟耐與客消愁紅塵岐路重囘首車轂憧憧古益州遊永康靈巖寺寺有十六大士古像冀國夫人石經半藏魚鳬洞多有遇之者詰曲山蹊逺世氛荒寒古寺薦爐熏清泉迸石韻寒玉翠邏倚天施白雲半藏石經真健婦一龕古貌現聲聞遲留恐遇魚鳬叟嵐靄浮空日易曛覽鏡鬢間兩三㸃雪志士傷心髀肉生寒儒努力在青春課書恨失囊螢聚覽鏡驚呼鬢雪新嵗晩何妨勤秉燭行迷猶可復通津餘功剰暖丹爐火莫待幽人喚孔賔和程使君勞農仙雲山拜揚子雲像蔣丞相墳使君文采郁卿雲聲利塲中三沐薰繭紙晝閒臨晉帖魚膏夜永課皇墳劭農懇惻車頻駐弔古凄凉酒易醺笑我坐牕甘獨冷吟情强半被愁分挽虞提幹仲房滄江亭上極綢繆况復蘭階託勝游邂逅磬川分别袂傳聞邊邑費良籌諸公推上青雪轂一夢驚移夜壑舟生死交情那忍負霜風吹淚錦江頭挽廖山父忘年幸接使君游仲氏論交意最稠桂蘤方㸔霏月露蘭芽何遽隕霜秋遺編薈稡兼三傳英氣峥嶸閟一丘忍見翣車隨二老彭殤試與問莊周挽順慶使君寳章李十三丈二首東齋嫡子巽巖孫醖釀詩書氣味醇桃李七州春不盡松筠一節晚彌新恤章峻直寧王寳治行髙推漢吏循四尺墳前千字誄清名不與跡俱陳金相玉質素心降每見令人折幔幢亦有薦敭當使傳若為淹泊只侯邦欵門心訝三醫謁藏壑舟驚半夜扛掻首薰風丹旐舉些歌凄斷不成腔覺空寺箯輿選勝暑風輕渺渺西岑得化城應供佛元無住相教忠皇為錫嘉名諾詎羅尊者化茗供于䝉頂楊文安公請為薦先福道塲易名教忠竹牕櫛髪晨光薄松徑褰裳午䕃清安得一單長寄此跏趺静㸔篆香縈謁普徳崈徳懃濟三祠祠在炷薌虎頭山冠建芙蓉佩綴瓊水沉馥袂謁靈君支分一道岷山雪鼎峙三宫玉壘雲露積大田雙象鼻駿奔全蜀萬羊羣百年征調何當息乞與乾坤净戰氛謁周孝公祠斬蛟潭近欵叢祠逸少行書小陸碑穹壤英名長不冺烝甞故里有餘思排門簫鼔競禳賽挾彈羅紈羣笑嬉煑酒流霞魚饌玉荆溪可欠我題詩臘月二十六日部宿雪甚登天官㕔後亭子衝寒趂襆青綾被竒事粧成白粉闈老怯憑髙銀海眩渇因引滿玉池肥七旬蜀道才通信兩月淮壖未解圍澒洞憂端深似海鬢霜争與六花飛成都蕭寺度臘即事示彦威姪二首瀟洒僧廬蹔此留静㸔急景意悠悠戲呼道韞詠飛絮况有阿戎同頌椒三考癡頑成底事一同親愛外何求囊無儲俸貧如舊謾整圗書訊便舟掣電光隂不可追囘頭四十九年非萬縁勘破姑隨順至道精探識指歸感慨未能忘世慮因循深恐悞時機寒牕細話經綸䇿來嵗昕廷為發揮同二姪一甥游靈隠净慈寺韶華倐已三旬過南北山分兩日游翠邏晩寒催暖酒緑楊風軟緩移舟無多官事妨行樂有許吟情奪隠憂三揖孤山林處士泰和容許隠巢由金山寺畵圗省識金山面短褐風吹入畵圗玉鏡臺空螺髻直海潮音散蜃樓孤歸田擬共江神約鼔枻容追越相逋百一十城才發軔指南端不負文書善財初叅徳雲比丘于妙髙峰即此山也熙老拉泰叔同伴山行由馬溪寺攀躋險絶歴龍洞上羅漢洞洞前小菴極幽邃下有龍潭潭水窈深一緑蟾蜍踞坐石間意若神龍守䕶者抵暮還憩雙峰閣㸔十三夜月和泰叔韻扶攜羅漢洞前去誰信此中天地寛澗水飜成千偈快嶺雲肯放一塵干倚巖菴好無僧住積石潭深照影寒歸對雙峰㸔月吐薇花浴露色如丹訪雲端菴居夢想雲端路屈盤幽尋今果到雲端三間矮屋烟霏擁一片閒情宇宙寛土銼間搜靈藥煑天壇不遣篆香殘誰能好事時供給結足空山也不難叔存姪伯仲拉登平葢觀彭模來往無虛嵗平度山纔一度游卜宅舊傳楊蜀郡蜀郡太守楊洪之故宅題詩宛在薛嘉州薛能詩刻江雲杳靄吞天逺松檻蕭寒喚客留欲與殊庭追古意略須桃杏植巖幽長生觀拜謁碧落侍中觀巨楠功行三千未易圎活人隂徳最為先一瓢酒釀春江醁百尺楠藏洞府天道骨想從𤣥祖受髙風應許裔孫傳侍中七世祖曰逍遥公漢昭烈召之不起珥貂碧落猶官府何似鞭鸞陪散仙八月十日夜夢登青城最髙峰醮仙官醮罷同羽士二三人散䇿月下濯足澗水意甚適也推枕惘然紀以唐律􅍶崒孤岑碧四圍分明佳氣是祠西星壇醮罷天如水羽褐追遊月滿溪真境可容兵刼壊天涯長恐夢魂迷烟霞舊侣今誰在還肯丹梯手共攜九月晦齋宿太一宫都監姚髙士示劉長翁及湯仲能諸公唱酬詩軸因和韻二首擾擾東華車馬塵烟霞何日拂衣襟空花想已銷浮念枯木猶能發至音白鶴不來紅日暮金鱗自躍碧潭深五千言外無餘㫖苦更研朱學洗心孤雲蹤跡混風塵藹藹陽和滿一襟招得鴛班同勝賞肯教牛鐸嗣清音菴當黛面雪霜峭洞鎖玉臺烟雨深何日與師攜手去胎仙同㸔舞琴心祝聖清旦登星壇唱步虛下壇曉霧四開晴景熙然峻極先峰接絳霄佩環催肅大昕朝步虚杳渺吟崆峒飈馭依稀駐鬱蕭擬効嵩呼騰漢闕細聴天籟響虞韶班囘徙倚危欄望紅日初昇宿霧消山中醮後一日雨雪仍留山中霧雨溟濛混然如一氣未分也香霧囘翔八景輿帝觴邀我適華胥戲將餘瀝作零雨旋有六花飛太虛意恐混淪凝祖氣心疑圎嶠没歸墟題詩不作人間語呵手殘爐小楷書登伏龍觀㸔雪和張權父韻暖日嘘雲釀六霙一元亭毒嵗功成霓裳舞散廣寒殿鶴氅朝囘七寳城决雨會㸔三月漲屯邊全要萬倉盈離堆邂逅成竒觀一笑能令萬慮輕
