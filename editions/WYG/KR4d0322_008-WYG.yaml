body:
  text: 滄洲塵缶編巻八宋程公許撰五言律詩送㳺提刑祕閣赴召三首舊聞㳺監簿姱節紹熈朝有子登臺省危言動冕旒不容求外補親政復旌招四海澄清志無寧久使軺日馭中天運冰山失勢多可能羣枉杜端藉衆賢和公去應前席人言合上坡調停前轍誤國事竟如何外敵日侵伐滋為元氣傷憂心耿不寐洗耳待封章弱植如羇羽知音念五羊因書及疎賤决起尚榆枋送成都倅黎徳升赴召崔侍郎薦士召者五人三首憶侍西征幕叢談夜達晨别來青鬢換喜見紫泥新宸極拱朝幘曉星看蜀珍一朝樓五鳳積憤洗峨岷塵暗朔風急雨淫晨景昏憂心長似擣欲語吐還吞持底舒天步云何塞亂源熱官餳裏鴆名節貴璵璠已往嗟奚及方來當若何幸無疎藥石庶可起沈疴讎偽半盧扁滌腸須華佗康時付公等隨分且絃歌送别魏校書借參預李先生韻斯文天未椓世復有斯人縹帙磨鉛舊泥封染墨新詞華班馬富道術魯鄒醇滿腹經綸願逢時氣益振雙闕一囘首滯留今十連河圖元國鎮泗石待宮縣南紀浪飜雪北風塵暗天經營倚天定九軌達山川搔首暮雲碧懐人酒淺斟萬鍾心不動九鼎力能任夜雨青綾直春風紫禁深愛君須引類一念帝來臨送别長翁制幹赴審察戎幕接談笑薦函聫姓名自憐風退鷁快見浪飜鯨知已方圖任聫鑣夐有榮明堂足材具社櫟復何營屯雲開宇宙八表歛風塵獵徳恢天網充庭詫蜀珍一編元祐學雙闕武林春赤汗青絲鞚修途欵問津機欲審而發瑟調音自諧况思萬全計可畏一毫差囘斡須羣彦輪囷疊寸懐樵漁暫相狎鴛鷺豈其儕到闕政府以辟郡未下隔對練紙宻銜袖宫門報隔班衷腸鬱未吐殿檻可容攀巨用須桴棟旁捜及蒯菅對揚當有日傾盡不須刪和龔彦質韻送别趙税院譏征傍南海何遽别同盟漫仕不妨學能詩新有聲煙濤千里隔書劍一航輕榘範求諸近菊坡氷雪清别家仲行得成都尉西歸逺役得佳伴天涯還摻袪憂端今轉甚漫仕意何如落筆敏無敵軒髯豪不除市橋春好在勿共酒杯踈華陽尉授代喜成二首唱第八年久折腰三考書上官容我拙樸學與時疎冷落隨陽鴈蹣跚上竹魚平生經世志窮達豈闗渠冉冉嵗云暮齊邱促戍忙倦憑南郭几静寄贊公房夢想蠶絲軟涎流蟻杓香循陔歸潔養一笑樂哄堂用光弟攜兒送至南定親友逺追送後先還故鄉殷勤仲光父嫪戀及江陽執手哽無語修名那易量歸來訓子姪椿桂㑹聫芳挾文薛君自賦五首克己讀書安貧擇交訓子為題戒其子婿王叔儼萬里索和為人非外鑠已與物同之私欲陰霾蔽良心日月虧若能無窒礙底用苦思惟天理渾然處吾生自有涯静得山林趣閒知日月長清風披竹素小雨潤芸香外飾謝文繡饑餐須稻梁人生有同嗜只此絶難忘賦予有常分非闗智力求違行能自信顯晦復何憂瓢飲賢顔子𤓰疇隠邵侯胷中吉祥宅何處不天㳺士能知尚友豈必盡同時雜鮑蘭胥化亡羊路或岐醴甘知易絶絲素亦奚悲可以交難擇而忘伐木詩萬事煙雲過須留尾段㸔芝蘭庭砌茂風雨夜燈寒楚澤荷紉緑燕山桂染丹詩書門戸壯何待侈重欒夀李悦齋五首和送三榮使君韻南薫諧玉軫舜殿載賡歌天憫蒼生苦人如安石何無心書咄咄有術辦多多肯學癯山澤楸枰詫爛柯宇縣風塵暗軍需色目繁時機寧我待心事向誰論羶聚螘争慕泉深驥渇奔非公能借箸猛虱恐徒捫國鎮重雙璧寵光均一時姱修甘俗忤忠憤倚天知聞道徴環急難忘側席思分明調鼎味梅熟雨垂垂衡泌春無盡湖天風快哉書堂三夀語仙籍幾生來一髪扶周鼎千金築隗臺人心索調䕶根本更須培磊磊松椿幹淵淵金石聲功名寧貰我富貴本無情陛對三千牘胷竒百萬兵扶持天意在容我請長纓送道傳姪旅中赴省上國友多士三年期一鳴藝須専必勝禄逮養為榮門戸久灰冷雲霄如砥平五豪同着便一為起家聲㕘選成都親友追送月夕飲江上乆聚未知樂蹔離能許愁清江一輪月後夜兩般秋語倦且呼酒寒侵頻索裘鼎湖龍去逺憂憤涕滂流留别李貫之大著二首車馬紅塵裏閲人誰似君洚流傾世論砥柱倚斯文籍甚詩書譽超然利欲醺相從期嵗晚蘭佩襲芳熏二老俱黄髮遙憐望倚門淒凉逰子意慚愧主人恩酒舫湖光灔書燈夜雨昏三山𣺌雲海何日聴重論楓橋寺侍悦齋先生誨語三日而别唐人舊題處那復有江楓寺近闔閭國門當岝㟧峯清風三宿戀紫氣一尊同恨與心知别煙波千萬重雨中送客觀魚閣即少陵東津觀魚賦詩處也送客觀魚閣山光水色中最憐秋慘澹况復雨溟濛坐久覺衣薄杯行到手空恨無佳句子喚醒少陵翁風雨過南溪小艇泝洄穏短蓬興寢勞斷崖榕倒影亂石水翻濤過雨山如沐終風晚更饕愁須詩自遣吟罷轉蕭騷三江曉渡喚渡三江㟁停車兩眼明煙涵秋日澹露洗曉寒輕山色晴逾爽波流怒未平詩翁舊㳺處有句不堪呈陪憲節飯石堂書院渡江㳺雙泉墅即席和韻箯輿杭野渡竹逕繞平疇紅蓼前宵漲黄花幾日秋談鋒蜚屑玉巖竇答鳴球山水饒心賞能忘恤緯憂仲春八日自成都起程度劍閣蕭寺深居穏春深殊未知偶然成逺役猶幸及芳時麥浪含風軟花光眩日遲客行無復恨隨處可尋詩秉炬㳺麻仙玉華洞雲峯環翠幄洞戸閟瓊臺勝處難名狀飛仙此徃來近應通玉局逺或接蓬萊安得一伸臂乘風遍九垓送劉時可縣丞奉母㳺岷山西爽􅎨層霄南牆日見招乗春扶鶴馭披霧過龍橋香火祈親夀煙霞逺俗囂歸來索吟稿起我意逍遙過中嵒渡月出峨眉山上返照中嵒渡峨眉分外清一彎新吐月共我兩忘形露下沙逾白宵寒酒易醒荻花風索索擁被不堪聴山中戱雲端子追路歸山後開闗喚客眠那知言在耳已作醉逃禪急雪濃篩瓦中宵冷透氊清愁分不盡惜别意淒然題丹景山原廟標丹景神㳺想岱宗寳龕嚴石像紺殿鎖雲峯浪說侵疆復何當檢玉封天門東北望漠漠曉煙濃題信州半月巖巖際半輪月神工幻怪竒本來無顯晦何自有盈虧嵐霧凝蟾彩藤蘿影桂枝能令萬里客為爾憶峨眉炷香至徳山異時聞至徳滴水洗沈寃唐悟達國禪師遇十三尊者洗人面瘡解宿負空寂等三世悟迷同一源松杉膏宿雨樓閣麗朝暾猶恨髙峯頂藤蘿未得捫自船莊過化城留宿翌旦炷香宣石橋卯塔路欲轉前嶺僧邀宿化城飯抄青飢軟茶瀹乳花輕嵐雨侵衣潤松風入夜清瓣香宣老塔坐待日華生侍飲寳子山逰忠武侯祠一郡最髙處元戎領客逰雲根棲萬井城角帶雙流日薄樓臺暝風悲鼓角秋卧龍千古恨煙靄隔神州題馬溪寺二首乆客愁多雨清逰喜驟晴雲藍猶獨踞玉嶺忽雙撑洞口龍方卧山腰虎尚獰方池竟何在一水至今清先子舊逰此余時方五齡風神見圖像雲體想儀刑衰髮年年白遙山面面青不須論舊事欲説喚誰聴留題馬溪寺二首即用前韻玉筍競秋爽翠屏張曉晴天開金地勝鼎峙紫霄撑見説禪心静能調異物獰十方薌水海何處不澄清水觀禪師三峯屹立如屏翠珉瞻手澤六十有餘齡嚢錦傳宗旨錐沙更典刑髪縁憂世白眼獨為山青蕙帳搖歸夢秋猿正可聴香積寺午齋峻陟龍門路來㕘雞骨師樓臺春雨霽魚鼓午齋時倦憩僧留話荒尋僕憚隨一笻支野步且以暮為期挽桃源使君虞公二首疇昔交諸季曽聞説長公聖涯探窔奥詞藻亦精工偶幸趨徴詔方當順下風飈斿無處問延佇鬢飛蓬解印桃源後卜居梅溆幽秉心難偶俗樂道自忘憂故國八千里妖氛六十州公䰟如不冺時作玉芝㳺挽前眉州使君廖子長二首二老金蘭好諸昆筆硯交坐隅親問字投分漆如膠决眥雲間步驚心水上泡屋梁耿殘月含涕祖西郊卧羆花石戍夢蝶古渝津秀子嗣榮禄諸郎皆聘珍笄珈陪墓窆霧雨暗車塵今代誰班范牽連漢傳循挽永康守成寺簿同年二首模楷親前哲丰姿自軼羣囘翔垂白髪凌厲即青雲幕府列功簿詩書清塞氛寳仙催命駕拱木漫新墳友愛根天性今人古與俱棣華雖殄瘁玉樹更扶疎經濟終齎恨循良誰讀書慈恩共心賞霜月淚霑裾挽潼帥許侍郎成子三首天地英靈氣風雲感㑹期龍頭推蜀産骨鯁自天知雨露榮三接江湖滯一麾甲兵何日洗逺慮憶蓍龜正色趨文石危言竦列紳直前香案曉批敕瑣闈春天要明堂柱人閒匠石斤汲公寧妄發軒冕付平津雪慘龍沙節春濃豹尾班難銷方寸赤不待二毛斑力盡三醫謁憂深九虎攀丁寧尸諌語端不愧家山七言律詩元正書懐甲子循環六十年手披新厯意茫然了知自性覺元妙寧與世間寒暑遷寡過得如蘧瑗化諾惺要了瑞巖禪故園未卜西歸日遇好溪山且數椽立春月墮霜空發上亭土牛今日却鞭春六花度臘慳呈瑞二麥何時飽食新四序斡旋均一氣萬殊元化託洪鈞已煩元帥調新律早願三邊静戰塵正月二十日雪東皇弭節未多時忽作漫空六出飛商畧田功興嗣嵗翕張天巧惜陰機麥才覆土欣蘇醒梅久烘晴稍發揮蕭寺掩關終日卧忍寒不著獸紅圍正月念三日以南床劾論去國憩浄慈客館蘇稅院惠二詩和韻意不求全那得毁本來知足豈須多世途何處非乗險古井如今已不波縁督更須師漆吏乞墦可使愧鄒軻君看野馬難羈束寧羨天街想玉珂寄色古刹客過門煨芋殘爐晚未温萬里風塵迷逺望三峯文獻接諸孫湖山春動饒佳趣杖履時來共至言一笑老仙堤栁畔人間誰怨復誰恩仲春再雪與禪衲夜話蓬萊不肯著癡仙放去湖山一任顛術不競時甘斂退僧知同趣喜留連春深半地雪盈尺雲破遙林月一弦撥盡灰寒吟未穏不如欹枕愜昬眠寒食賣餳簫咽紙鳶飛愁思驚隨節物來誓墓可能同逸少操音誰復憫鍾儀松楸此日空瞻望桃李當年奉宴嬉投老與公同一恨淒風撩亂我心哀清明日郡圃逰觀者如織余以趙園之約至夕乃還若水賦詩後四日偶因小疾謁吿清坐始得奉答老怯尊前倒玉山清晨有約夕曛還似知是日笙簫沸趂賞羣芳綺纈班細閱餘妍能幾許喜因小疾得端閒持觴不釂春應笑若欠題詩亦厚顔三衢道士鄭自得即天慶寮舍種梅疏池為小亭扁曰横清有詔住南岳道觀復以此扁其亭解官事言歸袖詩相訪為次韻髙人乆已悟空花養就丹田日月華方丈有誰來晤語横枝相對慮無邪雲開衡岳重囘首雪滿柯山遲到家乞得歸閒來叩戸摘將青子薦流霞和虞使君賦山茶花二首眼明絶艷照凋年傲雪凌霜分外妍鶴頂染砂那得似犀棱削角自蒼然若為白瑞三冬裏獨抱丹心一節堅嵗晚須公與商畧儘渠春晝萬紅嫣梅花蘸影碧江潯似怪髙人金玉音詠絮可憐清寡伴冠霞來與共論心定知句迫瓊瑤響莫惜杯浮琥珀深姑射清寒西子醉一時嫵媚索髙吟道傳山丹一本兩花舉以見遺夜牕翻書偶見劉潜夫嘗賦云偶然避雨過民舍一本山丹恰盛開種久樹身樛似葢澆頻花面大如杯怪疑朱草非時出驚問紅雲甚處來可惜書生無事力千金移入畫欄栽因借韻同賦一首種類山茶花較大一根恰有兩枝開鉛砂煉熟大還鼎琥珀琢成雙勸杯威鳳想從丹穴下飛仙近自赤城來便船惟㑹加培養寄伴階庭芍藥栽仲秋池塘荷葢方宻有四五朶花公暇羽衣凴水檻漸多翠葢倚紅粧想應三伏怯袢熱待到仲秋吐艷香藻澗魚跳晴景眩樹陰蝉嘒晚風凉意行偶與欣佳㑹門外催科正自忙擬玉谿體賦醴泉墅海棠二首東皇張飲錦周遭華艷偏宜望處髙結綺樓深迷玉樹銷金帳暖醉羊羔先驅瑞節眩穠李近侍舞衫環舊桃乞得巫雲來芘䕶蜚亷作横未應饕濯錦波光繞百遭花覆池面下映緑水如濯文錦夜寒秉燭更須髙恨無麗藻供摛翰聊復重裘索俊羔長笑董仙癡守杏可憐曼倩坐偷桃若教入侍紅雲殿應悔從前俗慮饕昌元郡圃看海棠紅苞爛然未有開者問訊以詩畫本争如覿面竒含苞香露已霏霏阿嬌早合貯金屋南子似羞褰錦帷花信定因寒較晚賞心何事巧相違壁題恨欠江城句綵筆誰能為發揮崇女擷菜煮羮穉女春間繞舎嬉手挑野菜滿籃歸細㪺碧澗和根煮旋掬香粳芼糝稀久識道腴知雋永更從禪悦悟精微投床忽作還鄉夢雪暖西山筍蕨肥督堰至岷下借館南浦張叔全家臨别惠以潤石香几一峯挺㧞于白雲杳靄間殊有逺意小詩謝之飛幰輕輿御暖風欵門何事日憧憧芳榮滿檻丹青麗穠秀當軒紫翠重石几拜嘉才徑尺雲天無際挺孤峯更煩指似麻壇路萬壑千巖借一笻同家徳清侍尚書楊寳學山行先過上嵒訪家諧季諧季乃恭伯本仲之季弟其先人累承制垣以學行薦鶴書杳杳上巖雲錦里安車忽暮曛二陸乆當為世瑞一䕫留與䕶香芸中春澗壑晴如暝亭午松蘿氣自薫倚檻欲歌招隠賦客塵痼我不成文北新橋借孫氏宅内有井甘寒又有栁陰度夏為宜幸有安居暫寄包拙如鳩不費營巢日長有井供茶課客至移床蔭樹梢無事莫將吟思攪儘閒且把舊書抄心知守道惟𤣥黙不用援毫賦解嘲樊丈子思以予兄弟三年端居招飲山房為破愁寂賦詩以謝銜恤三年意緒凋嘉招為我破無憀露秋爽借談鋒利霜月寒侵酒力消心事寂無機事擾詩情何似道情饒平生我亦輕簮紱安得長年共一瓢再賦物華過眼半黄凋萬竅號風夜慄憀一寸古心難石轉三生妄念易冰消鉛黄汗筆千年夢白黒文枰幾路饒勘破古今無一事省煩更好去風瓢借東溪巷錢莊寓居蕩蕩青天隔九門攜孥飄泊此江村漁蓑且當青綾被賜酒何如老瓦盆萬軸書籖須細閱九還火候要重温少陵有句須㕘透政藉幽居拙養尊同振之徳久分韻賦坐石東坡得坡字千年間氣落岷峨驚世聲名鎮不磨唫詠西湖雖有案經年儋耳却無波細看㨿石横藜坐想見騎龍跨海過山谷老人猶剰語是非元不到東坡移住西門之溪上罷官來就湖州住為愛雙流貫一城僦屋本非嫌僻静開窻正要納空明魚蝦幸可隨宜買饘粥何妨逐漸營况有雙梅供索笑昭琴底處有虧成雨晴後同兄姪逰開元寺一覧亭飲道傳書院勝賞幾為雨罷休霽光俄湧屋山頭松根煙暖留飛屐蓼岸波寒緩泝舟霧斂長江青眼對雪消逺岫翠眉浮郊原浩蕩春無價漫索枯腸唱且酬山色撩人共一杯夜堂淺酌不須催醉吟兀兀驚頽玉睡思齁齁易轉雷蠟炬烘殘三寸㷔水流潤浥一爐灰西㳺歸趂桃紅暖相約清尊陸續開三髙亭二首一棹松江朔雪饕椒漿曽此酹三髙逺逰借與薫風便偉觀還如昔日遭喚起玉龍嘘霧雨饒教綵蜺戰雲濤平生最愛登髙賦盍為豐碑續擬騷水仙要我小遲留探借五湖風雨秋三萬頃波融一鑑八千里客只孤舟望迷漁荻荒寒境思挾琴髙汗漫㳺模寫自知才未稱天隨有集更精搜避暑鏘璆亭老怯新秋暑鬱蒸晚風水檻一披襟試教通閘喧雷鼓何似穿崖響玉琴黙坐自能醒渇夢微吟時與和清音専城大似専丘壑不待山行記蔚深重陽後一日陪憲節登清音亭飲見易亭即席和韻一封諌疏徹銀臺感憤題詩醉墨堆喚醒菊邊秋寂寞爛㳺松下逕縈囘參軍逸韻頻欹㡌詩老多情不放杯勝日追隨容湛軰從容歸騎不須催煇父道父攜酒相伴飲飛赴寺四望亭吕汲公所創四望竒觀廣莫同瘦藤拄入畫圖中晴煙杳靄景無盡醉眼糢糊鳶墮空邑蕞也曽基相業井眢誰復現神通漫勞二妙相追逐勝處宜捜未易工移居北新橋彦質恵詩和答束書欲去意遲遲從此寧無一㑹期客路相逢如宿契人生難得是閒時虚廊過午陪行食浄院中宵共説詩此樂何時仍共賞底須簮佩侍彤墀繡叚輕投報苦遲隔關那復共襟期艱虞敢自求安宅懶慢欣知不入時王粲登樓初有賦杜陵屏跡可無詩邊聲又逐秋風勁誰有良籌動玉墀計煇父訪予上皇山中拉歸龍溪欵話一夕和前韻相贈仍為賡賦憶曽欵竹憩神輿賡賦傳抄勌小胥偶復縁雲尋勝踐忽驚響屐慰逃虚卜鄰也擬營環堵飽飯何當共趂墟浮世升沈何足計得如一室静翻書子春再約避暑和樊子思韻興元事變後聞已收復憂端引起鬢絲長喜報梁州復故疆相約楊園舒野步頻呼竹葉沃剛腸颼颼翠篠風生檻灔灔紅蕖水滿塘剰殖芳榮好看客春風勿吝費除堂張伯修令君賦詩同韻稱慶玉節何如素節髙歸來喜氣溢東臯存耕元自有餘地嘉植何曽生不毛采石勲名須世濟陵陽今昔幾人豪含飴一笑春無價授簡梁園可憚勞七曲和魏校書韻神理之公參造化簡書千古豈虚傳權衡無意物輕重水鏡何心人醜妍天爵一身元不欠人生萬事且隨縁椒漿跪奠無餘禱擬續離騷愧斐然揆初之日承父用晦以余前嵗登玉華樓翫月借宋青山詩韻賦詩稱夀仍和答之并示甥姪防意由來似守城澗潢潔祀及良辰命名猶念記閭史學道粗知存谷神欲誦蓼莪心楚愴愧投木李句清新何當共覔長生訣去逐商顔四老人和答括蒼龔彦質不慣參禪不學仙不婚不宦忽華顛前身疑是林和靖好句多於謝惠連投贈頗堪華錦繡擇交當勝佩韋弦鷄蟲得失何時了洗耳松風共醉眠和樓大參韻贊史伯謙少弼二同年掛冠俚耳驚聞古曲彈地行元不慕僊官方看鳳穴將雛上伯謙父子同登已悟羊腸涉世難蟻夢未酣誰喚醒魚逰自樂與誰觀不妨散策三巖路聴徹松風度百灘琴自無絃不用彈嵗寒姱節傲蒼官青衫吏隠非吾願綵服兒啼畏色難少弼孝侍孀母三徑歸尋元約在萬縁囘向自心觀何時欵竹雲莊去洗耳香山八節灘小詩謝霅川使君幇祠庭薄俸地行不必羨飛仙驤首青雲恐疾顛但得一㕓耕谷口底須萬騎戰祁連齋房盡日清如水吾道從來直似絃頼有故人供禄米飽餐贏得枕書眠
