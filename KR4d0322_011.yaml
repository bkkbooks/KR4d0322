body:
  text: 滄洲塵缶編卷十一宋程公許撰五言排律行黑水谷三十里以耳目聞見有賦自過三泉境紆回谷道中居民雖漸復生理頓成空敗屋翳蒿徑頽牆荒棘叢稻田多宿莽麥隴間鋪茸耕織豈當廢傷殘甘忍窮遑憐已死骨使得掩幽宫梨粉偏饒白桃腮也自紅羇遊愁滿眼感憤氣填胸家計艱營葺人謀有異同熟為根本慮無使浪施功末句謂招納秦鞏大雪同楊景韓程子敬登寺樓雪中佳士集同倚寺樓看晃蕩迷滄海空明迫廣寒重城和氣浹萬井語聲歡瑞接三冬白憂寬一寸丹漁船尋剡曲戰馬渡桑乾天意俱慳與無氊分冷官遊東坡和柯山潘邠老舊賦恭惟廊廟具歲晚落江湖豈不三緘舌深慙七尺軀若為周士貴翻作楚囚拘詩欵催供上皇聰莫可呼孔融成幸免桞子豈真愚瓢酒那能醉叉錢可得腴貧雖無四壁夢不到清都赤壁一枝笛寒溪十幅蒲故交同縞紵廢壘借耰鋤未分徑爭捷可憐錐也無是非端自定流落坐成迂四海老泉水一時丹穴雛士皆憐大器手不轉洪樞擬問靈蓍卜難憑造化爐喑喑櫪下馬泛泛水中鳬富貴危探虎煙波夢釣鱸定知鏗舍瑟終不亂吹竽榛莽開金地江山稱畫圖何當麾斗柄相與第天吳生世須如此不然非丈夫送憲使江寺簿赴召沃野三千里春風十六城顧憂寧易釋遣送定非輕憶昔光華賦隨軒老稚迎根株探吏蠧疴癢察人情漢網寧疏漏周原數按行堰渠豐䆉稏犴户絶笞榜六詔寂無警三農容雜耕與民為父母斂惠到孤􅑱江漢今猶昔人才世載英頽流無砥柱公道莽榛荆能使薰蕕别端由藻鑑明綱條雖整肅襟度乃恢宏行路無思犯濡絲已載賡前旒應渴見方底趣終更豈有坳堂水能容碧海鯨佇翔幽谷羽入囀上林鶯聞道宗風媺推髙月旦評榮非同象笏愛亦異金籯博士尤姱節端公更直聲流芳鎸琬琰仍世盛簪纓早並膠庠彥同為館下生詩書勤澡濯聲譽響鏗鍧棘路仙班近麻壇守紱榮徒勞將使指未足展修名王事猶多難朝陽待一鳴吾君元盛德廟算豈佳兵鷸蚌牢相守貔貅滯逺征秋砧霜滿户曉角月連營縱幸齊疆復難輕海上盟所憂新鬼大何日泰階平世論難撑拄天時會擴清狼心寧易厭魴尾恐加赬椎剩無餘算絲何忍取贏急須元氣護可使內憂并否極當逢泰屯餘合遇亨絲綸九天下羽翼一朝成已卜皇圖永寧憂敵勢勍公歸瞻負扆朝罷謁阿衡勿吝謀猶告頻將底裏傾致身須豹尾平武即鵬程有客青衫陋逢人白眼瞪愧無長袖舞愁對短燈檠天憫龍鍾極身遭鑒賞精鹽車華錦繡土鼓發韺䪫披豁叨深眷暌違耿素誠誰云鴛序逺忍欠鯉魚烹願效鷹鸇擊生憎虎豹獰送公騰召駕撩我動心旌湔祓慙褒衮凄涼乏報瓊松筠青不落看取歲崢嶸又上座主李左史八十韻江路三年别心旌萬里搖登龍空有夢蟄蟻困無聊側聽除書峻深期廟論調方看儀玉筍胡遽理蓀橈在昔推華族於今壯本朝談遷承緒逺坡頴更難超江漢英風逈堪輿間氣饒文傳千户印和備九成簫撼地喧雷鼓當空插斗杓靈龜韜逺見瘦鶴峙孤標久矣駑陵驥凄其鵠避雕與時為凖的立已有科條蚤歲趨嚴詔修名聳百僚青藜窺夜讀紈箑障塵飄洊綰藩侯紱連驅使者軺通才期用世所至藹騰謡將略雄諸葛皇靈格有苖帝思前席問命下賜環招敷奏趨丹陛疏榮逼紫霄一朝驚玉立三館看纓彯曉露坳螭潤春風砌藥嬌倚才兼夕拜專對禠天驕草詔鑾坡夜橫經鶴禁朝紫荷班已峻黃閣路非遙感激君恩重傷嗟世論澆維時憂旱暵大地遍炎熇公道荒荆棘輿情渴蓼蕭直前臣語戅蹙聽帝心怊剪爪晨頒綍濡膏夕灑瓢孤鳴知鳯瑞衆疾奈鳩佻賈勇封囊上噓回士氣消防門獰九虎利吻譟羣梟自古譏簧巧傷人甚骨銷吾身任江海公論付芻蕘姱節寒冰雪歸情遡汐潮鷺鷗波浩蕩龍鶴夢岧嶤雅量陂難撓身心柏後凋不妨間袖手冷看疾揚鑣詠草春波緑移牀夜雨瀟湖邉鴻並影夢裏鹿藏蕉庸俗偏酣豢清風久寂寥菉葹紛蔽户蕭艾服盈腰甘作墦間乞真成陌上挑迷途爭窘步俚耳怪聞韶主自明如舜人寧免吠堯與時雖落落任運獨囂囂正論何曽泯羣公莫誤料邦基期奠鼎鄰火逼回飈漫倚泥封谷徒嫌斗擊刁護疽雖暫逸廢食可禁枵嘗膽當忘食求衣合在宵若為人杞梓空使侣漁樵蠟潤東山屐塵漫北闕貂牙籖搜蠹稿畫舫看魚跳回首堯天濶驚心郢路迢僕夫悲馬局詹尹拂龜燋忍使遐心寫懸知睿想翹天街催並轡里社恥題橋慨念材成就艱如器琢雕扶持非有素運用恐無繇康世先營度猶農待勸劭可容苗亂莠莫使榝侵椒議必和平勃忠無棄董朝皇皇賢路闢汲汲將才驍不廢菁莪育精分玉石燒人心如眷眷天理自昭昭蓄鋭勤耕渭乘機速渡遼定應人激厲可使氣嫖姚催促元勳紀歡呼敵首梟明知霖雨渴不用鼎烹要豫卜中興漢毋徒小惠僑寒儒鑽蠧簡雅志自垂髫有夢騫鵬浪無心玩翠苕憶曽持鐵寸誤辱采桐焦步想長楸展癡成大瓠呺長懷梧鳯表屢賦草蟲喓官冗盆繅繭身羈甲附蜩不辭行役倦願奉燕居夭抱璞求礲琢荒疇待蓘穮木瓜如許贈誓志報瓊瑤上曹憲使五十韻曹公名器字叔逺驥不稱其力文當與德兼褊能多悻悻小器或惉惉行世吾誰與窺公意自厭秉心溫以恪植操靜而亷信矣天資媺加之學力漸巖巖疑壁立灔灔乃淵潛李杜波瀾闊黃陳律令嚴鏗鈜諧律吕璀璨溢緗縑振采賢關闢疏榮物議僉董帷終日下戴席幾重添江漢荆之望龜蒙魯所瞻鷁飛俄引郤蝶夢一何恬萬里紆朱紱孤峯對白鹽清吟憑月檻長嘯倚風簷偶過伊川洞髙褰刺史襜簡寬踈訟缿惻怛到窮閻治行流江海除書降陛亷六條頒屬部五聽察蒼黔紫塞塵方暗紅巾黨未殱人情彌震洶鄰境倍危阽所恃福星照能令妖熖熸民皆欣抃手公亦笑掀髯鳯綍摉才切驪珠信手拈春雷掀舊蟄秋月吐新蟾平似衡加石明如鏡出奩薦賢應受賞端䇿不須占世路吁猶梗宸𠂻秪自惔飛書星較速多壘日相覘曀霧中原慘何時聖化霑廟謀須謹密人意惡猜嫌裘葛如無定膏盲豈易砭內須和鼎鉉外亦倚珠鈐頃者益謀帥胡然心執謙有才空置散蓄憤可能忺人物何其眇公朝忌者憸幾曽明察察競作息奄奄我自芻蕘侣情酣筍蕨甜輟耕憐觳觫貪餌強喁噞昔戀龜頭縮今愁馬口箝何階羣玉府入手萬牙籖憔悴投林翼蹣跚上竹鮎自窺談屑璨屢詫筆鋒銛愧甚享金帚慙如倚玉蒹素懷長北闕流景恐西崦天久思平治公當贊景炎入應扶紫極出則擁朱綅謀必先康濟才宜拔滯淹豈聞春發育而間物洪纎執御心無斁題詩筆欠尖清波一引手濁水脫膠粘上瀘州楊尚書四十韻清瑩玻璃水巉巖石筍峯孕才供世用有道致時雍閥閲宋清節源流唐靖恭異時先太史司匭事光宗忠憤排黃闥憂危溢皂封扶顛重立極涉筆但司農餘地勤災穫連城薦璧琮羽毛參薛鳯頭角半荀龍赫奕誇分鼎鏗鍧響大鏞雲霄才直上時運快遭逢袖馥麋丸賜藝翻蠧簡重亨衢無齟齬按轡獨從容監寺雖平進班行歎乏供賜茶經幄暝濡筆殿坳彤曉陛荷囊擁春墀革履跫時來如邂逅慮逺妙彌縫霖雨睿思渴雲山歸興濃入辭親黼座宣勸灩金鐘可使安耕稼無勞訪枸笻錦衣華故里茸纛拂遐衝龍駕攀無及烏號涕莫從嗣皇初訪落達孝極思庸故老尤紆眷庭臣孰比蹤威名震滇僰治體嗣黃龔白羽間春燕黃埃斂夕烽官刑懲縱暴民氣化醇醲北定風簷敞西來雪浪舂憑欄聊放目憂國若為悰褒詔煩因任真祠未許慵定知頻側席胡不趣追鋒念昔聨瓜葛遊談及菲葑駑駘勞剪拂礦質費陶鎔氷谷窘寒凍石田加藴􅍵攝齋時緩緩御感志忪忪世論方膠柱人情謹護癰遲公歸燮理為國掃蒙茸遡日孤忠炯飛霜兩鬢鬆欲酬青玉案何有色絲胸自笑踈頑甚猶須砭劑攻兔絲雖小草千丈託長松壽茶使三十韻湖海裒英氣星凰瑞聖朝黃鍾回暖律紫毳下層霄平武登巍選髙才局下僚一朝翻渤海萬里羾扶搖遷次更州牧澄清奉漢條帑藏參會計閫寄竦嫖姚帝想重關阻雲連八水遼近知敵運盡不復舊時驕遣送紆天寵將輸伏使軺艱難須力濟氛祲覺潛銷還把天隅繡來題駟馬橋留良無復恨擷秀自應饒倚重藩條布尤先政理調根株探吏蠹𥜗袴藹民謡流地金錢溢褰風錦幄飄異時司𣙜牧永日但逍遙誰似躬行美能知燕處超兵厨踈蟻味訟牘列牛腰苦節同儒素清風起俗囂世途猶梗塞士氣况隂消竭澤無餘算何時罷擊刁定知虗寧久可卜賜環招經世須材略猶農力蓘穮牧時宜解瑟渴治急聞韶豹尾催持橐蟬冠合珥貂致身期丙魏耐老並松喬笑我同溝斷惟公賞㸑焦窮棲官署冷阻侍燕居夭春信梅先覺霜天柏後凋殷勤眉壽祝持用報瓊瑶七言排律餞祕書郎劉侯出守龍舒分韻得亭字皖伯疏封有故城新堂猶寶李翺銘三峯秀出塵區外二水空流戰血腥在昔建邦專地勢祗今誤計寄沙汀集鴻底處容棲宿冠鶡何人稱使令輪對適當三館彥忠純能聳四聰聽俄聞命綰邦侯組應是名題御坐屏地有險夷何可擇事方艱棘不遑寧扶持羸憊為耕叟收斂姦雄作戰丁遺愛重尋朱邑廟壯圖仍訪吕蒙亭可能舊觀珠還浦試拓新規刃發硎少待烽煙清紫塞却持筆槖侍彤庭男兒莫作分攜恨勳業相期汗簡青代夀李參預鴈湖先生五十韻仙李蟬嫣系緒長丹崖譜牒自曹王滔滔江漢流波漫濯濯芝蘭奕葉芳陵井已偕儒術顯巽巖尤擅史才良榆枌倍借千鈞重閥閲髙騰萬丈光在昔五之皆瑞晉祇今三薛共推唐何人説似公初誕趺坐從來見未嘗不是老聃鍾瑞異也應太白減精芒直從上界飄霞佩來向塵寰艷織襄疑夢無因嗤衛玠問炊不饀比元方鯉庭早熟蘭膏讀蟾窟濃分桂子香祕館翻書推博洽著庭紬史極精詳歸來兩郡驅紅斾還入修門荷紫囊議禮挽回周典制代言直似漢文章一朝誰作兵端啓萬里應勞使指將射鴈子卿歸亦幸棄豚竇憲勢方張披肝九陛獰羣吠回首三邊已戰場妙選何心榮寵利扶顛有意為周防事難忍作抽身計幾密方明疾惡腸鸞鳯得朋應漸集鴟梟鎩羽可能翔魚頭熟念衣寬帶虎士歡趨氣涌湯詔下九天銜袖滿人知二府畫謀臧古來所貴真儒用天定何憂敵國強刑典已先明兩觀和盟便許復侵疆論功自合專台席讒口胡為弄巧簧三載峩峯聽鶴唳九年里社祗龜藏踈踈竹色橫青瑣灔灔湖光映畫廊曉案聖經研藴奧夜窗古史閲興亡煙霞雅趣疑成痼風雨清吟樂對床誰遣白駒歌逸豫未應緑野久徜徉情知蕭艾糅芳澤手藝衡蘭儲糗糧擬輔皇輿休僨軸莫令中道嘆無航新銜寵自乾坤施繼廪恩疏雨露瀼公論在人元不泯精忠報國諒難忘慨思周道憂如搗常恐豳風怨缺斨九世陵園無復理百年玉帛不能償鸞旗龍馭猶西浙貂帽狐裘滿大梁休怪窮猿能倔強且防新羯重披猖夢疑謝駕逰春墅望渴商霖澤旱秧借問孤舟橫野渡誰為一柱屹明堂會看馬首遮于叟併遣籌帷出子房勤恤民心延命脈精搜人物整朝綱國威久憤寧終屈事會時來豈有常決眥三階明象緯為渠一矢殞天狼日髙宫線初添繡霧滃門弧記設桑盛事滿堂皆象服榮觀三夀簇霞觴擬將善頌祈周斗空有遐思戀孔牆期與八荒開夀域也榮枯枿舞春陽詩書澤厚床堆笏竹帛勳髙繡織裳與國同休山若礪錫公難老壽如岡丹成却結喬松侶駕鶴三清樂未央送别制置董侍郎東歸荷囊曉趂紫宸朝玉立堂堂侍冕旒帝為蠶叢精擇帥詔頒虎節往分憂旌幢雲合三千乘錦繡春濃六十州儀鳯雅應為國瑞烹鮮何忍與民仇陽和噓暖松州雪膏澤長隨錦水流酒賤途歌喧夜市彘肥社鼓響春疇教條寬簡難輕犯鑑戒髙明不暗投建學文翁先美俗雄邊德裕有良籌若為殿角頻憂顧何恨天涯久逗遛幾度璽書頒北闕四時朱履簇西樓神全削堊無機露德厚如山鎮俗浮邊騎誰令輕犯塞羽書忽訝急飛郵禡牙往度重關險建旐那容一刻留明月三更悲鼓角晴煙萬竈宿貔貅乘墉妄意窺吾境奠枕何由奈敵讐忠孝全軍齊縞素嫖姚列校奮戈矛金牌不與全腰膂鐵胄安能芘髑髏戰勝遊魂驚鋌鹿凱旋享士趣椎牛三秦席卷非難事偏將星奔悵寡謀坐屈戎昭親跋履申嚴師律戢姦偷人知福德如中令誰省恩威似武侯過眼七年勞節制焦心九陛渴才猷賜環笑拆封泥詔疊鼓催裝下峽舟織錦何傷讒口捷憩棠翻作去思愁雅懷納納湖千頃外物區區海一漚書怪無心疑咄咄委懷何事不悠悠紛紜歸夢尋猿鶴浩蕩詩盟狎鷺鷗世事未知何日定才難莫若舊人求病深根本宜加護脈在參苓或未瘳德望定須歌赤舄姓名佇見啓金甌蹇余政自臞山澤漫仕都緣迫釡區綵棒乏材供擊斷鏤氷無技苦雕鎪豈期吏責寬三尺誤辱儒宗放一頭袖有神鞭驅欵假意令蹇步逐驊騮生遭名德為知己誓企清塵力好修桂楫穩飛三峽浪蒲帆歸赴五湖秋百年幾見輕成别萬斛清愁黯莫收倚俟泰階明紫極未愁弱水限瀛洲槐庭何日堤沙築玉食須渠鼎鉉調議有異同宜審擇人無近逺要旁搜非才忍負知音遇引臂追隨萬里遊代夀安宣相帝祐炎圖合中興風雲嘉會契千齡石田旱暵須膏澤蟄戶隂凝聳震霆審象巖間同説命絶韋聖處見羲經立談解使梟羮爛餘事能空兔窟腥岌岌危機還奠枕恢恢遊刃發新硎坐令含哺娛黃耉忍使供徭困白丁河帶已知申漢誓雲和聊復訪湘靈歸來旌節華仁里寄傲壺觴等大庭天厭遊氛侵上國風傳飛羽警邉亭汗顔何限指空血膠柱誰云瑟可聽斧鉞重開都督府緌紳盛集小朝廷白波坐壓風濤洶黃紙恩濃雨露泠重與蜀民司命脈定知天陛渴儀形著髙何病棊難活事定端如醉得醒萬里車書寧久隔三邉鼙鼓幾時停西南屹立擎天柱子午長驅建屋瓴會見輿圖恢故境便紆公衮坐頭廳無窮壽福由忠赤不朽功名付汗青自笑此生同塞馬若為有幸列侯鯖誦詩起為蒼生賀南極星環帝座星五言絶句同諸友山行分袂言别五首共蠟登山屐俄尋下水船到家人怪問滿袖挾風煙大面窈深處神仙碧玉壺孫郎妙心眼催作後山圖神都旬浹住大面欠窮探未盡山中趣重來賦蔚藍羅家隔香積天國近花坪何日同搜覽題詩索載賡名山遍宇宙歷歷紀輿圖安得身雲水孤笻自給扶楓橋寺小憩追憶丙申維夏與悅齋先生會留連三日而别拂拭舊刻凄然久之主僧留話借悅齋先生韻賦四首雲已安排雪天仍慘淡風纜船投古剎撥火共談空寂歷少林壁酸寒飯顆山相逢如有舊示我亦無還往事驚心折三年撚指間西州門外淚華屋遽青山唐人舊吟處古殿晝多隂欲去有餘戀片雲飛碧岑鎖宿餘半月得間讀書喜而有賦日月疾跳丸簡篇浩煙海弓旌誤誘去歎息可中悔馬瘏僕亦倦得休苦無多剝啄復剝啄奈此分隂何薰風鎖重棘襆被去何勇私我幾日間此意千金重晴簷蔭虛白夜燈耿閴寥自憐聲吾伊亦復如聞韶王事有期程稱意不可再寄言山中友勿誤青衫愛六言絶句和雁湖先生病起自警八章觀空得舍筏喻示病無散花天從渠幻起幻滅我自燕處超然葆光悟老子説遊仙續景純詩木鑽可使石透槃水猶嚴手持專氣如嬰兒相觀心得宿命通認取無聲無色了知非瞽非聾三關中隱玉閣七言味在蘂珠妙得養生真訣善刀四顧躊躇學仙寧復華念為士苦畏四鄰鐵彈茅茨何在兩翁心豈違人鐵彈張四郎故事茅茨賦朱祭酒也先生作小室以奉二仙殘編幸出壞宅滴露何能闡微萬古聖賢心法未饒西竺傳衣永夜朝元騫樹蕭晨晞髮扶桑妙處本來一貫何異心齋坐忘貪夫孜孜為利烈士汲汲徇名誰似先生元尚名標七寶宫城道書玄都玉京有七寶城太乙真人頌舊璨七寶林晃朗日月精楪香稽首禮族行繞宫城郡事多冗命繩翁拉彥翔則明德素遊趙園彥翔歸以五章示教用韻戰氛塞蠶叢國決䇿下勝峯山避地客江湖久著書無頃刻間世溷溷爭捷徑髮種種不勝簪欵門恰來石友倚檻同觀玉岑簡編得趣自熟軒冕於我何加喜為勝遊著句未須歸賦落霞俗氛妨人選勝危坐待歸啜茶聽渠説山説水撩我清夢還家浮生何適非寄百慮非言可宣誰能尋訪樂土籲天僑立西川與子先兄及伯暢甥别投宿明月山客邸悵然有賦相思命千里駕慘别緩三疊歌幸祖帳得少住奈征夫催發何岐路暫須執手髙城忍更回頭大家制兒女淚努力為名業謀鍾情慨左右手舍我作汗漫遊渭陽政須數面南浦約送行舟七言絶句上元即事四首放燈時節快晴天紅杏梢頭璧月圓物色似嫌人意懶故撩吟思著風煙昭覺芙蕖萬炬紅馬蹄無處避香風勝逰似夢難重省最憶瓊酥點綴工懶慢無才可熱官良辰何以博親歡翻思田舍朋簪盍濁酒青燈語夜闌不用長檠換短檠一窗圖史任縱橫定知太乙青藜杖合向書邊分外明元夕題燈龕四首緑綺新調正始音紅蕖小放上元燈遊人莫誚遨頭懶只願年豐歲事登圍棘侵天催速戰土膏得雨要深耕儒風鼎盛田多稼早願三邊洗甲兵期會從教迫星火絃歌我自樂春風欲知政理和平處都在邦人笑語中水晶簾映寶燈明海上移來不夜城何似圖書羣玉府青藜靜對月三更和程及甫迎春三首語脈留連燭跋頻也知同姓異他人筆花枉著藍田紙誰直金鑾夜演綸劒棧雲深爛漫逰知非吾土且登樓薰風十里陌堤上打伴明當還益州萬生寧不念扶顛澗壑今猶挽莫前過眼舜華開落幾功名好在鬢皤然和虞滄江梅花四絶句橫枝借與月傳神相對無言自目成好在玉壺清夜裏冷香孤艷浸空明園林春到杳無蹤恰似靈犀一點通賸著新題問花信從頭二十四畨風銅彛深養玉膚肌更著圖書繞四圍千古離騷誰與續襲人清韻自芳菲暖日籠寒意小忺為君索笑一巡簷細挼玉糝浮杯面猶自詩腸未屬厭和司令洪文詠梅花兩絶句人間何處覔瓊華元住瑶池阿母家應念維摩室無侍來隨天女供天花舊逰無處問芳華合江亭舊有樓名芳華為賞梅勝處身似禪僧處處家聊共梅花娛歲晚又催元日頌椒花再和聞道溪橋澀欲乾黃昏縞袂不禁寒愛之不見空搔首玉立亭亭可得干一冬已放酒杯乾三復名章敵露寒著我瑶林瓊樹裡何須初雪畫江干王摩詰有江干初雪圖事見石林避暑録和若水賦郡圃梅花三絶句踏雪微吟分外清藍橋底處覔雲英客來何物供娛玩竹葉新芻玉糝羮瓊玉林中笑語親色香原不著根塵淡煙踈雨靜相對聊藉詩篇管領春氷池媚影早春時轉眼纍纍子著枝調飪可能無好手太羮真味付誰知春明日侍親輿逰海雲寺四首和風釅日又春明茶事驚呼探火新整頓安輿扶鶴骨晴郊滿意賞青春琴鶴清風久寂寥谷居忠憤絢銀鉤龕中片石費錐鑿還為兩翁須點頭寺有清獻像忠定詩刻休問霜林鶴頂丹空庭三尺緑新攢從渠五老掀髯笑我自與師盟歲寒翛翛竹色蘸清尊更借隂風蕩午暄博得親顔開一笑佳名須記壽星軒黃香梅緗枝滌露最鮮明瓊佩歸來帶宿酲莫向人間強分别一般品職列三清緑萼梅縹眇南山萼緑華春宵侍宴玉皇家定知飲釂玻璃碗去擁雲軿併六花紅梅羣仙遙夜倚欄時東閣詩成一段竒休遣北人輕辨認杏繁較似乏清姿題花十絶句憶昨劉園共一杯花雖多品未全開芳郊是處堪行樂正用此時特事來穀雨猶賖半月期禁煙花事已紛披吏塵眯目春餘幾却被名花喚覔詩楊花漠漠亂晴空翠幰箯輿御晚風試與徐園評絶品紫毬曲柄狀元紅何相家庭僅百窠擁培力厚得春多羣妃舞散瑶臺晚盡醉東皇金叵羅花城最好穆家亭一樹雙跗疊彩雲穆知和園有瑞雲一朵雙苞極竒麗似是將雛有先兆主林神為瑞斯文簿書投我夢沉迷有客相攜兩日嬉餳粥催人歸供節蔡莊猶恨欠題詩蔡莊有三千窠以雨甚忽歸供節不得迂訪一欄養就數窠花却辨牙牌定等差我自色塵無染著試將道眼看芳華胭脂樓與瑞雲紅疊萼重跗剪刻工元利滋為人偽奪不如傾倒付東風絡繹筠籃為我分古銅雲罍井花溫無情風雨連宵惡數朵忩紗故自存飢腸可忍麥登場寒索衣裘繭飫桑莫為花殘恨風雨深恩何以答東皇小詩柬道傳覔花栽分我幽園花數栽滄洲三徑劚蒿萊殷勤雨露親培植小待春風共一杯施兄折贈苔梅將以二絶和韻謝之老幹查牙裹緑苔雪中能有幾花開杜陵不耐香愁亂更看幽人輕折來枯木巖前不受寒幾曽披腹詫琅玕春風何限間花草歲晚貞心要耐看和虞使君擷素馨花遺張立蒸沉香四絶句平章江浙素馨種小白花山瓜葛親借取水沉薰玉骨便如屏障喚真真長訝詩人巧奪胎天心月脅句中來更將花譜通香譜輸與博山烘炭煤緑雲影覆白雲英馥郁秋風不易陳休遣江南誇艷曲朝朝瓊樹眼中新風露髙寒醉夢清小窗香霧逺囂塵不須殷七戲三昧始信司花女有神
