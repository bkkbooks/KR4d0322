body:
  text: 滄洲塵缶編卷三宋程公許撰四言古詩明禋進戒詩臣公許言伏覩皇帝陛下改元端平躬親政事之三祀大饗明堂以報以祈竭情致敬先期格於道祖即以是日齋太廟詰朝薦祼月星明穊乾坤清夷逮玉輅言旋齋宫都人夾道瞻望天顔晬穆嘉氣扶輿中夕雷雨交作於乘輿未興之前而小霽於降神盥奠之際意者雨露風霆無非所以為教皇皇帝后於吾君顧歆警戒其仁愛之至歟熙事告成聖心加惕詔有司郤步輦輟班賀免御樓所以敬天威銷眚沴祈祥也後四日申詔避殿減膳孚號告廷以禮拜罷明智天運威斷神謀列辟退朝舉笏相慶不期乾道淳熙之氣象復見於今臣列屬奉常預觀容典深惟陛下欽畏圖治之心凡百臣子當知所以將順規戒效塵露於海嶽謹倣周頌敬之之義撰成明禋進戒古詩一章凡二百四十六句繕寫進呈懇懇精忠惟陛下裁赦於赫圓宰視聽自民惟聖能饗非德莫親乃眷炎宋受命以仁十有三葉涵海育春德厚流光施及吾君厯數有歸兆協大橫性篤孝恭天縱睿神思皇帝統積纍艱勤譬彼災田是播是耘遺大朕躬曷其敢寧嗣訓九年端拱嚴宸權綱復歸如日宣精姦憸投荒耆哲揚廷與物更始三載惟寅宗祀戒期厯吉中辛孚號萬方以肅先庚飭我玉幣潔我粢盛秋霖淫泆俄浹六旬法宫祇懼虔祈百靈爐沉未燼如谷應聲飈籟號起霧祲斂昏凡百執事肄習彬彬戊辰齋居彌竭精純昧旦盛服天仗肅陳爰趨殊庭溯瞻九閎眷我道祖凝神窈𡨕濬發靈源流福無垠旋蹕清廟感惻蒿焄端冕對越秉心著存暨入禰室有涕其零僾若有見愾如有聞景緯陸離瑞靄輪囷乃備法駕玉車犬金輪蒼龍載驅和鸞鏘鳴黃纛烜晝翠㽔梢雲還復齋寢以須肇禋重屋啓邃八牖徹扄秸席純敷蠟炬交熒金石森列豆籩苾芬有雨其􅗈激電震霆先事以戒升奠而停皇心益祗惕若持盈上帝降鑒富媪式憑二后嚴配五帝侍軒陛級陟降食飲樂欣禮儀既備廷列九賔宣旨輟賀免御端門天降威靈寧不震驚省咎宸扆肆眚八紘相古肆祀酒冽牡騂託物薦忱惟德之馨玉帶之圖奉髙所營蓋苐圜水入自崑崙辨説踳駁舛厥本源若稽皇祐裁自帝尊合祛參侑不瀆不煩維時泰和穆穆迓衡尚勞聖慮抑加鴻名制詔罪已千古日星皇祐手詔引咎頃者星躔舛厯水旱沴和人適洊飢物非備順方軫納蝗之念彌興罪已之懷其在於今履運艱屯經躔錯度水旱洊臻寇盜虔劉公私窶貧國論轇轕政條放紛所宜急急補壞支傾皇帝明哲問學日新夔夔翼翼是究是詢廣內九重方丈八珍采翠昡轉尊罍溢醇皇情泊然堯采若顰沓來封章敷列典墳旰不遑食坐或達晨雖躬其劬未凝厥勳因饗而思咎證之頻天誘帝𠂻躋之乾淳天啓神斷旋乾轉坤抵龜蔽志敡號列紳若古有訓股肱惟人進退以禮艱哉選掄匪余則私弛弛必更皤皤一老為世重輕毋徐其驅擾我心旌奚蠹莫理奚墜莫撑孰枉而陟孰賢而湮孰道之同而返丘園遲汝之來秉我化鈞莫莫葛藟芘其本根有來贊祼麟趾振振時庸展親金帛脤膰慨昔急難在原脊令豈不爾矜義或奪恩盍考故實以厚人倫言路之闢公論以信誰窒其來嵗久積堙亦既疏瀹源清則亨毋厭其鯁而其佞言藥石我愛醪醴我醒好惡之岐治忽以分民亦勞止魴尾其赬託之守宰爾撫爾循邊以警聞皇皇算緡吏緣為姦星火急征慨彼嘉殖耗於螣螟戢貪禁苛前令蓋申祁祁中原百年荆榛天狼耀芒較昔則獰摲我邊關殱我邊氓汔可小休亦人之情儻得少暇修其政刑毋寧玩愒以縱鯨吞維是四端急甚救焚天何言哉警戒諄諄仁愛之心與父母均皇帝曰咨爾公爾卿其左右我以經以綸鼎雉申警中興有殷雲漢懼災王化復行維思無邪負扆有銘敢不參倚日省吾身我闕汝規毋我逢迎淵氷虎尾始終一誠神示神考寧不我聽百臣司蕝虔恭駿奔跪誦祝册如帝其聆式稽周頌進戒九閽敬之敬之毋圮於成海深嶽崇不廢涓塵圖易於艱渝險而平天錫帝壽如古大椿天祚景運萬億子孫臣雖不敏知力於文泚筆以俟矢歌維清五言古詩逰靈隱寺夙好在巖壑強持縛纓簮野性當奈何惝恍如驚麕京華百萬家􅋾􅋾瓦疊鱗海氣蕩煩暑作威凌轢人湖山招我來九里松風清稽首靈鷲山西瞻目若營云何一峯碧飛來如羽輕俗見囿畛域達觀渺沙塵不見毗耶離示病老淨名古掌斷世界猶如陶家輪竺慧去不返雪猿呼莫聞斯言誰與證萬壑空煙雲老禪法龍象談塵紛縱橫萍蓬萬里外繾綣猶鄉情齋盂乳鋪玉茗碗花糝瓊兩腋扶清風取意巖壑行冷泉掬清泚五峯凌峥嶸真賞味無味內觀湛空明可能一枝笻雲水自由身永愧隱峯老勇決拂衣巾連日快晴登金華菴觀大面諸峯齋心謁殊庭異境目力眩積隂疑漏天媧石誰與錬列仙喜我至一笑晴景現絮雲斂太空螺翠敞大面正位儼宸極羣峯拱星辨煙雲互吐吞草木鬱蔥蒨錯磨金碧麗襞積霞綺絢平生飫看山及兹頗創見常聞西城君承詔通明殿玉虬層空來寶室仙境擅真侣萬五千朝夕侍遊燕凝神杳渺間稽首瓣香薦倐看碧瑤岑坌起白雲片溟涬含一氣瞬息閲千變意恐大隗迷或作巨鼇抃仙者奚異人豈忍為獨善利欲膏火熬是非蠻觸戰持是以求仙何異沙作膳吾身信浮漚世事如掣電本來一晶明初不假方便隨緣聊爾耳可使為物轉寸田須鋤耘老屋亟營繕行迷及未逺補過以無倦飈遊如有聞印我本誓願他年童初館或可備精選古碑塔寺改律為禪鄉大夫招凌雲智禪師主法席規模就整侯丞用晦為賦揭章和者成軸書來索和智禪生峩下稚齒希空門落髮受具戒持鉢巡諸村有如摩尼珠炯然古井渾又若大明鏡不受塵垢昏衰世不見理窺天於覆盆誓將昌祖道特用報佛恩得法歸燕社閉口不復論眷言古叢城往事空劍痕誰規此浮屠峻極壓厚坤意令五濁海親見兩足尊末法禆販盛遺教髣佛存破律會十方有詔下九閽法席遴厥選爐香冷復溫竪拂集龍象催粥吼鯨鯤能使幽衢暝豁開若木暾空花眩俗眼孰辦牢腳跟斯道許津梁如天柱崑崙施金方山積巧匠猶水奔請以六度法為拔六欲根諸君快説偈羣魔驚禠魂何時共峻陟層霄疑可捫勿謂蟹井小可敵鯨海吞投龍寶室洞天過延慶觀訪王倅共父劍峯精舍璧簡薦寶室襟裾馥旃檀眷言石交舊可憚腳力酸層崖一劍裂隂壑千古寒數椽棲泬寥小樓面巑岏風穴激虎嘯石洞掀龍蟠共父開一風穴并鑿開一古洞之中得小蛇如筯是日朔吹慘舞空雪花漫開尊聊暖熱芼蔬勸加餐心事喜我同晤言藹清歡欲去有餘戀小駐搜奇觀評畫過神品誓鬼猶故壇君家古叢城甲第十畝寬胡獨嗜幽寂而樂兹考槃戍邱漸相迫住山殊未安春風動倅馬雲霄插雙翰儻念猿鶴怨無多貪熱官羅仙宫道士留午飯後遍覽山中佳景三十六峯羅列几席夜雨達旦客枕甚清老樹萬安驛古井羅真山玉虬五雲車仙翁此往還雲蹤久不刓泛景疑可攀憶昔摛藻頖題詩揭松關此指羅江縣真宫事抱琴唐昌來快晴春物妍截竹倚伶俜引袂飛褊褼厯階一稽首為我展笑顔善救無棄物廣度隨有緣殊庭遙相望異關非浪傳道士多野朴山肴親潔蠲披榛為前導㪺酒勤欵延墨池鑑寒藻書臺滃非煙所著何隱帙乃忍慳不傳空餘六六峯可想格筆椽最憐覆盂亭秀出層巒顛周遭碧霞嶂莽蒼雲海連酒囤擬泂酌花坪敻連娟暝色阻窮探夜雨得佳眠塵緣一相誤凡骨何當仙雲霞豈不戀簡書當趣旋神丹夜澗火青藜洞中天仙翁如點頭未忍甘棄捐過金堂迂路登三學山李八百仙人道場失腳塵土窄謁歸旬朔暫迂徑欵名山攀險得幽玩平川開靄杳長江逺疏散驅車松柏隂闖戶風日淡棲居規制古殿壁丹青暗樓制極古而工夫精麗殿壁畫皆唐人作仙翁李八百曽舉陟霄漢遺迹古未陳見我若笑粲靈液噴幽嵒枯楠茁新幹皆山中事黃冠肅延勞緑茗勸澆灌飢腸殷雷蟄塵慮忽氷泮碑閲唐隸遒詩為處士歎三生學精苦一日升汗漫觀中唐碑最多有處士送崔鍊師詩刻石存焉三學山據碑刻中所載以李八百仙人三生學道乃登仙故以三學為名我豈無宿緣心猶憫世難思見甲兵洗永息氈毳悍王度式金玉民勞拔塗炭翛然一儒腐不自省疏緩強令事馳驅終覺窘羈絆何當脫屣去託迹煙霞伴宫洞吟步虛丹經嚴靜觀太初以為鄰巧厯那可算松風天末來為我發永歎擬古二章剛風軼飛浮叢霄隱寥濶其上仙者家俯世塵漠漠慨我志逺逰幽思無與豁披雲一長嘯曽舉騎轇轕整袂謁靈君授我一丸藥侍宴旬始宫從逰紫虛閣琅函閟道帙許我抽玉鑰玄期記三生廣度有夙諾世氛日澒洞帝念慘不樂願借萬里風從君駕鸞鶴鞭雷揮斗柄夔罔併縶縛掃清六合塵景象回閶闔帝命不可稽侍晨司校録永劫保澄明何問癡仙愕霜英濾雲母月華吐幽魄濬房鎖葳㽔弄杼夜咿軋天寒日苦短篋不貯寸帛嬋娟空自妍襟袖無乃窄停機掩孤嚬欲歌心已咽積此萬縷工織成苧羅白蹇修來何時復關滯塗轍女無終不嫁謹勿昧所擇忍寒青瑣窗熏麝翠羅幕粲粲雙明璫團團雙白璧稚齒昔所娛玩之不能斁春風蕩繁囿觸眼會良匹擷芳索幽占兩美斯有合及兹嵗未晏為君媚芳澤人頭山肅謁石壁清源真君像人頭接劒門濯濯危髻綰一峯表獨立層崖平若剷有一偉丈夫逺莫辨眉眼異聞驗清源竒質自天産三生舊緣契邂逅一笑莞江流怒未平父功子其僝坐令老蛙縛笑看離堆鏟陸海擅兩川利百倍灞滻神聖杳難詰事或載編簡明德逺矣哉椒漿酌盈盞鹽亭登髙山廟曉馳光祿坂暑憩鹽亭縣嵳峩山疊雲窈窕溪橫練長憐少陵叟浪走天涯遍耿然憂國心甘作忍飢面世難今略平軍行余後殿憑髙慨往哲欲去有餘戀景行堂斯文一線流伊川師弟子萍梗記經行丹青肖容止升堂如有聞虛心探厥旨毋與時俗競溺心於口耳貫道堂道祕不可傳非文無以貫君看聖畫易風行水上渙誰令鞶帨工能使雅鄭亂六經日麗天諸子雲霧散逢源堂務學有彛訓左右逢其原後生巧穿鑿末派迷本源世不有先覺誰當警羣昏佩襟來于于千古師道尊卧龍亭隆中抱膝吟意豈慕聞達翻然起潛蟄了不愆宿諾廢興渠有命忠直理難奪出處士所重羞死荀文若小亭道義日羣居間暇一遊息小亭擁芳榮長江鑑空碧風雩不盡春庭草有生色習學自孔氏深體而默識題枕帶雙流閣層樓架蒲牢其下表奇觀江連內外流山列逺近案烽火日平安煙霞奉娛玩蔽芾南國棠挺特九秋幹圓嶠羣峯最髙處一席如鏡平煙霞敞松牖風月棲茅楹仙姑紫綺裘飛步白玉京揮手一長嘯四海風塵清水雲天樓臺錯圖畫髙低各雲煙小車倦登覽危欄且回旋滄波納暝色溟濛同一天此中有真賞題詩謝雕鐫解纜凌雲快晴淫雨三月賖點篷今夕止蕭晨企璇漢微雲散霞綺鴨緑淡不波腝翠淨如洗吾行及端月餘寒未云已何以寫幽情無多佳句子舟行過昭化望逺山秀色柬幕中諸文劍北山巑岏刺眼亂矛戟煙雲借光景稍覺含秀色倚檣寄遐瞻慨我三友益有懷無與晤搔首暮雲碧重陽陪諸鄉丈逰水樂洞過風篁嶺龍井張飲觀兩蘇仙辨才法師像晚憩楊家梅園歸路小雨凛秋天氣佳令節天賜沐客居意莫展勝賞諾已宿風淡湖不波霧斂山更簇畫舫厭囂喧筍輿恣追逐間尋水樂洞嵌空韻琴築煙雲互吞吐臺館適涼燠非無人力勝亦自天巧足側步滑青苔醉面爽飛瀑風篁轉幽徑龍井鑑寒玉默堂定未起清風誰與續四海兩仙翁三生緣契熟定知明月夜屐響答空谷歸路取名園移尊屢更僕凍雨不成泥騶騎未須趣峨岷渺何在萬里勞逺目安得天瓢翻盡把邊塵沃文昌德宏毅承旨氣肅穆溫雅奉常卿忠憤膠庠博宫講靜有儀正字竭忠告而我贅其間自省羞朴􅈪明堂索桴棟底用采卷曲平生邱壑姿本不耐羈束撫事長鬱陶臨觴轉顰顣故園俯大江繞屋藝嘉木何以娛嵗晚籬落森杞菊糗糧幸有儲那不返耕築同王萬里山行邂逅非宿期意行得奇眺三生湖山緣青眼不改舊飛榜漾湖光躡屐梯雲嶠玉立緱嶺仙灑落我同調沖懷寄寥濶塵外恣吟嘯眯目東華塵誰識此中妙吾儕骯髒資如痼不可療溷溷渠得知不自恥牛後已矣毋復言恐貽水仙笑次李晉仲同逰南巖韻風林舞霜葉野水收寒溪旭日愛清美良友欣招携近逰南巖麓逺躡樵人溪世未變野處地已呈榱題錬石既有穴補天亦餘梯仰睇磴可涉窮擇日從低窅深有神護險絶令心悽我歸期再出後會豈終暌第膺三接寵未許尋髙棲晉仲文學淵邃方為朝陽鳴鳳僕所次前韻及之而洊賜佳章招隱敢再次韻以反之以資他日重會一笑丈夫為世用釣築辭巖溪不用身徇道固可卷而攜侃侃紫陽翁不踐桃李蹊淳熙用不終歸途此留題坐令南巖髙萬丈誰能梯倘止論兹山僅亦培塿低今如峴首碑千載令人悽我輩何適莫但觀道合暌鳥獸不可羣仲尼非棲棲逰涪州北巖恭惟同出自斯文其在兹白衣帝王師古聞今所疑慘淡涪江濱煙雨寒無炊一編洗心易後學之蓍龜學禪譙夫子窺牆胡不麾兹道貫三極何曽限籓籬柱史接武來相望幾何時舊隱勤汛掃大書挺雄奇江山著羈臣千古同一悲渠自氣浩然何成復何虧髙堂儼遺像寶墨鐫豐碑往者不可作搔首空涕洟蕭蕭北巖松悠悠我之思和江平叔逰無為山詩韻夙嗜一邱壑誓言苦難踐夢踏西山雲陟降原復巘世紛不可耐道根日以淺永愧龕中定三歎涕如霰君從柯山來行盡蜀山險不憚屐齒蠟恣襞蘭亭繭毫端花五色優曇時一現翛翛塵外趣厯厯眼中見人生歡會少搏沙隨手散何以慰瞻思英詞展黃絹自道場山至何山讀故人洪舜俞內翰詩刻追和褊性不諧俗泛梗歸無家故人右扶風雙旌擁崇牙欵門及暇日褰裳躡飛霞維南古道場諸天集毗耶巍撑鳳騫舞岌起龍騰拏坡仙舊詩刻清芬郁天葩雲表塔標峻具區帆影賒萬象森湊泊窮探忽谽谺金輿度窈窕何山一名金輿翠幄巧蔽遮昔賢此幽棲禪扉寂無譁蕭爽萬竿竹芬甘一甌茶清泉茁蘭茗黃粉飄松花意疑人境外身漾天漢槎浮生能幾何騖智那有涯神龜寶巾笥曳尾寧坳窪所嗜在間曠何心事雄夸洪崖石交舊嵗晚蔗境佳心源秋水淡藝苑春容奢冢上木遽拱海山棗如瓜今古一轉燭聚散猶搏沙暮江趣浮鷁城樹喧棲鴉願言借一窗爐香翻楞伽連日駐白帝城懷古感事閲陸放翁詩集追和其韻益以扼為國前後闢兩門劒棧徑逼側峽江浪崩奔盤礴六十州奠位西南坤天險豈輕設參旗寧易捫我行當嚴冬岸沙髙漲痕絶壁走猱玃深潭伏鼉黿東逝注滄海西來非一源相傳石筍三下接灔澦根長懷草廬公受遺龍準孫志節局不展德義深可尊矧伊躍馬壯得與同日論形勢今猶昔世故難為言撫事重感慨遐瞻莽塵昏空餘瀼西東未泯氷雪魂臘殘春意動清波躍河豚撾鼓趣下峽渚宫同一尊中元節日登舟赴官巴西兄姪偕親友追送三十里乃别相顧悽黯舟行得此詩以寄隨牒倦塵土歸夢長紛紜及歸嵗阻飢負米良艱勤細摹食粥帖長歌送窮文忽捧毛生檄往擷魯宫芹元方與猶子念我當離羣折柬期諸彥褰裳集江濆追送三十里酒炙羅繽紛夜航語達旦摻袂俄夕曛汀蘆黯回首風萍悵輕分時危事逺役所遇無一欣元戎調新律笑談靜邊氛容我坐無氊峩冠誦皇墳采蘭勸加餐伐木友多聞諸君志姱修未可恬耕耘努力崇令猷時來皆青雲弔齊齋先生尚書文節倪公公以正學清文精忠讜論為先朝名侍從玉色山立百壬望而沮懾故身退而名益髙浮玉山碧浪湖吳興勝處規創書院來往宴娛雅慕雪堂老仙亭館皆摘詩句為扁榜某之生也後僻處岷山不獲順下風而趨幸與先生之季子新安使君理正子武同朝為三益友會以口語去國扁舟訪子武為置酒相羊水石間清風徑節岌嶪與衡辨競爽矧承家惟肖先生固有不亡者存子武謂是行也不可無記述偶閲坡集峴山亭飛英寺分韻月明星稀四詩僣率借韻語拙不工姑以抒其惓惓企慕之意云爾披襟白蘋風蕩槳碧瀾月若下酒可斟顧渚茗堪啜兹逰足娛玩所遇皆勝絶四海齊齋翁清風傳奕葉平生心本朝峩冠蓬怒髮子皮五湖棹煙波時出沒仕道昔有訓退處非為名齊竽醉聒耳虞絃自希聲清波貫霅苕空翠浮辨衡圖史足怡悅風月無將迎生世我已後景行寧忘情昻昻雞羣鶴慰我雙眼明萬頃湖浪碧一點浮玉青先生此考槃有道甘沉𡨕植栁蔭水檻栽蓮繞風亭感慨手遺奏精神超列星鴻鵠既層舉梟鴆爭刷翎克家類季子隧碑新刻銘風塵日騷屑耆哲晨星稀九原不可作斯文今誰歸臨風想孤標把酒哦落暉扁刻見尚友雪堂密傳衣歸帆拂蘋波晴煙抹松扉滿篋貯寶刻展誦省昨非劉園春來雨雪連綿仲月之二日夙興快晴急借小舫欲過沈氏大小玲瓏嵒怒風簸揚撑入小港舟子告以劉園近在因往縱觀乃戊戌舊逰也花竹逾茂亭館加葺尤覺奇偉徘徊抵暮始入城先時結束書籠偶案上白集一册是日早信手翻閲中有和夢得洛中早春見贈七韻末句云何日同晏逰心期二月二兹行本非夙戒而偶與白詩參合小小嬉逰亦有數耶因追和其韻隂沍閟陽和快晴差愜意怒飈妬心賞清逰殊鮮味繫船枯葦叢悶損兀坐睡斷港麴塵波見引著勝地徑梅佇攬結堤栁是才思尤憐石交舊勸我取一醉異事詫白詩偶同二月二贈修水黃君子行黃君以元祐太史公之諸孫寓籍分宜苦志於詩以蓬甕寐語名其集長篇短調不主一體敷腴而雅重瀏亮而奇崛使讀之者如逰羣玉府百珍眩目未暇覩也庚伏袢熱惠然再臨贈五言古體二十八韻清風披拂袖間念宿諾不可負而蘧徑曹侍郎三山陳廣宗韋輔江彛叟之序引固無可復加因次所示詩韻贅附編末云雨潤莘野犁水給漢隂甕一為大烹鼎玉食此焉供一如朽木偶肯受關索弄顯晦勢則然達觀等一夢可憐蓬甕生萬卷皆成誦靜退一何勇本不借慫慂使孔孟復起必能與折𠂻世道日以隘古心誰與共君家太史公以文瑞吾宋崛奇莊騷語雅淡商周頌學力探窅深天巧妙機綜風流被諸孫璆琳富包貢若若綬滿朝傱傱清燕奉那知一畝宫有士苦吟諷寐語甘自怡經綸付時棟伊余曩在列竊自恥隂拱斥去職蕃宣玩愒糜廪俸何階繆推激為我破愚憃由唐及國朝作者亦已衆元氣所融會諒亦勞藝種苦心欲其工何者適於用當知正始音若睹治世鳳覽輝千仭岡一洗羣目瞢謏聞我自知可能相引重乞間會得請敢覬百錢送假道願欵門單車屏徒從不妨蒿藋徑容我於二仲秋風來有期心旌轉飛動和景韓贈子敬末章韻艷冶昭陽妃嬌好浣紗女盛時一轉盻零落委黃土彼姝秋胡婦真節甘獨守煒煒編簡上芳聲乃持久我欲呼緒風酹以一觴酒君看澗底松閲世幾寒暑丈夫要如此千載可尚友鬼蜮玩阿暪何妨摻撾鼓平生書五車一字不堪煮愾我左右手雙顧石稜紫忍窮學師道覔句迫徐俯橫陳味嚼蠟下筆迅流水憶昨涪江濱對吟夜床雨胡為輕判袂愁憑烏皮几人生如飛蓬飄落無定所那知錦官城尊酒又同舉草玄幾垂絲筆力造化補自我交斯人短翅思決起不因得趣同那覺同心苦至今浮山夢厯厯西窗語齋厨厭苜蓿塵甑窘禾稆忍飢搜枯腸數息保氣母何當陪勝賞一醉詩分取終恐吃期期輸君白玉塵唐文權郡見前作和韻見教乃賦詩三首以答之隂陽無停機寒暑迭更代迅商俄栗憀炎官亟斂退巖壑有餘妍雨晴皆可愛迫迮紅塵海適喜翠屏對魯國久仙去詩偕芙蓉秋淵淵韻金石往往餘巖丘象賢來題輿同聲應鳴璆清渭發源逺濁涇難混流贊房容久愒逰子奚所嘆樹老晝常寂雲埋宵易寒龕燈對青熒手箑失白團撫運忽有感秋防趣三單宗博宫講何丈以諸賢所賦清賦堂詩軸示教借和元韻附軸尾避影惡木隂忍渴貪泉水君看象渡河步步須徹底士當秉特操盛行貴知止佳境著蔗根苦或起瓜蒂上尊錫方進萬事咨伯始孰能超然觀貫之以一理瓢飲有餘樂我自味無味憶登君子堂積雪幾沒趾雙鶴舞前除穟煙縈素几疊石肖嶮崿俯檻鑑清泚旌招還此來歸夢曷能已紅塵交轡語新律吐瓊蘂千載友元亮顧未忍違世將壇建鼓旗許我陪末至政恐如濁涇難以汩清渭俗氛日轇轕籙茨亂蓀芷為君歌停雲倦翮思決起念歸悵無家素食心所恥安得三間茅託身安穩地一編岫雲吟枯腸或能擬題夾江馮臨父玉山莊圖後溪劉先生為題小絶故祕書郎薛公賦長篇今益部祥刑祕閣張公屬公許賦併呈山房邵傳中康節曽孫也天下最佳處惟二室三川一氣所融結何地無雲煙憶逰古南安倦憩大觀前十洲與三島渺莽雲水連追隨子邵子飛步山房巔醉歸迷夕靄笑歌呼渡船至今詩篋中秀色餘芳鮮永願借一壑抱耒耕石田不學谷口隱姓名京師傳邂逅大馮君為我開愁邊煙霞粲畫本風月起筆椽上有玉山莊遙挹峩峯妍士為聲利役何如擁腫全脫粟幸可飽苦茶宜活煎畫計不用決與山終薄緣三間茍完矣萬松想蒼然羊腸摧君輈問君歸何年早逐山房翁江郊掉吟鞭往來成二老日醉壺中天對峙五言城寫之七絲絃勿遣俗士駕汙我青苔錢
