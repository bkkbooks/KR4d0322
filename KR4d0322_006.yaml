body:
  text: 滄洲塵缶編卷六宋程公許撰七言古詩瀘水清吏部祕閣二江范公以東帥治瀘更七年令行化孚今年春北鄙用師計臺下令征夫役於兩蜀州縣奉行急如星火公斥帑中之儲為瀘民代輸其半餘以嵗糴軍糧米本先為敷納瀘民晏然不知有夫調之擾余於公無夙昔之好曩辛未春會公來攝帥事尾賔客一拜後塵蓋心敬其為古遺直宦遊西州有自富義來者為余言之慨然有感援筆以賦將以表公論於吾黨非有私於范公也作瀘水清瀘水清瀘水之清如鏡平蜀江西來流沄沄內江胥命如逡巡兩江合處聳百雉表裏益梓巴夔分如户有限齒有唇雲南與夜郎甫隔東西鄰山川之險守在人武侯氣焰千古猶長存有來范侯人中英蜀國忠文之子孫清姿徑氣排秋旻立朝物望髙縉紳睥睨衆醉甘獨醒烏臺縱好羞呈身十年江海心朝廷瀘水清我歌慷慨君試聽蜀東諸鎮瀘最重范侯之來更覺一面如金城東軍之驕昔所患南詔之黠那易馴我侯方寸澄止水鎮以寡欲撫以誠重門嚴柝夕烽冷紫邏雜耕膏雨勻七年逗遛不得去邊民愛侯有如父母親今年北邊羽書急兩川夫調紛苛征吏敲門農輟耕期限迫星火頃刻那得停黃金棄賣如土賤楮幣翔踴餘貫緡立談之頃富作貧縣官忍復規其贏五十六州洶洶如浪沸獨有三瀘之江清復清有客東州來為我委曲陳范侯疇昔淡無纍貫朽之積本為民二分官與輸一分一分猶恐民顰呻軍儲糴本仍借給少待秋熟寬作程風和日晏江上村老醉稚擁爭扶迎吏呼何曽怒目瞪只有提壺布穀日日喧曉晴樂哉三瀘之國有如華胥與大庭九重天逺呼不聞侯忍棄我歸鄉枌強敵遊魂尚三秦邊頭何時能撤屯帑無羡帛粟空囷將驕卒惰難使令義徒星散自嘯聚往往千百相為羣秋霖淫溢稼不登仲冬虺虺雷鼓轟我心隱思鼻酸辛人情玩愒渾不悟有才空使棲巖扄我聞瀘民愛侯心不釋祝侯夀考備福如忠文侯雖潔身玩泉石獨忍一息忘吾君何時璽書自天下詔侯起家朝紫清扶持國論開太平整頓宇宙驅妖氛却學忠文挂冠神武門筍輿野服歸遊峨與岷杜陵昔覽舂陵行知元使君實國禎悠悠千載缺嗣音擊節為侯歌斯文瀘水清瀘水清采詩之官今何人歌成肝膽空輪囷青山髙為宋郎中德之作青山髙六六峯瑶鐫嵽嶫千萬仞斗起西南天半空蒸嵐噴薄不得泄翠屛掩靄深幾重不知丹梯委曲到何許飛樓傑觀縹眇疑神功丈人天上足官府愛此疊嶂髙巃嵸奏疏白玉京此山上帝之離宫臣請為帝守宫鑰檢課列仙功行之異同帝憑玉几頷其奏導以絳節雙青童嶽靈嶪峩逺奔命其下瀆鬼趨濛鴻丹書校録曉繼夕朱衣執侍嚴且恭赤眀龍漢屈指今幾劫珠幢羽帔可想不可蹤雲璈鏗鍧洞天曉步虛寥亮閶闔風有時山空夜永斗柄出復沒眩眼千炬煜煜燈吐紅嗚呼青山髙兮六六峯丈人宫闕兮逺層穹飛仙來往兮安得逢山中人兮媚幽獨烜山緒兮雪溪翁形癯霄漢舞皓鶴神茂晴巒森老松三生曽侍丈人之左右出入孔老竺乾之學該以通把茅山間二十年幽棲活計那韓窮白雲四壁兮風月窗櫳玉泉如飴兮柏實可饔丈人憫世日混濁勑遣下山開瞽矇被髮鞭麒麟駕霆呵靈霳髙岡一鳴衆鳥瘖不吐修門再入九虎獰以攻飄然整我飛霞佩佳山水處挾册從仙槎尚有樓突兀蕩漾萬頃風濤中酒酣浩歌蘂珠三疊之險韻出沒蛟蜃悲魚龍公自東南歸舟楫象浮槎有樓壓其上道逢仇池老仙伯握手一笑蟇鼻煙溟濛混成菴中據梧默數息眀霞閣上彈鋏看飛鴻丈人嗔不歸鸞歌鳯舞瞻聽慵我聞至人離世不忘世肯學山澤之臞塊獨守此虎豹叢歐子來自神清洞樂天故棲蓬海東手携天孫雲漢之機杼下與世俗一洗組纂之拙工後先相望幾百年帝命何獨私與公青山之阻煙霞濃六時滴水聲玲瓏猿鶴何知強悽怨祝公不用思􅍵􅍵我願飛章夜扣丈人九仙之寶室世路荆棘人心蓬洗氛滌祲待雨露驚瞶醒醉須笙鏞乞公且住千百嵗要使民有司命儒有宗色絲不盡今古胸帝衮何闕須彌縫笑談變俗為時雍青山青山長好在洞天氣物何曽改歸來瑶簡朝丈人坐看桑田變滄海岷峩歎坤文之秀世載其英行義詞章史不輟筆頃嵗以來堙厄不振長安日逺人情鬱憤作岷峩歎出門厭氛囂歸卧集萬感憑髙一以眺忽覺岷峩慘岷峩山色千古同非煙非霧愁溟濛杜陵昔歎珠玉走彼猶有幸天府供人才何但珠玉貴不得與爾包貢同上眀光宫山靈對我有慙色兹事如何專汝責非關地氣有衰旺直恐峽山之流日夜蕩潏傷土脈不然君相造命天地同其公車書萬里文軌通南金東箭輸不竭岷峩之産何獨窮沉思夜繼日嘆息復嘆息忽夢神官自天下手持山靈一尺檄鴻濛昔剖分帝命作鎮主坤文石紐之禹為帝平水土周家創業繫我彭濮人紀信忠漢世甘受黃屋焚何武仗劔起義不屈莽新費貽任永恥為井蛙辱張綱李固義烈排秋旻炎精熖冷國鼎峙惟我全蜀倔強為漢臣人人名節九鼎重餘事文章兼隱淪子雲相如王子淵康山之李金華陳涪江釣叟卜君平千載猶能想清塵皇皇藝祖得天統北辰中天衆星拱蜀逺只在殿西頭一言撤盡藩牆壅陳蘇范氏奮孤寒事業詞華兩推重渡江勳績張與虞太史之李如晉董江漢炳靈世載英托之前牒如丹青昔何烜兮今昧昧山靈未必真忘情富貴由來多捷徑強聒最為蜀人病君不見山澤之臞宋郎中奏篇語泄經逺屏經眀行修李兵部陛對萬言傷骨鯁氣豪最説薛袐書去國七年惟日飲陛下何曽讐讜言睢盱萬目寧汝捐傷哉三君皆九原抵玉於地那得全幸今耆舊滿巖穴一一無非爽邦哲柱史德望國蓍龜開府忠丹老彌烈參政未起東山卧李也立螭著名節少卿仙谷勤著書渡瀘歸釣二江雪侍郎斥還病少瘳校書執喪憤尤切廟堂何忍蜀才棄渠自方頭觸人忌岷峩為渠方含羞渠不知悔尚我尤汝行為我丁寧説與諸賢道二府榮途豈難到九重天上列仙班厚祿髙官清且要鑿方何能入枘圓使少貶之寧不然我聞斯言意戃恍夢覺披衣獨惆悵窮達其如天命何為士當先識趣嚮諸賢等是儒中英秉心那知有得喪憑誰為我謝山靈彼達觀兮寧可誑嗚呼參井之躔五十有六州文風自古能與齊魯侔三光氣全愛護猶如心與腹今半天下視之乃若贅與疣戀芻伏下姑汝留不然朝奏暮斥急理泝峽之扁舟君看兩三使節晨星猶下此六六州縣皆依流縱有志士能姱修長安日逺可想不可遊立賢無方自古訓誰能叩閽上訴十二之冕旒才生於世養之艱而折之易譬諸豫章杞梓倉猝寧可求風塵澒洞暗宇縣不有蒸徒誰與謀白駒空谷長逍遙可能縶之永今朝我歌慷慨兮豈獨私為岷峩愁勞心悄悄兮實與天地先其憂憶昔行送李成之徴君憶昔與君同射策同舟同館心膠漆萬言入奏甘棄置賴有湖山好看客歸裝濡滯及黃池半菽寒菹作除夕慨慷相與期古人聊復名場借梯級君家三秀立分鼎太阿覺君鋒更頴吏行鳬鶩閧塵坌寒露玉壺敻光炯五羊仙伯兩眼眀月秋薦書萬里徹冕旒四賢同時一網收朔風扶柂長江流遲頑我自費推激隱憂百罹霜鬢出未能勇決便幽棲寧免隨陽睨殘粒送君矯翮玉霄去為我一破胸怏悒向來四海李兵部正色立朝古遺直九原凛凛有生氣餘憤須與君湔滌世故翻覆况多端沉思使我心膽寒誰生厲階今為梗涓涓不窒驚濤瀾不知聚幾州鐵鑄此錯百尺竿頭一步底處著天位天職特用軒輊人眀眼勘破定何物波流何可金石轉鮑肆詎能蘭麝奪君不見考功望郎諌疏瀝忠赤垂紳滿朝皆太息信有宗工妙繩尺洪舜俞應詔上封事甚剴切蜀士得東南書云朝紳見之皆服崔尚書先生知人之眀梁園我亦塵下客法當冗散逃百謫滿意諸賢拱霄極讜言正論囊封溢國勢不難一枰活正途未易荆榛闢有謀勿憚時造膝救溺拯焚奚可失海南波寬老龍蟄朝朝滿澗玩泉石當為諸賢失衰疾我亦三呌喜動色早願采薇休戍役涪州荔子園行和友人韻愁雲暖日愁無邊荔枝園下客艤船嗚呼宴安毒於鴆燎原戒之爝火燃楊家妖女去復入開元天寶治亂如手翻覆間緑雲一縷天上去食自不旨寢不安長生昵語月皎皎沉香醉夢春酣酣羯鼓數聲花破萼霓裳一曲天開顔薰風殿開苦嫌熱驪山聨轡來遊盤汗綃紅透心渴煩荔枝不來慘不歡飛塵一騎關山曉奔騰那知血濺道一朝羽檄漁陽來決策西狩殊匆草百年宗社棄若遺何計奈渠春風貌雨鐸琅璫驚昨夢雲棧崎嶇回馬首凄涼故驛疾揚鞭嵗月轉眼弩落弦張后李父自一時西內荒階滿苔錢金鑑難忘曲江相浯頌長憐聱叟元涪陵荔枝不須辨故物紫金鱸骨何幸還陵園舊詩話以杜牧之一騎紅塵之詩謂眀皇以十月幸華清荔枝熟時未嘗在驪山然咸通中袁郊作甘澤謡載許雲封所得荔枝香苗曲云天寶十四年六月一日貴妃誕辰駕幸驪山命小部奏樂長生殿求曲未有名會南海獻荔枝因名荔枝香則知荔枝熟時嘗在驪山小杜詩乃傳信也蘂珠歌三華真士鍾若谷冥心北極創築靖館於宜春郡西三十里之獅子峯勢極雄秀足以駐天真飈馭延國家景福藏室經始工力宏大郡守岷下程某為歌蘂珠七言一章俾持以謁檀度者五雲鬱勃天九重俯視人境塵濛濛元和遷校品秩穹以帝命鎮北坎宫玄袍金鎧丁甲從洞陰戰勝魔絶蹤際江之涯鍾氏童宿運冥契晞玄風躡屩千里心忡忡戃恍忽與師匠逢桑梓歸愒敢不共精廬築就鈴岡東州西一舍獅子峯煙霞萬壑鎖鬱蔥勢與紫霄爭長雄樓觀營築擬翠蓬真遊下駐鳴笙鏞可無法言牖羣蒙帝何言哉層穹窿溟涬未辨奚所宗五文開眀日曈曨三洞流出金口中瑶函錦囊密緘封飈輪八面轟靊霳駿奔百靈翔六龍一念與誦萬過同登揖金母朝木公六天獰戾數有終申命校録帝所恫保制劫運禳災凶剪馘鬼怪囚北酆邊垂罷戰年屢豐妖氛退掃正道隆臣許職牧羞妄庸願見皇圖還時雍蘂珠七言歌舂容為師勸相鳩僝工咄嗟千桂凌碧空開度益廣積纍功丹臺列名仙籍通伐石著詞傳無窮長與此山同峻崇唐彭州改創南樓為賦長歌小洛陽城春日釅彭州牡丹花品極多西南號為小洛陽城翠幕家家誇國艷圍花命酒十日狂何如水月山雲日日長相見西州藩牧最佳處古木隂森湖瀲灔湖漘傑觀倚南牆剝雨催風嵗久不能繕後先知有幾賢牧因循何啻閲亭傳算緡懼不貸主計星火那能恤諸縣丹崖唐侯來布宣世故平生金百錬能將姦穽先杜敜不勞民膜加針砭焦心常念足公儲退食遑暇娛賔燕逮兹再稔治最成聊爾計工財力羡岧嶤飛檻抗雲表顯敞華堂屹湖面搜攬一州勝處尋丈間恍覺蓬萊鼇首抃樓成侯已迫瓜戍淡雲寒煙有餘戀君不見髙詹事吟詩花嶼巴箋絢又不見宋朝散照坐鞋紅玉壺勸至今子美子瞻詩集中能使吾州千古風流擅唐侯美政前哲同能自勒文比黃絹謭陋愧我拙吟咏漫綰秋蛇汙碑篆江山風月今猶昔墨客詞人元不欠誰能落筆萬丈飛晴虹九鼎雪山之銀堋江練送仲嘉弟東歸赴湖州長興尉喬松天與嵗寒節直從拱把禁霜雪如君生小樂真筌衆説咻之莫能奪青春閉閣蛾眉怨永日啖茹庖煙絶交朋勸止徒爾為我亦無言可開説老親坐堂眉不開姑請聊向人間來人間可欲如涕唾此心久已同寒灰太虛浮雲漫塵點眀鏡過影常往回宰官居士等人耳捨喧取靜非兼該知君心量已超越去盡障塞真奇哉王城蝸屋欣再睹燭盡鴉啼夜深語云從投足窺吏曹始知敝屣人爭恥長興風物吾所羡朝拏扁舟晚叩縣霜刃割魚慎莫嘗唯有青銅可照面我行作吏三十秋日暮不歸鳥飛倦臨分欲效昔人言畏子機鋒如閃電出門揮手即江湖猛利應無兒女戀題會慶建福宫長歌赤城峩峩五嶽尊青城亦名赤城帝命作鎮西南坤崇岡逺自太白分旁騫三峩下荆門黛面負扆如帝宸羣峰翼趨候臨軒耽耽千柱棲雲根黍禾之福此駿奔叢霄其上為崑崙上帝宫闕森五雲統御三界庀列真精廬福地周八垠稽首丈人希夷君鼎峙潛廬猶弟昆道書赤城山九天丈人與潛山司命廬山採訪使者同為三山真君仙班峻極何司存事嚴迹祕誰得聞我亦三生師玄元失腳世網如籠樊雨淚懴洗一炷熏琅函蘂笈披靈文龍蹻無路尋軒轅洪崖何處避俗喧上皇羅家插青旻麻姑公逺相為鄰欲往從之躡颷輪凡骨未蛻空逡巡白雲英爽恐未泯似聞樵叟猶花坪髙尚無為默不言遺世獨立非不仁世自迫隘汙我清一杯聊共雲端論松風忽作天籟鳴浮雲富貴何足云度世可不保此身寸田荆棘當鋤耘鬱儀結璘時吐吞不願泛海尋蓬瀛不願駕鶴朝玉京只願餐霞餌黃精閉息默坐持洞經長與玉皇為外臣儲福觀謁唐玉真公主祠華萼樓前花冥冥三郎雅知睦天倫脂田恩厚脫屣輕獨將泡影觀此身碧瑶六六秀蜀岷朝來鬱勃連夕曛石壇虛呵存谷神笳鼓驚散羯鼓春兄來問信杳莫聞玉真入道修行於青城莫知所終玄宗女弟也瑶池宴酣歸未醒千巖萬壑空煙雲一念之差隔幾塵蓬萊誰信有太真平生我亦厭俗氛祕籙曽受金闕君玄機儻有三生因不妨牧羊學初平謝新胥口監征趙立之立之名聞禮以聲氣相求袖詩訪我欲賡而未暇也後數日裒篋中所藏漢魏隋唐碑刻七十種相遺且逐一題識所自得特以長歌辭義與字畫皆遒徑有英氣自念好而莫能精鑒習篆𨽻而未得活法愧無以勝此兼金疊璧之贈借韻以舒感臆魯壁嶧碑逺莫覩艱哉河漢訊鼗鼓披荒摸搭不厭多翻閲端能助稽古向來四壁風雨秋誰遣彯纓羣玉府終年骯髒甘謫墮采采蒿菁不盈筥豈無蠧簡供咀味竟恨白石費烹煮有來剝啄契襟期眀誠無乃同而祖千金湊買不知惜傾囊要我細摩撫評書已愧老蕭翁作歌况擬昌黎愈臨池強自學點􅚭效顰寧容避譏侮𨽻畫聊從祖逖窺篆體那與陽冰侣拜嘉深恐傷亷甚贈詩想更用心苦擔夫爭道大娘舞精思神悟失寒暑銛鋒未易畫錐沙拱璧暗投等黃土羊棗共嗜能幾何圓規寧免齟方矩岷峨之陽一茅宇門無雜賔况市賈圖書悔不偕載行瞻佇崇朝不能俯遙憐兵火暗跌蕩守護童僕何不武辱君珍贈補闕亡金薤龍梭粲可數我不能捨我靈龜觀朵頥炊煙不動睡味恰與破衲宜殷盤周鼎愧君古人以相期瓠壺呺然問字無一奇試烹苦茗能來與我共商略功名兒戲可須千字淮西碑牛頭山寺菩薩住處牛頭山應真亦復棲其間寶坊樓觀疊髙下新城粉雉相回環崎嶇石磴雲生屐眼波不盡涪江碧江外青山春自浮曽與詩翁格椽筆為建平詹使君賦山泉秋風栗憀宋玉宅湍波磕湧三閭祠行人莫蚩我邦陋離騷千古芳菲菲使君玉立筍班上得州如斗不薄之冠峩切雲佩陸離欲與二子論襟期官居髣佛蓬島似翠霧白雲山四圍向來專情在巖壑愛此線溜來逶迤搜巖剔藪作幽事便有一𣲖銀河垂釀泉為酒旨且冽環滁之樂同一時有時痛飲挾騷讀聲和泉石含餘悽天涯有客倦行李雲間小隊來追隨窺公心源瑩澄徹亦如此水涅不緇里無追胥關薄征峽山今是春臺熙邦人恐公日邊在誰恤我老字我蚩何人勒銘泉上石後千萬年甘棠詩和南風歌悅齋先生於寶慶丙戌為那君叔眀賦南風之歌寄意深婉後五年自遂寧藩牧開府盡護蜀師又三年端平改元以憲部尚書召叔眀袖詩渡瀘訪余於滄洲書堂輒賡元韻華清舞徹霓裳散五音繁會宵達旦人間何限失意人西商凄切離騷亂我所思兮在東周小雅盡廢心之憂更堪羌調日嘈雜徑欲洗耳寒江流那君十指含清風家無卓錐心願豐仙翁賞音那易得水流益濬山益崇疲氓望翁起憔悴蒲輪加璧幸可致請君抱琴往從之解愠阜財皇有意喜雨歌部使者鏡齋梁先生以二江灌溉之利為西州民所寄督有司以時繕修會久不雨夏畦告病齋居蔬食遍走羣望誠意孚格雨澤昭蘇門人華陽尉掾程某以職事出入田畝間聞民謡之康樂也採為聲詩以咏歌之去年堰決秋雨霪南畝粒米如黃金縣官只道嵗中熟輸租歸家雷隱腹老翁戒兒力鋤耰忍飢少待眀年秋那知六月又不雨二江之流幾齟齬揵石震撼渠欲枯天逺不聞人號呼皇華使者民司命腸日九回恐民病齋居蔬食勤箋天灌口牲幣加眀蠲燎煙升空忽黮䨴須臾六合澤雱霈連宵簷響未渠休溝塍泫泫膏乳流疲氓彈指拜公賜枵腸便覺有生意邊城十年戢干戈鄰焰逼我將奈何可憐十室九垂罄倉卒軍需何以應人情但知樂茍偷更須熟為根本謀察公憂民意懇懇定知憂國慮深逺為公志喜商聲謳願公為霖澤九州喜雨上使君塞垣昏昏纒殺氣春陽暵旱慘如燬老蛟熟睡呼不起暴尫鞭巫徒為耳雲將族兮俄披靡飛亷之怒誰或使綿州刺史亦勞止寢不遑安食不旨瀝膽濡毫肝作紙封章夜訴天尺咫電幟簸紅雷虺虺一篩時有萬絲委旬浹頻占垤封蟻半夜流膏沃千里瓦溝佳聲密飄灑簫韶九奏未堪擬焦卷一朝有生意夢魚之占立可俟中原格鬬何時已軍儲急須問庚癸剝膚駸駸幾及髓國脈所寄將奚恃腐儒流浪半環水月蠹太倉三斛米干時無䇿顙有泚况忍懶書酣晝寐知元道州漢良吏可無長歌為志喜北風漲塵目易眯安得天河一湔洗豐年髙廪萬億秭重見周道平如砥西瞻堂子長愛奇隘八荒岷雪千仭瓊珮鏘太守德厚民不忘倚公筆椽輝耿光西瞻大書揭髙堂倚欄起我意激昻鏤冰刻楮非文章男子可不志四方送李微之以史學召鴻蜚冥冥天宇空誰令矯翮修門羾承平在昔朝多賢猶念丘園天爵共泰山豹林來復去河南白雲堅不動斯文程伊嗣興起露門日日峩冠誦雖然去就迹參差髙風等是光吾宋秀巖素心非少室萬卷本期供世用當家幸有二仲賢不妨老子琴三弄紛披竹素勤日課蕭索松風酣午夢有來虞旌賁空谷例與蜀珍入包貢中興巨典未殺青千古傳疑須折衷文孫嗣服渴延佇太史泚筆待錯綜姦諛已死不難誅古今一轍猶聚訟緇衣信能心愛士白駒誰復語含諷丈夫出處亦何常毫芒難博丘山重勿學退之憂史禍勿似子長誇雍從孤騫終不嚇腐鼠覽輝未易來翔鳳平生我亦煎百憂四月長江逺追送丁寧寄語季成甫東華冠蓋真一閧時撑小舫漾湖光莫遣紅塵撲飛鞚扶持姱節早歸來世故紛紛付時棟送別周憲使春風浩蕩龍泓口逢逢船鼓驚雷吼皇華使者捧徴書萬里飛帆上南斗岷峩上下十六城後先持節知幾人公來非爭赫赫名止水何曽風浪生腕裏權衡一丹筆與天通處惟欽恤孰知疾惡有剛腸乃似霜空鷹隼擊撓之不濁澄不清渠自好醜吾何心蔽以一言仁者勇嗜欲淺者天機深疇昔聲華塞穹壤旰食遙知渴忠讜紛紛鰍鱔困掇拾縱壑之鱗多漏網公歸便合橫南床或袖諫紙朝眀光好將外臺督姦手鋤却草年荆棘荒功名時來寧我貸不朽之傳軒冕外攬轡埋輪自一時至今日月炳前載才踈意廣一腐儒青冥倚公借吹噓病卧錦江八十日出門搔首空踟蹰西南望逺長安日寒雋陸沉幾千百乞與開陳政事堂更把夾囊細收拾軍興料須色目繁師老力屈民煩寃養疽一朝思潰裂廟謀得不憂本根三年福星耀參井愛士如渴民如命只今歸覲太微庭勿忘棠郊日延頸腐儒州縣甘浮沉骯髒羞作附驥蠅佇公入和南風琴磨崖大書頌中興送崔吉甫外刺安康分韻得客字崔郎神駿如天馬兮來西極霜蹄蹴踏汗流赤不令長楸嘶風扈屬車亦合交河涉冰摧敵魄世無善御如王良可能帖耳受鞭策棧雲嵳峩漢江碧一眼長淮天不隔風寒幾處索調護我有奇謀同藥石囊書行萬里三載京華客浮雲黯黮一掃空歸來雙劍翔鳬舄行臺岌嶪立分鼎叱吒風霆人辟易文書曉夜來急急吏衙事繁牘山積那知退食清心堂萬卷敷床客滿席落落一世誰憐才令我推枕三太息翺翔半刺頭欲雪袖長奈何地褊迫我聞安康坦途走洛師內與荆襄梁益通血脈軍興生聚計蕭條嗷嗷悲鴻尚中澤鼓鼙何日當罷警濟時孰是良籌畫薰風催熟崆洞麥本根須人為愛惜志士慘淡意則同摻袪况復念行役君看老驥久伏櫪一蹴千里如咫尺醉歸為君慨慷擊唾壺天雞三呌東方白
