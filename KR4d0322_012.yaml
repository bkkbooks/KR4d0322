body:
  text: 滄洲塵缶編巻十二宋程公許撰七言絶句積雪未晴正旦朝賀大慶殿口號八章雪瑞連宵未肯晴粧排光景待朝正八盤嶺轉宫城近惝怳身登白玉京清蹕轟雷輦出房赭紅一㸃殿中央天知聖主憂邊久剰放飛霙兆歲穰萬㸃華星續續來宫門未放玉􅙞開忍寒少待晨光透不住催班引上台東西廊轉靣朝天緋綠斕斑紫綬褰萬歲聲中陪率舞野麋終羨草芊綿凝旒憂顧念三邊詔撒鼇山罷秩筵天眷仁明宜悔禍眼看千里息烽烟六龍不動玉鞭迷霧靄荒寒五鳯癡静閲天機消復長未應氷谷晛消遲玉階再拜巻班回一炷心香憫刼灰六合風塵須一洗八荒夀域會重開擾擾勞生祗自嘆依依鄉夢五更寒臨流釣石應無恙歸逐隣翁整釣竿工侍國史李丈奉御香禱雪上竺前一夕雪瑞已應道間志喜成詩以示敬借韻同賦夜窻細跋燭花紅窻外那知雪墮空危坐不如眠較煖紙衾休要水沉烘列仙朝罷玉皇家一色中單襯白紗纔得東皇呈上瑞萬年枝上早開花未問含章眩曉粧巧将珪璧疊宫牆愛民天子心堯舜猶自黄封降御香阿佛常時奮老拳為銜詔㫖意精専且煩大士開顔笑吹散曼陀黼扆前憂旱憂蝗恰一年未春喜見六花妍極知氣脉艱調䕶須得醫和為保全灞橋風景渺荒寒最好騎驢物色看得似西湖湖上境被公驅使入毫端聞道孤山未有梅春郊早已艷玫瑰何當結伴林家去共擷香英酎一杯又省闈鎖宿十月十三日夜月獨酌霜月鋪銀灧瓦溝憶曾盡醉作中秋侵天圍棘孤吟夜且著紅爐為暖愁兩月重來月又圓寺鐘驚夢五更殘此情誰遣啼鵶覺飛過東牆代訴寒臨卭試士沉沉鎖棘春風晩漠漠重簾晝景移白紵曉寒疑夢事袖間猶記墨淋漓再和賀及甫領西清先生薦牘薦圅引重一何頻盡餅充饑恐誤人公道晩遭諸葛相且煩輿致倚經綸萬里因人作逺遊眼明西北有髙樓蛾眉嫁晩貞心在閒倚春風唱石州功名壯節易華顛揚簸翻羞糠粃前老子鑪錘無別巧精粗良窳任天然謁侍郎李先生自潼移鎮武陵賦就凌霄意欲僊却飛霞佩武陵源桃花總是甘棠舊重與郎君憩鹿轓異時乗月喚胡床便羾青鸞到玉堂見説紫清虛佇久漁船休戀落花香公歸帝所斡鈞衡早為乾坤洗甲兵第一人才須汲引泰階平待拔茅征春風曾得曳長裾再見應知勝百書從此修門天萬里可能誦賦憶相如平生知己兩蘇公乞與宫商發爨桐歸日鴈湖談夜雨南枝有信待東風䕫門邂逅同年汪丈奉議示詩和吟三首萬里吳天問去程停橈峽口約偕行蒼顔相對曾相識千佛經中記姓名鵬風九萬是修程駟馬何妨緩轡行聖治今方法元祐白頭儘耐立功名造朝敢不戒期程鼉鼓明朝又趣行好趂雪晴同訪古東屯詩老舊知名羅漢洞青衣中巖洞與潼川牛頭洞相通此洞乃其後門也中巖洞透牛頭洞後洞門從此處開刹刹塵塵皆住處勝逰何必限天台内機知府郎官再和示敎清拔遒美手不能置用韻以答嘉貺愧不足以當瓊瑶之報也新詩俊敵鮑參軍結字歐虞瞠後塵我亦平生違俗嗜與君交似醉陽春莫倚鳴髐力有餘天扶興運要驅除可須測象疑蓬埽時邸報太史呈有彗孛之災便擬排雲上諫書長憐杞菊老天隨未必無才可濟時蓋代功成一炊黍清名過取恐非宜愛閒天未許君閒國步扶持奠鼎安千古淮淝一棋局土山盟在未應寒世味輕於玉斗撞向來驕氣為君降蹔離約㑹春風早催逐飛䑺下楚江廬陵劉兄焱袖詩編藁相訪借所和施從可唱酬韻答以三絶句天憎我輩韻孤清故遣催科塵汚人幸有新詩為湔祓英瓊瑶未足為珍拙與時乖勿誤謀可能騎鶴更揚州翹英似子寧終困玉帛何時來蹇修清愁如海𣺌無邊強整衰容傍酒船若許白鷗同保社五湖秋水碧於天送楊元光隨編修李季才出守衡陽逃虛喜聽足音跫况是鄉人萬里逢江海茫茫天盡處又攜書劒入湘中君到瀟湘漸迫秋鄉關音問轉悠悠思歸少忍煙塵息回鴈峯前莫浪愁君家屋近我先塋累世交逰意氣親夢斷金梯山下路欲談往事恐傷神余先世眉之丹稜與元光諸院為隣金梯祖墓在焉萍梗天涯幸有依魚兮川泳鳥雲飛祝融紫蓋題詩了早趂賢侯召駕歸自永康還連日又告旱懇祈勤恪初四五日再得甘霔農疇無髙下沛然沾渥因賦絶句志喜井花湔手寶香焚一念何曾隔紫清半夜瓦溝飛急響化工元不吝生成穉苗蘇醒曉風凉老魃匆匆遽俶裝旬浹望霓心肺渴蹔須一啜露華香去年西浙颶風髙瞬息三州汨海濤欲倚人謀銷咎證扶持那可欠英豪茂陵何識瑞乾封遑恤蕭條四海空魴尾如今較勞止廟謨端不倖邊功雨餘遙翠抹飛霞風送蛟龍恰到家一夜凉侵蘄竹簟最宜欹枕聽鳴鼃虞使君示春日喜雨六絶和韻相思一日似三秋况是三年急景流一笑玉華池上路春風為我盪牢愁入國洋洋頌借留二年髙廪趂時收可能萬物盡吐氣邦伯人人元道州世故紛紜劇蝟毛利名海裏火銷膏何如道院三更雨稽古功成秋兎毫記擘吟箋手欲皴至今滿篋玉湖春郢人妙質何曾死乞與風斤運用神悠悠千古意茫然婭姹誰非倚市妍心事相期流俗外牽聨玉海儻同編引袂天風几席傍滿城無處不甘棠定知丹雀衘書近趣擁弓旌入帝鄉和虞使君春雨詩翁髙卧滄江上㡬為憂民霜鬢毛推枕中宵賦春雨筆鋒如瑩鸊鵜膏宿旌陽風月無盡藏和虞凔江二首玉塔界山松靄外荻花翻雪晩風前輪蹄漠漠紅塵裏不著藤蘿鎖洞天仙翁飈馭何方去猶記淘丹冽井中莫倚危欄長引嘯恐驚鸞鶴下罡風牡丹春工殫巧萬花叢晩見昭儀擅漢宫可惜芳時天不借三更雨歇五更風改作池亭子安弟賦二絶因和韻凌波微步玉亭亭華豔深遮萬蓋青能使官曹饒野趣小煩月斧敞風櫺榿隴低風呈遠碧稻塍分溜溢方池簿書課辦心如水獨岸烏紗細琢詩移住郭婆井官廨二絶句絶知家具少於車伴我奔馳幾篋書賴是官清饒暇日忍敎書冊與人踈官居何得似僧居著穏層樓望眼舒繞檻湖光與山色可無佳句與消除中秋和姜主簿韻中秋月白古來慳孤坐寒窻思黯然懶近舞腰花十八恨無珠履客三千三更露氣滿秋堂祕訣新傳食月芒安得南樓三百尺暫容老子據胡床被檄北征從宣威幕崔公之招也芹藻浮香水半環官曹得似廣文閒羽書趣上将軍馬却擁貂裘度劒關和内幕季美武帳宵寒漏箭傳元戎威望響秦川機籌整暇一横槊寒澁何能强比肩再和二首敵技無多莫浪傳西京元是宋山川書生但可謀帷幄壯士得無須彘肩五丁鑿劒古今傳屹立崇墉蔽兩川滿目風寒無處避祗今由徑競摩肩謁告得歸拜呈内機知府郎官五首一屋堆鞋笑領軍人間滄海幾揚塵巻舒不與心為累琪樹瑶林別有春家貧儋石欠贏餘恩許西歸度嶻除只恐期程催趣駕羞顔挿架舊藏書違覆由來諱詭隨民勞未有甚今時一分寛受一分賜喜見留屯奏便宜公餘賡載不曽閒一段風流嗣建安霜月西牎誰畫取詩人雙聳玉樓寒膏車忍待曉鐘撞浩蕩歸情不可降一笑朔風寒掠面緩吟疎影蘸清江成都一月奔走人事喜於賦歸輪蹄霧漲九衢塵役役人間祗是親隨分世緣聊復爾蹔歸還我自由身賀秀巖李工侍七首工侍累章告老上命以西清候對加三秩華其歸借往歲天竺雪詩韻賦七章寄賀桐帽棕鞵帶染紅誰能仰箭著虛空乞身何幸天從欲贏得溪堂一笑烘瀟洒精廬此託家暑風一幅岸烏紗客來祗可烹茶待旋督山童汲水花白板扉無黛堊粧碧琅玕漸出垣牆巻藏汗簡編摩手賸與離騷譜衆芳封章三上意拳拳却恨歸無一壑専商畧浮生皆寄耳直須勘破刼空前雙檜蟠根不記年儘饒紅紫競春妍箯輿來往清苕岸坡頴那能此樂全徹桑那復慮風寒羇客相逢各好看誰辦草堂棲子美會扶藜杖過蘇端擬結三間剰種梅要令繞屋積瓊瑰與公酥酪元同味投老時須共一杯惜別五首里社婆婆五六年戍瓜催促上舲船官情得似交情好去意其如別意牽方舟追送愧情親水宿風餐兩日程欹枕清灘醒醉夢此中强半是離聲憂患磨人鬢易皤近來更覺別情難霜筠雪柏圖堅耐願保貞心共歲寒酒莫多斟且緩觴停舟沙步更徜徉清江後夜長相憶賸撚梅花訴斷腸珠樹森森秀阮林髙堂有母各歡心蘭陔娛養時多暇勿遣平安闕嗣音春晩客中雜吟四絶句憶伴梅花醉短亭驚心紅藥餞餘春不知九十日光景辦得晴窻幾欠伸昨夜青皇駕趣旋星榆散漫晩風顛一春無緒供陶寫滿硯塵埃費洗湔桑隂翳翳響繅車麥熟多時稻吐芽若使征輸寛一半人生最樂只田家怒風轉暖作隂寒春盡如何衣怯單最憶就林煨苦筍六年輕失此清歡臨途届郫値雨仙人念我世緣輕貸與山行幾日晴䄂有碧岑三十六不妨風雨過鵑城梁山客邸雨後月色佳甚寄懷及甫雨過青空月一痕風襟留爽到黄昏持杯未嚥思𤣥度今夜微吟何處村石佛道間見梅二絶句一冬川陸盡奔馳開盡南枝又北枝玉立世間塵土外子真那不笑人癡慘澹汀沙集暝煙林間飛下羽衣仙與君夙昔同心事可與悲絲白作𤣥山間桃花盛開槿籬繩屋間桃花晴日蒸紅片片霞物色為人揩病眼亂山深處詫奢華正月二十五日過真溪見桃花窈窕溪山狹徑通輕輿飛幰御東風倚天蒼壁人煙外也有桃花簇簇紅桃花簇簇有人家寂歴炊煙晩照斜滿眼芳春無處著一機新錦濯煙霞衢信道間見紫薇花紫薇花自非凡品何事栖根枳棘叢白髪舎人羞見道相逢那敢恨飄蓬暑行聞黄鸝聲人行午倦渇思氷黄栗留鳴綠樹隂安得故山歸燕坐竹風牕户一披襟投宿中巖口酒家漁艇衝烟巖口泊村醪注瓦甕頭嘗雨聲夜襍灘聲怒借與行人一枕涼遊下巖崇封院鼓枻前春過下巖空将目力寄雲端而今真箇巖頭去領取煙雲潑袂寒石扉深鎻一龕雲未必人間隻履存持鉢欲尋劉道者鏌鎁不在刻舟痕殘麥從渠官奪之山僧何用怨長饑人間六月紅塵裏無此玉龍千丈飛二蘇屐齒尚班日憔悴涪翁竄逐還卧虎跳龍遺筆墨祗今精悍滿江山清虚堂裏話襟期友似蘇黄從可知墨寶惜無人愛䕶漫令遶寺覔殘碑曉晴度青城繩橋二絶句大皁江頭寒雨歇蠶崖關外數峯明丹青誰會開平逺著我繩橋度曉晴怒濤噴雪戰魚龍架篾成橋裊半空世路險夷那不有此心安處本來同汲恵山泉烹日鑄小艇衝風過恵山石螭引脰佇漪漣白頭未了紅塵債再酌人間第二泉辛未冬嘗經行酌泉瓦缾挹注溢微瀾仙掌兩分瑞露漙自候燎爐烹日鑄杜陵肺渇耐甘寒泛霅溪旱暵連旬塘水渾移舟來泛霅溪雲溪邊釣隠如無恙那不嗤人骨俗氛白蘋波動栁塘風散漫芙蕖稱意紅午夢驚回船轉柁買魚前港一樽同龍洞閣崢嶸罅石蛟潭閟偪仄懸崖閣棧危横目不虞雙足蠒子長心事未忘奇文耀閣李鍊師即中天臺之側開窻面東余為摘顔魯公麻壇碑中語扁為文耀閣併題兩絶句中天臺畔敞東軒滄海桑田且勿論欲問飛仙參要訣晨興來就日華吞宴罷瑶池趣駕歸海風飄冷六銖衣霞舒霧捲知何處五色毫端借發揮墨妙堂斷石殘碑聚一堂螭蟠鳯舞費平章顔蘓喜得初平侣名節知無愧范滂墨妙堂使君新命工摹刻山谷所書孟博傳于顔蘓帖之右洪城沈運幹新園三首花壓牆頭栁映門紅城一曲沈家園意行自與春風約休問新亭賣酒喧栢梢結翠鬬尖新未問花枝挿寳瓶最好狻猊對雛鳳向人翔躍似天成方池面矗石叢叢後掩前遮一徑通蒼蘚修筠加愛䕶等閒幻出小玲瓏伯謙招飲龍潭攀桂亭碧潭四繞水仙墳老桂團團䕃綠尊拚與故人償一醉梅花吹夢過前村宿金山院犯暑驅車潑面塵招提暝色喚休程竹風滿院凉無價最好移床就月明繼榮上人求無本庵頌自性元來一法無更於何處著工夫横擔拄杖長安去才出門時盡坦途為滄江虞使君賦客室三首丈室縱横獅子坐仙裾雜遝蘃珠宫世人莫笑渠荒幻且驗靈臺一㸃中四達皇皇一廣居此中妙用絶方隅客來請問名齋意拈與床頭太極圖屋下何妨架屋重規模不與俗人同君看萬象森羅處豈有纎毫礙太空次韻感懷稱意人生不待多誅茅只愛傍滄波萬間方丈均容膝苦志疲形能幾何四海堂堂范與蘇斯文價重百車渠頴昌舊第歸無日且向蟇津穏僦居雨淫蕭艾掩嘉蔬况敢堆盤薦腹腴借問素餐顔有忸河邊寧作鮑生枯盛時饑渴佇嘉謀慮逺何難彌近憂搔首風塵彌北望馳心江漢入東流緑水油油記插秧轉頭風露稻花香秋來田井熈春晝畫手難為顧長康立冬節齋宿竹宫悼姚髙士髙士卒之先一日為菊澗葬賦小絶用其韻竹宫冬孟嚴齋祀深炷爐香跋燭花凋盡庭梧風摵摵幽思也到羽人家燕坐心源如止水餘工吟筆爛生花誰知此老真三昧孔老瞿曇共一家金鯽魚猶涵藻澗玉㽔香未破梅花人生轉眼皆泡幻勘破須饒老作家把茅未就橐懸罄奎畫飛來天雨花欲識髙人歸宿處佩霞長侍玉皇家認取太虚無一物本無幻翳况空花桃椎思邈還知否佳傳寧無良史家題宋器之煙波圖萬頃煙波一釣翁𤣥真心事偶相同平生我亦輕軒冕分取苕溪半席風題詩巻嚼雪哦詩格外清誰今失脚入紅塵錦囊二十篇中景長與西山面目親嘲清徳堂前紫薇花仍代答襞積仙裾耀紫霞西清兩月擅芳華託身塵土寧非誤何不西垣侍判花文章不辨演絲綸失脚塵勞勿更論茵壤飛花適然耳一觴聊復伴黄昏寒食上巳雜吟八章一百五日風雨過二十七種鮭菜慳三年客裏作寒食得似今年身暫閒手劚蒿萊三畝園紅雲一片小桃源無端風雨連宵惡檢校殘英有幾存碧桃花底小寒輕綽約仙姿格外清錦繡巻還春去了藍橋風露放雲英春寒十日意無憀酒竭從敎壁掛瓢新火暖開晴色快疾風吹盡積隂銷渺渺江村一掌平春風何處不堪行誰知方外有司馬更合江東稱步兵新栽楊栁舞風弱老去海棠烘日殘且問筍根新茁幾䕶持留作釣魚竿雪糝酴醿壓樹香松花蔌蔌墮輕黄牛岡西路歸來晩時有烏鳶舞夕陽萬里弓旌喧特招無能分合侣漁樵論心幸有西隣老拄杖敲門話寂寥季夏郊墅即事皛皛飛雲挾暑驕江郊幸可逺煩囂道人方寸虛生白燕几風清扇罷摇碧琅玕繞碧梧桐面面軒窻面面風剰著圖書圍几席何妨門徑擁蒿蓬小築新成面勢寛探囊羞澁一錢看也知歲晩須棲宿敢向明時詠考槃手鋤荒梗藝瑶華敢覬諸公借齒牙通塞非人能計度貞心祗自保修姱儒林冠冕國蓍龜黄髮同時二老歸崔李二先生同召出處古今難一槩青天未可戴盆窺午窻讀倦枕書眠起拆茶包手自煎大地衆生愁暍死清風一壑可能傳自隨官牒却居閒樵叟漁童慣往還種竹且敎疎見月開窻莫遣礙看山性僻隣牆亦懶過日長何事可銷磨雲藍展向風櫺寫恨未疏池養白鵝心閒萬籟響韺莖古調何人細與評招手洪崖天萬里謂洪中書佩霞惝怳會瑶京力貧藏得五車書趁就炎歊曬壁魚安得身閒饒目力年年鉛槧課三餘事業悠悠雪滿頭流光那會與人謀作勞輸與田間叟紫芋黄鷄滿意秋怒雷送雨五更殘文石花藤探借寒腥穢百年須一洗五雲深處是長安桂花露香消渴桂花芳天氣偏饒八月涼不是窅窊分得種人間那得許清香一秋無雨亦無風比似常年逈不同鼻觀了無分別想道人結習本來空雨花那得著衣裾遍界香分佛飯餘金粟如來元一㸃横陳妙供儘從渠書室以黄花圍坐二絶句枯禪不羨阿嬌屋静俟寧須郭隗臺天憫羇貧大癡絶喚将金色界中來給園光景無邊際趺坐西窻日落時欲識當時黄面老莫将色相等閒窺丙子重陽觸事有賦得絶句七首槃水平生謹自持苦為痎病費醫治一秋偏識端居味餘事何妨讀杜詩䇿䇿窻前落葉乾晩香空自傲霜寒力貧未辦傾家釀一酌親顔也自歡去年今日枕江樓對酒談經夜不休聞道黄花滿仙谷莫敎兒輩覺風流雅志求仁苦力難知他隔許利名關流光俛仰一彈指與世浮沉祗强顔薄宦羇縻兔落罝西阡不到一年賖銷魂霜露増悽愴陟屺瞻思晩日斜風雨連宵苦淚澘可憐半作冢纍然鍾情叔氏如酥酪歲晩相隨對榻眠寂寞隨人藥市行可能金石盡知名飛仙未必真違世長使癡氓學衛生重九前一日到家霜日晶熒水尚肥順風一舸送将歸黄花笑我猶牽俗得似淵明勇拂衣親友招呼鼎至簡以二絶句勌客歸來住不多頗思散策日相過膠膠擾擾敗人意那得長閒共切磋璀璨堆盤水陸珍自量薄福可能勝何如小摘春畦綠共話西園夜雨燈慧明王道士贈蜜黄精慧明道士別經年肘後飛金秘不傳崖蜜黄精分遺我氷容或可覬飛仙和家恭伯韻別曹揚休還涪陵五首春風有客夢刀頭政好将軍侍太丘為惜交情留信宿無端檣燕聒離愁精藍靖館手同携細與重論文暇時須信有方藏肘後可能無藥起支離膠漆論心忽離羣栁邊躞蹀馬蹄塵清風朗月相思夜依舊江山面目親朶頥渠可換靈龜世事艱如整亂絲執手應須細商畧古來成敗幾枰棋讀易巖前訪徳人分明枯菌茁芽新趨庭領會傳心法一笑陳編萬古春嶺雪融春水漲溪留連尊酒話精微藍田膝上還相憶半偈何當問指歸晩晴登樓和叔存姪日澹霜明雨意慳楓林稻隴褧衣斑小樓觸目秋容好得似蕭晨起看山放浪煙霞我亦曽誤憑宵夢繞觚棱眼明一片蠶崖雪便擬搘笻最上層再疊前韻一秋吟思奈天慳醉面無因㸃纈斑衮衮簿書成底事朝來爽氣在西山錐刀較計我何曾商畧人生且摸棱九萬里風鵬背濶倚欄不隔碧霄層又雨霽登樓雨霽憑欄物色佳鬅鬙疊嶂斂烟霾羈愁要著誰陶寫且把昏眵為一揩晩日西崦落照暈金鉦斂退癡雲作嫩晴忽忽暝烟行十里前頭燈火是䳌城五月十九日夜雨三日炎歊不可當一宵風雨夜微涼羣龍莫吝為霖手且與乾坤洗戰塲三溪隂雨青山一峯穹秀可愛山色溪流共蔚藍此中有句為誰參老蛟噴霧舒還斂依舊攙空碧玉簮上朝天坡舊逰幕府無餘俸載得雲根幾片歸愛此嶔㟢蒼玉質剰判莎屩滑煙飛過茶坡栗坡回望平川杳靄上到茶坡又栗坡瘦笻倚倦碧嵳峩那知一片煙雲澹望眼偏於此處多和眉山楊清父龍淵小舫四絶句誰能投筆規萬户但可短篷稱散人偪側世途何處避千金難買是閒身嬋娟倚市為誰好膏火置身空自煎何似濯纓歌一曲秋江淼淼碧如天題西林寺覿面江千千尺像一州勝處說西林雪濤欲驗青衣漲步轉雲堂向後尋小圃茅亭初成即事十絶句手劚西牆擇地偏踈篁慣與養風煙鋤荒當得經綸否聊作仙曹小有天一時花木斬新栽露萼煙苞逐漸開好事人人能愛惜莫敎容易擁蒿萊小築分明是隠淪何妨隨分樂青春諸君莫笑茅茨陋野意蕭疎更覺真詩情不慣吏塵囂心事偏耽野趣幽縱使酒尊空北海客來一笑也風流海棠數㸃漸嬌春匝地何時簇錦茵不耐汲泉勞日課夜來一雨陡精神未能手劒血長鯨只合瓜田老邵平斗粟驅人成底事漫将吟嘯寄髙情鑿池取月未傷廉何必蓮峯詫藕船少待清渠通綠溜醉歌綠幰鑑明蠲北風眯目漲煙塵寒勒花容也自顰袖手何能供草檄等閒題遍錦江春五百風光巧作寒晚春未可試衣單只應殺氣迷關棧便覺人情有兩般醉裏眉攅萬國愁杜陵聊復傲滄洲扶持何代無人物魚鳥飛沉得自由除夕和唐人張繼張祐即事四絶句六花集瑞九重天禁漏催朝夜不眠流落那知新厯換楓橋寺外看漁船經世無才慕管蕭風塵搔首故鄉遙瘦藤忽夢尋梅去裊裊寒溪獨木橋一笑升沉休問天賛房贏得日高眠五湖浪透門前港何不乗風穏放船一簮華髪雪蕭蕭流景星馳道轉遙撥倦寒爐雞唱曉春風攜手趙州橋
