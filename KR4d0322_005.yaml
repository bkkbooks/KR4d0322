body:
  text: 滄洲塵缶編卷五宋程公許撰五言古詩理舟入奉大對臨發有賦弱齡誦書史所慕在經世靦顔科目中頗恨愆素志天府兩貢書恥逐時粧媚諸公誤賞音偶玷春官第王明渇疇咨臨軒有故事明當鼓枻下陛對去天咫采蘭有常供胡為輕萬里趨庭願有聞丁寜汝其識謹無曲學阿恐作儒冠恥士當志逺大富貴餘事耳百拜請書紳誓言其敢替萬古洙泗傳豈為青紫計良月十六日以祈晴宿齋郊壇寺僧拉登梅嵒讀髙孝兩朝宸翰記事祝册頒九重郊丘以晴禱小臣職駿奔單車勌塗潦崇阜踰巘崿層壇敷秸藳中興念經始面勢若天造濤雲日兩潮幄霧山四抱袍毳亦可人杖藜共幽討枯梅傲嵗晚隂壑得寒早勲華昔同来奎文絢麗藻山靈沐髙澤虹彩軼晴昊苔蹊幾窘步椶榦撐健倒嵌竇咽泉流金石韻擊考齋廬耿燈青簷花垂帶縞苦憐風力癡未快霾隂掃排雲出烏輪測景進黄道六合還清明烟霞願投老和憲使張郎中四海一竒男象賢真柬之繡斧外執法滯淹猶在斯氷壑棟梁具鳯梭雲錦機粉省趨含香璽書嗇封泥生平方寸丹雲端雙闕齊小試川檝手晒網蘆中磯以道拯世溺先事防繻袽三江昔怒號一席今淪漪平波淨縠浪祥風浹瑶池八極滙濤瀾四顧蛟涎危孰能戒維楫重與謌平夷上茶使鄒郎中孟卿四海一道鄉千古有生意元宗得君侯風流是以似窅然天機深寜以物欲累丈夫要如此步步皆實地政術自學術本來同一機後生溺華采用世理或違恭惟自孔氏六籍探指歸心清事自簡吏瘠民則肥忍話去年事令我膽欲碎公獨於此時砥柱衆流滙事難見君子爾曹費車載海山危風濤當有巨鼇戴節傳擁玉帳天遣西南來怦怦朱絲䋲皎皎明鏡臺稂莠亟芟夷本根費栽培度外廣物色世豈真乏才廣文官獨冷博士冗不治况此侯國頖贅哉童子師蕭散非鄭老文章慙退之可能氷雪地一借春風吹喜雨上西清崔先生東皇司發生何以忽僤怒旱乾遍兩川隂陽錯常度侍晨秉清徳方嶽煩卧䕶隠憂切四體曉夕煎百慮尫暴奚以為丘禱元有素皇明一頷首膏澤倐如霔豐隆鼓増氣耕父愁失據苧桑鬰華滋餅餌當厭飫乃知天九重不隔香一炷宇宙滿戈甲椎剥劇刀鋸殺氣惨未除衆慼那得籲毋以休咎徴諉曰水旱數憂端轉搶攘邦本須愛䕶願公遲東歸為帝寛西顧以萬金良藥起衆兆沉痼使民安農疇櫜弓藏武庫為霖澤四海嫓迹商巖傅工侍國史奉御香禱雪上竺前一夕雪瑞已應道間志喜成詩以示敬借韻同賦庚子嵗維夏亢陽一何驕侵尋徂暑廹惻怛聖慮焦祈禱喧三農雩祀奔百僚商飈忽以厲老魃意愈囂萬井沸湯釡四野烜赤熛俄聞罪已詔還下中興朝寳香欵太一嘉薦羞廟祧移蹕給孤園熏心梵音潮芝葢屏不御鸞扇亦罷摇還宫慘玉色轉燭翻天瓢小臣忝侍祠囊封叩層霄帝念亦勞止暵災殊未消良月始沾洽封畿轉蕭條白瑞彌渇望沍隂那易料測景展繡紋飛霜困青要麥芒鬰不吐蔬甲半已凋足蹷叢祠趨潔蠲沉水燒忱念交肸蠁同雲散瓊瑶夜忩訝明皎曉檻俄紛飄天意竟作慳瞬息倐已消冬瘟幸稍壓蝗蟄故自饒東皇趣命駕北斗將旋杓更須絮亂撥間作珠碎跳儻幸尺許積庶幾食可邀莊子邀食於地民脉餘幾何邦儲况復枵但知骨髓瀝遑恤膏火焦老我雜班綴素絲颯飄蕭强令典綸綍拙不工琢雕炯兹方寸丹敢以後福徼世味本枯淡癙思劇蒸敲灑血書緑章飛神羾清飂玉食自不甘黄竹寜復謡扶持倚梁棟諮詢及芻蕘正途㑹四闢賢旌欲旁招上帝如悔禍盗賊非難梟斂盡戰鋒慘重使農畝劭玉燭調氣機黼扆寛旰宵量才愧擁腫賦分甘漁樵經綸有管樂議論付董鼂故山歸去來嵗晚樂逍遥曝背茅簷日擊壤歌帝堯代上䕫帥丁文伯璧月行素空流魄寒潭水水非與月期月豈待濯洗天光發於定妙契元一理士生無南北樂在相知心同行不同調有如辰與參一言針芥投山水皆知音畏齋天下士執鞭愧我後當時儉府蓮最説庾公秀十年一欠伸西樓黯回首油幢古䕫子鎖棘外南宫寳鑑貯英裁氊筆題至公訊舊一以悽浩蕩華表風宇縣莽烟塵人物嘆今眇蘭芷閟其芳所御或荼蓼隠思不遑寐令我憂心悄古今幾枰棋勝敗無常形世豈欠國手一著何可輕但恐當局迷渠知死可生向來一寸心行世幾濩落矯性動有妨幽思誰與豁為君歌慨慷長風起天末入都一年餘舍館五遷最後得楊園空屋僻逺市囂寛㓗爽塏火後莊文府以中㫖攘奪倉皇徙寓奉常之寅清堂成五言長篇瀆江萬里来武林一年客飄摇無定棲一一得安宅委巷逺塵囂八窻耿虗白氷曹省造請公退味禪寂乃者赤熛怒横為閭井厄羇貧幸我貰安坐有慙色侯門意睥睨府檄加峻廹倉皇襆衣被包裹到書冊曲臺許借居虗堂暫休息砌蛩伴宵吟樹鵶趣晨汲隨寓亦足娯一枝更須擇是身如浮雲何所為定跡顧憐性梗野雅嗜祇泉石陳力怯荷殳康屯况無䇿强顔雜班綴頗覺非本色時清早得歸永願守蓬蓽去嵗重陽日得彦威信附六月間二小姪及從弟姪所寄書自蜀閫遞中附至厯言去冬今春所遭兵禍及有司督廹科調之苦喜其存全哀其窘蹙灑涕如霰寄訊邀其下峽而邊事又告急未知其達與否也㑹杪冬見邸報宣諭使者余公侍郎改命授鉞盡䕶蜀師意欲以此事歸控骨肉㑹聚兹事其諧矣喜極涕零遂成長篇令節恩賜沐把菊開清尊天涯信音來拆緘為一欣展視未竟幅淚雨溢帨帉辭家甫八年邊塵覆全坤平生幾親故半為兵死魂縱脱虎口涎亦復馬鬛墳所幸二猶子從弟偕諸孫﨑嶇矛㦸中偶得性命存意欲守丘壠死不去榆枌是時陳理卿受命開帥垣奮身艱危際勉圖戡濟勲鏟壕峙城壁鋤荒列營屯敵至誓固守為力良艱勤變故起肘腋轅帳塞轒輼一死事則已萬恨誰與論遺氓能幾何天未許貸原貔虎蹔斂退冦盗還紛紛哀我數子者挈孥競驚奔亦不免維縶恐廹甚溺焚掠奪幸得脱歸來匿空村生涯蕩無餘暴斂何寡恩萬里逺訴我重我憂心熏爾苦我得知爾創我得捫豈不憶松檟嵗時薦炮燔永惟宗祀計忍自遏其源威也託我乆尚以窮愁言寜不思爾曹命危豺虎羣安得田二頃有屋休寒暄順風招之來相與共饔飱皇后職生化蟄蟄庻且蕃胡忍趣其斃獮割如羔豚夙傳老上殞國亂猶絲棼若為秋風髙已復羣吠狺呼童具黑瀋襞紙當前軒萬一郵傳通庻幾信息聞嚴装理航棹及春下荆門余公新受鉞尚義氣薄雲感我骨肉念不難隻手援茲計不早决噬臍何復云憤極思一吐聲出輒復吞長謡欲上訴九穹隔重閽刼運極必復玉石可不分感事建除體二首建國維藝祖受命同有虞除苛五閏後返朴邃古初滿盈持以道徳澤乆不渝平治二百年中原忽榛蕪定亂得髙皇如日升昏衢執中嗣堂播奕葉垂範模破碎今已殘敵人踵闚𨵦危哉武休破漢沔幾丘墟成功頼諸將三蜀仍覆盂收藏問何時官已廹征輸開倉儲百榖為我供軍須閉闗且堅守民力庻少蘇建大將旗鼔遴選兹維艱除授得其人國勢維泰山滿朝綬若若熟謀須萬全平生想衞霍摧枯無留難定論真黷武亦足激懦孱執爵酹太宫感慨清淚澘破敵豈無䇿百年祗長嘆危機屢反復地險失故闗成敗雖運數人謀忌訑謾收民心第一根本無創殘開納智與勇及時䕶風寒閉口勿多言天道諒好還木皮口紀事為故沔戎帥何進賦也驅車木皮口地接嘉陵市山川鬰盤紆草木慘憔悴昔在嵗辛卯大將何憨子行營與賊遇力戰遂死此道逄田舍翁欵曲問所以耳目親見聞朴忠今無比沉鷙老不衰甘苦同戰士以此得士心急難不相棄閫制力主和豈虞敵情詭幣篚方交馳羽書俄狎至初冬二十五坌入我内地或渡河而馳或截路以伺俄然斡腹來陡若自天墜諸軍抽摘餘精鋭能有幾千兵僅烏合轉鬬殊未已可忍負將軍同生亦同死落日塵土昏鼓寒聲不起至今堆阜間白骨猶紛委語罷聲悽哽相顧潛灑淚念昔佐戎軒世屯未云弭主公極仁明慘惻念此事露章求恤典爵子嚴廟祀意將勸忠臣為國當盡瘁儒守陳西和武將田與李田燧李冲後先被褒録名姓編國史敵知吾有人心寜不畏忌自古重徂征司命在主帥委託或非人險阻那可恃嗚呼數君子一死甘若薺推原其本心死奚益於世事大繆不然舍生而取義乃知丈人吉易自有深㫖往轍忍復云方來那得諱長謡激凄風嗚咽嘉陵水祖餞三山趙茂實二首茂實毓秀麟定振采鵷班由掌故籍田令試館職厯正字校書秘書郎載筆史筵轉丞容臺兼南宫舍人權直學士院晉貳戎監擢宗正少卿駸駸禁塗遽請外補宰相以上意留行茂實請益力詔直煥章閣佩以永嘉郡二千石印組二三執政及在庭百執事咸愕眙惜其去於是館閣諸彦以茂實為冊府舊游請置酒道山堂祖餞飲酣有誦大蘇公東海獨來㸔出日石橋先去踏長虹之句相約賦詩為贈分韻凡十一人餘三韻三人各補一篇淳祐改元龍集辛丑中元節也分韻得東字踏字二首煌煌洛陽城衢術萬國通車塵日交騖襟期那易同目成者誰歟言笑春怡融我自商聲歌君亦手絲桐西風忽以厲髙情逐雲鴻輟筆金鑾坡一麾滄海東補過要汲直草詔須陸公盈庭愕相顧蹇蹇胡不容君去我獨留我闕誰與攻况復狗尾續羞顔蓮炬紅三生巖壑姿失脚紅塵踏羡君得郡去勝事踵康樂雲海𣺌無津烟霞互開闔似聞石門蘚猶帶屐齒蠟惜哉荒遊誤竟為時論薄秉誼以事君奚間暌與合矧是侯社貴艱哉保障託宣室恐渇思趣歸職獻納我拙念請閒鴈蕩恣飛屩及君留郡齋為我拂塵榻送本仲聘君分韻得良字國家全盛時幅貟萬里長委幣到空谷靡才不周行豈其貴自珍而病匿弗彰南渡今百年蜀逺天一方彞典僅嵗貢幾人與庭揚况復多沮撓誰不甘摧藏戎軒起耆哲禮羅極精詳頴脱者家父玉質而金相邂逅志念同惻怛根本傷㧞尤首推轂有詔催嚴裝吾黨一吐氣彚征類破荒慨昔升璧水瀝血籲紫皇百壬眩縮頸斯文彌耿光倫魁合騫飛吏選何回翔孰知五色絲未盡一皂囊殺氣昏宇宙洚流𣺌津梁何以郤外侮盍先正皇綱翕合賢徳聚更須股肱良壽脉庻可續客邪不難防癙思耿宵寤傾耳鳴朝陽名節勉自立官職那得忙大難我同榜諸老競剡章渠豈州縣材籍甚英俊塲相期上連璧少待同飛航我自分斂退為君喜激昻流目大江滿執手薫風凉豈無佩繽紛奮起相頡頏世味竟落寞暇日聊相羊友誼古所重心知逺難忘嵗晚有良約岷山瑶草芳以堰事走永康宿金馬早行見雪山排霄極明麗因感行役之苦卭守程叔達郎中便民五事欲牛溪轉船朝廷下其議於帥臣監司不知衆議僉諧否也雨響清客夢雨晴催客行㢠野曉寥落界天玉崢嶸銀海眩雙照瓊鈎對孤明英雲强吐吞杲日還晶熒邂逅得竒觀瞻相愜幽情意疑邃古初立極扶西傾誰知絶險外復有蓬婆城青天危輓輸剽攘加怖驚奏函籲衆慼仁言韙宗英早願虎口奪少紓魴尾赬不勞嚴僕射分弓窺敵營又以堰事滯留姜主簿學父載酒相勞於離堆新繁宰鮮於子清永康理曹季徳夫導江士鮮於才卿同㑹穿江慨秦守曕岷懐子長成書著不刋明徳益難忘千載志尚友百里職勸相毎負伐檀恥欲期盡心償籠石飽冬霽雲車喧春陽經始愧前哲憫勞得仇香選勝山水窟浣我氷雪腸飛幰集諸彦引睇周八荒暖翠凝黛面晴雲抹川梁清歌勸引滿佳趣殊未央舉頭萬仞雪中有千斯倉采薇亦勞止薄斂恐未遑何當洗甲兵無以累廟堂文移寛郡邑靴鞭郤藩方源清流乃浚葉瘁根必傷念此意惝怳憑髙歌慨慷不如邀飛仙更與釂一觴李西清先生創凌霄觀於潼川府治紅樓之上賦詩敬和韻丈人氣湖海合卧百尺樓引袖麾八極無處豁前眸肯以治城志而忘天下憂窘步爭徑㨗危炊迷劍頭攀天限九閽起家先一州顧瞻衆山㑹慘澹春色浮憑髙展遐眺幾幅烟雨秋象緯逼紫宸飈輪通十洲吏衙散鳬鶩野盟參鷺鷗所思隔秋水倚天㸔吳鉤寄懐廣莫外任運逍遥遊遐哉郝使君一往嵗月遒名字著不朽實繄杜參謀後先五百年意氣有此不不須蘇門嘯我自商聲謳烟霞雜揮灑風月共獻醻跡忝梁苑舊目送涪江流可能呼小艇醉歌賡四愁宇縣暗矛㦸田原輟耡耰念公志經綸季孟忠武侯肯䄂斵泥手江海寂寞休檻前水東注鼓枻不可留撫翼附青雲忍滯鸎谷幽送考功劉大著出守嘉禾分韻得相字夙昔抱竒志取友周四方逺遊阻風塵隠思鬱𠂻腸羞以麋鹿性綴茲鴛鷺行三年去復還同省皆望郎劉侯交最乆徳履金玉相佩瓊矯衆嫮製荷耿孤芳暫寄錦衾直倚登白玉堂忽以刺郡請翻然整歸裝安輿擁鶴髮懐綬榮錦鄉那知檇李城騎竹喧道傍矯首候鳴騶如渇須飲漿紫禁屢入對從前幾封章肯袖活國手春疇課耕桑納約易為入公寜乆回翔熟㸔氣𢎞毅致逺可易量蹇我歸未能遲留重慙惶亦思丐一麾庻以毫髮償樂莫樂心知執手歌慷慨安得飛霞佩雲霄相頡頏送李季才户部出守衡陽君來我去國我還君得州世事巧違人參辰不同謀庚午蜀貢琛君名亞龍頭回翔三十年班序晚見收邊聲震宇縣樞筦須良籌心期白粉闈晉扈翠雲裘忽以外庸請髙軒擁前騶展也清廟器若為南國侯事㑹轉轇轕材難費捜求似聞石廪峯瓊佩鬱飛浮其下維清湘杜蘭滿汀洲官閒足娯玩聊以寛隠憂良㑹當有期玉泉來蹇修芳聲保不沫嵗晏終綢繆我迂諒無補行世况鮮儔言歸承明直塵容祗含羞思土重紆軫風埃苦淹留佇君建名業同理溯峽舟白首三間茅相依岷峨陬遂寜喻生畵鹿甚精介同官梁知丞謁余因令作八幅圖帳適赤城觀主惠一鹿甚馴未數日忽又一鹿犇至縣圃非邑士所豢養者竟不詳其所自來物理感召畫龍而致真龍似未足為誕也借邑士張權父詩韻以贈之生不逮治古郊藪觀鳳麟頗愛麋鹿性似是我輩人食苹詠周雅祝網依湯仁幸不主八卦非闗十二辰無魂休我欺掇皮詳皆真佳哉喻生筆能與元吉倫雅可簿書堆坐有澗壑春適意自起卧匿樹如徼廵便思投手板長嘯岸白綸藉爾為我駕仙㑹陪末陳人生幾蕣華洞天自靈椿謹䕶此畵本勿遣侵俗塵縣齋秋懐璣衡斡霄極裘葛參嵗功榮瘁均一氣何獨悲秋風往哲不我待今俗誰與同渥丹易槁木鬢鬒忽飛蓬丈夫秉壯節自信無終窮願勒羲和鞭長繫扶桑東弱齡去激昻漸老増感慨所親日以疎既往不可貸世途轉艱棘意行懼顛沛乾坤一戰場今古幾變態超超浮丘伯何修獨堅耐駕言從之游永嘯塵刼外㓜學自魯鄒素心卑管商誰令簡書縛課我星火忙我自友古人渠肯兄孔方飛檄浩盈几泛窺隠中腸閣束且登樓雲鴻秋着行春渠鍼緑秧秋畦壓黄雲積憂稍緩帶轉手俄空囷况彼東人子石田加灼焚算緍方趣辦䝉袂須勸分誰為本根慮天髙聞不聞瞿瞿彼奚窺樊圃漫折柳金甌費將䕶鼎餗戒顛覆屯雲曖將夕西風一掻首沉思扶持計誰是頴脱手需臑母乆翫利處那得乆癙思恐傷人聊復一杯酒雲濤扶胥口烟雨匯澤涯知心隔湖海悠悠我之思玉堂真學士衡門且棲遲那知古渠陽無地逃駭機昔在肩洪崖風騷屹相推道逺苦莫致孰與一解頥皎皎彼白駒空谷誰縶維吉士國元氣須造物扶持蜀西金天晶氣禀勇於義時臺紬書樂一麾豈其志堂堂蜀公孫加璧不可致語黙未易闚經綸那得避君㸔西山岑鬱積好雲氣膚寸澤四海斂退無一事持以問亨泉寒洌忍自閟暁案環吏牘朱墨勘舛差自公借隙光書函昡眼花千里有命駕同心樂無涯秋空霜月明秋山雲氣佳留連忽重陽列坐粲九華良㑹不可失醉酣整烏紗古人日以逺古心誰與共陳編如有覿整袂神自竦晝短疲衆喧夜永息羣動頼此一炷膏假我數行誦古今費探討心力老賔送世味乆已空餘業此偏重嵗晩儻得閒只願書冊擁學仙宗無為學禪空萬縁自昔抱竒志師心為真傳失脚墮世網茲事幾棄捐惟有一念息不受物欲牽空花起滅處我心長泊然冷暖渠自知妙處非言筌勞農安徳鎮古刹過句徳華園二首青煒留中分風日和且釅氷綃熨逺空雲錦織方甸農政自古然長官欲身勸皤皤彼黄髮懇懇余素念胼胝無乃勞推瀝不敢怨文移窘星火日夕靦顔靣所欣嵗洊熟况復江可堰䝉袂奚自來儲粟何以贍瓣香企璇穹徧界雨美饍天宫雨美饍華嚴經偈使民樂耕桑為國罷征戰堯俗可盡封嗚呼何日見招提欵松竹古碣閲楷籀惠然二友佳共此一巵釂扶擕涉幽園邂逅展遐晀海棠飲未酣芳檻破㣲笑何如老桂叢傲睨幾年少清言愜襟期轉首俄夕照箯輿度杳靄石梁穿窈窕留連得竒賞傲朗可無誚聊憑一餉歡緩我憂心悄明知古難挽嫌與俗同調民勞儻得醫氣脉猶可夀送平章解機政以保寜之節榮還里第孔山髙嵳峩其下一區宅敷床萬牙籖寜取籯金積委身事君子星駕莫遑息豈不念林巖政爾柄樞極巨川爾杭之陛下心以懌累章拜俞㫖告廷敡顯冊一笑堂印抛我友浮丘伯士以名徳重如䕶萬金璧受寵惕臨深持滿常懼溢恭惟學古胷富有經世䇿探懐取二三興運際五百賢人如參术足以壯國脉茲理要宻庸寜復膠於迹肘後可無傳能使夀金石先生還孔山宸奎掲素壁似勝平泉墅林立萬株石向來翹材館楹桷富山積終焉愧輪囷可能補寸尺淛潮浪拍天歸颿風借力百拜壽斯文華皓配南極何當脱拘攣日侍維摩室
