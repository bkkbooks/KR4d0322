body:
  text: 滄洲塵缶編卷七宋程公許撰七言古詩觀浩齊楊先生偕後溪劉先生白鶴魏校書潼川南樓唱酬三復嘆仰馳介詢問以古篆體書西銘為壽並和元韻一日不見如三秋人如湘浦春風樓危途崔嵬坂九折萬事變滅水一漚我公方寸湛古井砥柱四海之頽流藝蘭九畹媚幽處公暇獨立誰為儔畏虎一悟真知說亡羊不向諸子搜默參鄒軻論直養長與潛聖同四憂繡衣方看霄漢立青雲忽賦泛濫浮平生得趣稽古樂如水赴海無時休考槃棲我書萬卷有意晚歲專一丘時無子西賦招隱貪伴漁翁歸釣涪澗瀍脉絡元不斷洙泗氣象端可侔身縻簡書去無繇夜夢䇿蹇霜滿裘悠悠底是歸宿處願聞一語歸而求勇撤臯比誰復見訂頑之訓萬古留篆書為公揭素壁千里持寄寬離愁元關道祕杳莫授玉鑰為我一啓不池口昭明太子釣磯蜀僧住山相邀訪古和壁間韻繫船池口泛濫逰老禪邀我半日留岸莎堤桞度窈窕初暑忽送風雨秋蕭郎釣臺三間屋萬頃煙波媚幽獨長令千載好事人貪為淮山流逺目芊芊蔓草迷長竿臺城直作平野寬那知萬古文選理不盡詞源八節灘英魂逺逝招不得謫仙小杜底處覔插天􅍶崒九芙蓉試與憑高閒物色多勝亭宜春以韓公重東湖尤一郡勝處祖侯營創亭臺碣記古雅且南軒題評盧石扁榜如新而委之荒落可乎稍加繕修頗復舊觀仍摘昌黎詩句扁新亭為多勝紀以長韻昌黎文章緯河漢只合彯纓侍香案帝遣騎麟下大荒肯為吾州一笑粲至今千里被膏沐猶自霱雲餘絢燦後二百年來祖侯不以左官興寤歎西園作堂娛歲豐東城選勝湖波漫不知此湖孰經始秀水之涯矗堤垾花嶼逶迤雙徑通荷蕩渺莽三塘貫慿堤築臺敻清曠羇官賴此泄憤惋嘉二三子南渡來營葺頗能還舊觀風流轉燭冷如鐵仆雨摧風存者半蹇余意倦直承明次補適來忝藩翰腐不能通柱後文拙尤不辨牙籌算自公正須豁滯悶時屈何能事輪奐支傾補壞聊復爾護邃培高足娛玩江山入手要彈壓風月無邊供判斷高賢一語真實録勝游雖多此為冠水花岸草錯雲錦雨瘴清嵐無界畔忘機自與鷗鷺親無事從渠鳬鶩散老仙音塵可得追移得盧家石堅悍題評倚重南軒翁瞻相如瑟黃流瓉迂頑我豈經世具乞身去詠南山矸作詩聊與來者期何去後思可稱讚尚友三賢自不差時復慿熊一來看和賈伯用架橋築堤韻䇿蹇僕僕忘寒溫勞心惻惻桑棗村長虹卧穩煙雨面千金屹障波濤㾗涉川利作初九益括囊肯為六四坤道旁築室勿與議可使正論成排根六和塔寺館三宿和秀江亭詩牌韻鯨呿鼇擲三神山幻境起滅指顧間東西帆檣來復去得似上方僧獨閒看山看水知多少詩債責償殊未了膠膠擾擾竟何如早結把茅佚吾老雪峯道院寺評劉侯分竹石紐創此院賦詩落成左綿勸學從事某借韻寄題琅函真筌何所云丈人嵳峩五嶽尊矞雲晝護耀魄寶玉繩夜低天市垣瓊瑶其上矗千仞氷雪為人醒醉魂飛鴻沒處杳難辨飼虎遺跡應猶存甘泉使君趣丘壑薰爐默坐存崑崙真誥有想崑崙得仙者高齊圖史羅左右大厦風月相吐吞巖泉酒熟芳桂蘂茶鼎火活蒼松根坐邀麻姑來擘脯祗恐摩詰難亡言界天之雪滿窗戶喚起老仙重與論丁寧來者時汛掃燕寢可避蜂衙喧凌雲李聖可西郊别墅創小亭屬余作風月無邊古篆四字為扁顔平岡馮炳仲賦詩和者盈軸因賦此我不願築受降城朔方職總管又不願金狨繫馬西池萬人看只願寬閒寂寞濵倚醉高吟青玉案秋霜斫蟹草泥滑春浪叉魚楊桞貫江湖長恐寸心違世界饒君左手斷水寒軒檻碧萬頃山掃巫娥雲一假鶴唳那愁蕙帳空羊裘未讓嚴陵岸是家太白孕英精待詔鑾坡摛藻翰藕船駕得玉井來荔支腰重金章煥至今人物說淳熙可並成周歌伴奐誰令七葉侍中貂風月無邊奉娛玩犧尊屢喚㪺玉液科斗何能體先漢相期雲路早騫翔分明世澤流波漫聖可乃淳熙從官李公昌圖之孫先世自華州入蜀者諸友載酒飲滄江海棠下公許以上壽親庭不克與勝賞翌日招飲出示新作敬和元韻杜陵老翁身轉蓬浣花溪頭詩更工向來隱語最沉著錦宮花里看曉紅想當繞樹經營時吟思拍拍春醅醲重跗疊萼今勝昔五百年逺誰為容使君結廬滄江上補處不隔牛馬風竹蹊花塢穿窈窕佳趣似是桃源同一年好春海棠擅隔牆恨不載酒從頗聞花隂喧語笑何似橘仙隱巴卭主人眼底有青白風流駭俗阮嗣宗化工不耐凌鑠苦故使分薄阿堵中那知陽春恣陶寫何物芥此雲夢胸玉湖亭上一尊酒栁花漠漠江溶溶錦機轉眼雪糝徑還有明年春再逢要知造物無盡藏那肯一日居成功商謳為公不成調誰呌閶闔箋天公晚紅一醉亦聊爾休逐滄浪垂釣翁楊子春酌飲清節亭示諸公舊賦索和雨餘熱喘思澡雪有客叩門笻九節相携欵竹墨池家竹間張飲碧筒折樅樅玉立肩相齊何羡掖垣歌紫微會須把臂入林去山王掉首麾去之骨相恐難飛食肉功名浪費殺青竹渭川自有千戶封持此較彼差不俗平生我亦厭榮觀為君醉眠蘄簟寒人間有此碧玉鏡那怕火繖張炎官滿戍有日置酒學宮為諸友贈别左綿山川平且寬周遭四境皆竒觀廣文官曹氷雪寒摧風剝雨無時安巧手無麵良獨難慚汗如瀋時一歎浪浪春雨紅杏壇堆盤苜蓿空䦨干三年轉燭槐夢殘明當西郊掛征鞍平生但知取友端忍御艾蕭捐杜蘭丁寧何須勸加餐活計不但故紙鑽孔轍回環顔一簞君民堯舜無兩般此印萬古元不刓聚奎堂中儼衣冠尚友謹勿輕杇墁丈夫事業期不刋腳根牢取百尺竿九日以酒贈雪江胡賢良䝉惠詩和韻蓀壁辛楣芰荷屋靜揖秋風酣聖讀占斷湖天拓户封不待詔書賜一曲紅塵車馬交衢術渠肯冠霞立於獨滿城風雨又重陽念子蕭踈對寒菊雙壺遣贈灔蛆浮想見羈愁盡蛾伏高人一巢有餘地底須駟馬駕車軸但得長年交酒聖不妨一笑命騷僕若云歸隱須買田巢由嗤人未免俗碧雲程道士自清江相過示以玉淵劉清叔詩借韻同賦掣鈴者誰金門客神秀迫人似曾識八返未問龍虎交一杯且薦琳腴碧我昔卜隱大面山招旌驅人難得閒梗野自適麋鹿性逡巡遠引鵷鷺班始青一氣色非色此中自有金丹訣政須趺坐共商量忍向塵勞磨歲月為玉汝賦蓴湖借田家樂府韻蓴湖何物堪怡悅與鑑湖境無差别蓴湖與鑑湖相近詩人胸貯氷雪清湖邊吟作寒螿鳴紫蓴可羮菰可飯把茅自足了一生食前方丈位鈞軸何如深林一枝足寬閒之野寂寞濵釣有緡竿耕有犢男兒何須嗟命薄富貴不淫貧賤樂李宰和唐子西芙蓉溪詩索同賦子西詩律傷於嚴掉頭沉吟春飲酣何曽一字低處著有似國工精手談千古江山長媚好水曹依舊清風掃只慙次補較非才更願乞靈依此老天涯憔悴一詩窮溪流泯泯山叢叢事須登臨作酬賞剩破酒榼官泥紅李季實以龍鶴山菜餅見惠長句將之呂兄亦有和章借韻答謝山林逺志久封殖誤隨小草輒輕出得似乾淳太史公萬古不磨董狐筆太史龍鶴山中人玩心竹素如醉醒鍊師喜為作妙供靈苗相間叢卉生七年飄搖湖海客生怕魚鯉腐關膈圓規得自太史孫清苦本來同氣質十洲地産富瓊芝龍鶴何曽缺蕨薇與君約歸如有期躍鯉何用薑芥胹李錬師山中仙者躍鯉亦女仙故事也和鍾道士若谷投贈韻流年衮衮灘頭浪蕭騷白髮三千丈人生榮祿底須多何嗟及矣負米養滄溟不禁尾閭泄養素略窺道家說庶幾真一復保全可以衆言强分裂瀛洲醉揮碧霞杯集雲峯前偶此來吏衙鳬散鈴索靜怪有飛佩鏘瓊瑰紫霄洞經曽熟讀歸來煙霞繞冠服嵯峨千仭獅子峯寒棲旋營數間屋飈逰為我晷刻停汲泉引滿如海鯨要學旌陽纍功行不妨天詔遲飛升岷峨念歸可輕發枉辦青鞋并布襪禁闥侯藩信所遭幾曽仰空虛咄咄爐薰浪擬叩𤣥微何如趙州東院西了知此理只麼是亡羊何必惑多蹊自心有疑須自斷勿用周遮添著一重案錬師錬師為我印證之六合同風兮九州共貫和陸放翁笑詩呈雲端子道人身佩含景蒼精龍灑落不與流俗同酒酣興逸不覺一捧腹那似義府有刀藏其中人間萬事誰醜復誰好兒童何知不必便驚倒試問虎溪三士之樂如此不霜寒夜永勿遣虛􅘑籌别雲端子和元字韻玉樓雙聳吟肩寒自孔氏出參𤣥元荒尋得君相指似清吐對我如瀾翻歸歟金華葺茅屋間有洞户通麻源世塵轇轕勿浪出執手且須空此尊寄謝碧雲張高士臨卭自昔多仙才鶴鳴神丹夜昭回唐鴻都客尤竒俊飛神碧落超蓬萊宋采石戰强敵摧少微褒封自公台𤣥風寥寥閟寒灰那知軒髯張心印今復傳雲來儒釋老氏鼎立如三才凡囿形數由剸裁授非其人委煙埃如碧雲張亦異哉幾年願見心渴梅吾徒笑我老尚孩三生髣佛同侍劫刃臺羊腸百折何獨行虺隤赤城醮盟三月齊青雲有梯攀崔嵬星冠禹步旋斗魁天門蕩蕩金碧堆章函歷上九虎開津梁爽靈帝所哀瞬息命令傳風雷帝宸留侍非不佳眷此濁海多劫災力扶道法授沉埋三千功行之積仙可階世人汩沒井底蛙各主其教相抵排吾師思以一理該與我心契無復猜何當歲晚棄置塵纍棲巖一龕煙雲相與儕芝术可庖露可杯商略道藴生死裁左携羡門安期右洪崖超塵沙劫馭氣凌九垓和小阮沇感時韻豆籩列炙凌丘垤有酒如澠㫖且洌得似年豐世小康漁樵結社談蜚屑畏途羊腸遍宇縣二十年間行未徹憂時無力為支撑問計商顔未能决頻年水旱釀災眚况復刀兵值空劫剜瘡補肉不遑恤椎膚瀝髓供一切詩歌碩鼠想樂郊澤自無魚可堪竭何時天狼隕芒熖盡驅狐兔縶故穴危機欲濟重坎陷暴征須戢猛火烈所期世路靜風塵甘隱瓜疇耘露瓞阿咸年少知激昻勉法前修立功業先兄叔逢種花盆池秋初開一朵二姪感悼成韻作柏梁體答之懷昔三昆皆青春揮毫翻水驚鬼神我方丱角瞪後塵有如奔林鹿甡甡高堂壽朋鬢嚲銀時節歌舞綵服新二十年間存幾人叔氏終老一葛巾盆池折花秋中旬共房感我雙瓜辛無窮生意根陳陳寸卉雖微均我身㙲培涵浸宜及辰一氣之運屈必伸子如不信有蒼旻一冬無雪和陸放翁梅詩陸句豪誇余句清苦要自不失梅兄本分家風也清羸怯問黃昏月呵手寒忩寄幽絶一枝幽艷棖觸人花與詩人皆本色孤山飛鶴舞空去詩家何曽絶正脉經營慘淡空亡竒不如倚筆珊瑚格滕六冬來偏放惰暖日暄風渾坼破便擬飛章上訴天怕主林神合連坐我昔與梅同謫墮隨分世塵聊贖過薰天肉食休問渠萬古清芬首陽餓制幕孫君即益昌舍館疊石栽竹於盆池索賦好山意度如高人偃蹇那肯來朱門青油幕中盛快士愛山惟恐不能致昭亭東望天一涯武擔亦復歸遲遲開忩延得竹君瘦借竹為媒來石友煙雲吐吞一席間瓦盆取月湖海寬羽書撤警文書省一炷水沉銷日永不嗔鄰客喚門頻支頥對玩玉嶙峋平生我亦煙霞痼强擬為君援筆賦破除幾許白雲腴腸枯搜攪一句無昨宵夢怕大刀折詩債未償寧許别從君差樂休念歸賸借前箸禆籌帷主公威聲劘敵壘斾旌行拂終南翠若携諸吏上峥嶸容我後乘陪載賡别馮伯昭新班歸三榮末句乞呈似使君王萬里年兄東郭滄江市橋柳邂逅論心成二友仙曹如水往復來永晝論文間巵酒十五年間如掣電屋梁落月幾回首愛君冲靜天機深玉雪照我驚老醜寶屏兩月同舍館青眼相看祗如舊秋風一鶚空百鷙四海知心悅齊老鵲聲查查客當還鶴髮倚門春一笑榮途埃壒倦馳騖聖域工夫窺窔奧拿雲豈無九霄志緩轡徐驅千里道平生我亦重擇交與君同盟期耐久紛紜歸夢促嚴裝黯淡羈情更分手旭川夙檀溪壑勝雌堂况得文章守贏糧寧憚兩日程龍洞煙霞共幽討投贈洪倅司令舜俞崔侍郎入蜀首䝉檄召剡薦舜俞侍郎客也博陵先生天下士圭瓚鼎彞宗廟器駕風閶闔駐參旗要與疲氓起憔悴同來誰是儉府僚一朵庾蓮吐秋水義以取人道自任河陽主賔信竒偉誰云風月立分鼎待借前籌答知已峨岷其下十六城魴魚鱍鱍更赬尾情傷涸轍轉清波陡覺濠梁復生意井梧幕府省文書雪界松圍絶烟燧餘事何妨筆墨工浣溪新沐煙雲膩老翁補處待公續燕外鷗邊儘吟思主公佇還丹地峻携上峥嶸去天咫社樗愧我本亡竒冷落官曹窮五技何階方便來相招醪醴一朝饗厚味燕臺嶻嶪萬金黃豈意謙勤從隗始眇然人物索扶持勿惜拔茅多引類君不見璇杓一夜搖天東人間萬物皆春風和謝孟彛祕丞館中書懷虎頭一生信癡絶虛名誤人可多竊蕭踈白髮寧可貸流浪紅塵幾時歇三神山敻隔囂紛衆君子聚瑩氷雪麈犀時接寶唾香𤣥關要待玉􅙞掣緬懷元祐載賡唱誰為崇丘補亡缺直廬竹帛不停披酺池齊盂寧浪出故都何在渺煙埃湖山也自佳風月擬結齊盟修故事莫向深杯辭百罰蒸哉與我心事同詩來可作成規揭甚慙老醜强塗抹得與嬋娟夸二八靜思世故殊未艾澒洞憂端不可掇由來館殿育英髦期為朝家效絲髮不然坐費玉帛招奚異信手沙土撮天閽何曽九關隔愚慮或補萬分一諸君信是廊廟具老我已愧瓶罌溢驚看淋漓灑巨軸豈比呻吟㸃枯筆吾儕立名要不朽榮祿過眼才一瞥從今朝謁得休暇勿使文㑹多間濶摩挲尊罍品書畫上下古今商得失乞歸早得隱林巖誇與漁樵舊人說和使君王子堅遊鄧氏天開圖畫韻春風滿城開笑顔使君明當出逰山東州山川北佳麗凌雲耀日季孟間紫絲步障元不要飛檻層欄一慿眺歲豐民樂征調寬挾四老仙共舒嘯使君吟肩李杜齊落筆便覺三山低招來倦客同賡載韻險令我窘見擠煙霞風月無疆界不憂寒具油侵壞寄謝摩詰休苦心使君詩是有聲畫壽悅齊李先生君不見溫公崇福十五年上下千載書法嚴又不見蜀公靜退不待耄鐘律製成天一笑樂則行之憂則違出處無非聖之時一朝都人擁馬首留相天子不得辭潁昌胡為屹不動各以就去揭矩儀悅齊先生天下士琬琰琮璜國鎮瑞盛名姱節耀古今歲晚松階猶候對時臺劇談鋸蜚屑志堂析疑􅙞啓鑰夜歸風雨一龕燈目電窺書光爍爍禹貢山川如指掌漆園之解無郭象更將次五訂箕疇不妨後覺勤鑽仰年來岷峨殊愴悽公與潔齊名德齊長庚磊磊配曉月士有司命國蔡蓍卧架詩書差足樂慿高忍見楚氛惡豈不望公勇拂衣正恐百姓須公活願公相業追元祐以一至誠服雄狡願公眉壽如東軒黃髮皤皤國元老雲蒸雨族霈作霖賢以類聚治乃興卷舒在公亦何心四海矯首西山岑薰風自南一披襟起舞稱壽千黃金洗耳五絃虞氏琴為公緩軫歌嗣音壽李子先正陽用事月初吉騎鯨之孫生此日滴露能將三畫吞積風少忍六月息平生最耐反復看其文炳彪心地直骨肉十年長眼青今年差覺叢談密一尊稱處薰風曉紅藥丫頭香露濕誰令絶艷殿光景羣葩斂避表獨立洗盡人間丹粉妍傾國傾城須正色文章瑞世寧論晚時來造物能借力為君折花起長歌請君滿引無餘瀝丹霄一武不難梯更看飛階弄吟筆壽廷邁叔祖吾宗譜牒祖通義蟬聯到公十五世五𣲖之分同一源如木有本瓜有蒂公家門戶最赫奕簮紱相承真鮮儷堂堂鐵面渠州牧能以方寸永來裔用之不盡地自寬信有詩書為可繼龍駒墮地汗流赭修途萬里自迢遞箭鋒巧中由基的桂香慳與春官第誰知風雨短檠燈慣作儒生窮活計彤檐問俗歷三州和平斂退鋒芒鋭羮黎任笑庖煙冷嚼蠟倦親歌舌脆似聞皇華催遣送斗城未必能留滯廣平傳緒五百年凛凛千鈞若旒綴藉公一力為挽回澡刷家聲舊芳桂平生况耐反覆看穮蓘懸知多斂穧鼎來富貴正黑頭粲粲芝蘭滿庭砌周盟有幸聨肺腑魯頖居然覺疣贅所願宗風振寂寥敢將末路竊聲勢霧雨濛濛梅子黃廉泉堂上薰風細千金稱壽意何如自倚情親為新製壽漕使者權帥黃大監金華仙人紫綺裘朝戲三山暮十洲偶經劍浦弭節留浪花噴雪躍兩虯海若禠氣馮夷愁精英為公一日收義理之窟探魯鄒詞章之工迫韓歐榮途砥平不停輈盛名何自徹冕旒粉省賜香馥衣裯萬里持節寬顧憂更煩幕府開碧油文書堆案如陵丘焦心靡憚勤咨諏賔朋遝進奚所求否臧吾豈無陽秋吏姦膽破民病瘳肯綮可見才刃優孰知學富用力周取之不窮繭絲抽寶書移監交置郵斗水那能局吞舟事機鼎來寧易投紫清側席渴告猶東風破冷初和柔皇覽揆度當孟陬矞雲我亦分餘庥無階稱壽㪺玉甌眼明西南百尺樓繡天錦地十六州雅拜何以祈寵休早徵環召飛鵠頭頴川歸趣鼎鉉調偉業定自追前修承家有子文炳彪燈燈之傳天與謀殿前峩冠進鴻疇杏園亦復聨俊遊斯文壽脉江漢流何羡韋平世通侯壽程使君和獲白鴈詩韻流膏千里喧笑聲祥心萬丈南極星祈年未了香火債饌客肯汙刀鑊腥此心與民同疴癢出令可忍奔風霆仙人飛來丹楓闕俗眼詫見白鶴翎蟻封縈䇿屈良御牛軱輟刃煩庖丁立談千仗環鐵甕傾耳千行頒紫冥雅知方寸厚培殖未覺雙鬢輕飄零馬蹄去踏東華塵猿吟恐辜北山靈賸將石田沃雨露更為嘉穀除蟊螟寥寥宗風特扶起懇懇善頌何丁寧長生祕籙啓雲笈紫府丹臺元不扄壽制使董侍郎秋雲隂隂壓邊城秋風颯颯飛邊塵淮堧夕烽連峴首往來羽檄無時停那知籌邊樓上一長嘯環六十郡皆陽春老翁哺兒誇說尹連年我倉歌既盈皇明如在殿西角恩許借留為福星六弧標慶當揆度載途鼎沸歌謡聲請公細酌成都酒拄笏看度西山雲只將祭酒瞪目意坐鎮坤軸如砥平可憐兒輩見坎井孰知我公身逺萬里心朝廷天生人物關運數豈為爾較山重輕浙江時巡今四葉上流地險如建瓴强敵逆天天久厭力困尚逞牙距獰膽折棧雲不敢向介胄酣眠宵徹明雅知折衝妙方略胸中歷歷不啻風雪身經行我聞四海如一體手足雖異脉絡元相親癢疴何適不關我仁者頃刻安得寧吾皇盛德堯舜主包瑕匿垢韜厥靈一朝震怒詔薄伐天戈所指壺漿迎西南倚公九鼎重草木亦自知威名寶書斑斕真學士陳圖指授諸將軍頻來寵光對赫奕富有學問規經綸蜀才自昔比齊魯公既崇學揚其文更須度外廣物色聲病未可拘豪英蜀民生理日艱急公既减賤矜其貧張弓何時可復弛一分可寬寬一分蜀邊儲峙僅虛籍公既檄吏探其囷餽糧千里憂不繼渭上可無人雜耕蜀兵十萬今有幾公既選練搜其精將驕易置端在我尾大安得平如衡公心渾如古井水沄沄外物何關情公才信是澗壑松大厦安樂扶其傾勿謂蜀漢彈丸土酇侯用之開西京間關武侯亦良苦千古大分垂丹青願公為國一引手饑食渴飲心經營從前規模㑹展拓蓋世事業看崢嶸斾旌揚風出子午笳鼓動地超三秦毋使酇侯武侯得專美蜀山豈無齊天之石可磨亦可銘少徐帶礪河山盟命圭相印酬元勳胙土奕葉疏恩榮却歸麻壇之山命仙侶脯麟酌醴一曲歌長生壽東師楊尚書去年拜公北定堂中秋玩月喧絲簧長風趣駕泝江艇恨不初度㪺一觴轉頭玉鑑秋又滿北定風景遙相望寸心炯炯千里共欲往從之川路長五年為帝屏南服掃清塞塵為樂鄉盡捐歲糴為丁壯米斛二萬饒積倉民無箕斂士宿飽一面屹立如金湯平安遙夜飛炬火燕寢永晝凝清香雅知烹鮮不可擾豈無發硎善而藏官閒選勝極曠奧天巧為公時雨暘五峯講席環子佩北巖布金開道場要將名教植根本參以佛法芟莠稂君不見海觀煙濤碧萬頃衛公心眼周八荒又不見開福浮屠玉千尺給事願力同覺皇得如我公志淑艾未許二老相頡頏眇然人物殊乏使鼎來事會那可常維北有斗天喉舌乃作福星私一方何不喚歸坐巖廊五色線補舜衣裳拓開賢路舊荆棘勿遣旄頭森角芒腐儒憂世心慷慨百未一成鬢蒼浪公憐不麾客倚牆肯借齒頰加雌黃頌言我豈知已私民亦勞止須小康岐山之顛豈無巢鳯凰何時口銜瑞圖飛高岡我亦刷翅相從千仞翔引吭一聲鳴朝陽請賦卷阿之詩之九章壽史丞相君不見唐朝郭元振退朝愈色奉溫凊又不見國初王文康黑頭拜相歸捧觴台衮崇嚴親壽考歷數古今良亦少而况二老偕耆頥如二公者那易有四窗爽氣舒雲霞相業之盛專一家父子弟昆踵科級到公名業尤榮華蔡州擒吳抑何壯開幕江淮護諸將手提黃鉞郤欃槍即軍中冊右丞相我乘馳驅亦勞止衮衣趣覲天顔喜垂紳列辨競趨迎恩遇之隆昔無比書懷字民能使民和悅儒術信與吏道别十年妖祲滓太清有耳厭聽鼙鼓鳴創殘之餘忍椎剝逃生要不如無生願潔乾綱奠坤軸罷兵寬賦家給足聖躬示朴吏亷平歲歲蠶登牛産犢宦情我自春雲薄何日西歸田舍樂
