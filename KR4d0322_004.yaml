body:
  text: 滄洲塵缶編卷四宋程公許撰五言古詩今日良宴㑹良辰不可久飛幰㑹華館雕爼粲陳前羽觴勸引滿危柱瑟難和急軫琴失按含思以亮激響入凌霄漢四坐聽我歌歌罷倚長歎勿遣歌聲悲悲多聽者慘振轡騰康莊及此嵗未宴春事無幾端居蕭索追懷成都舊逰慨然有賦憶昔吏錦城寄隱雲水鄉蕭散不任事上官容我狂短篷漾空明舞棹歌滄浪㑹心多勝友一舉纍十觴芳春樂事饒飛幰集寶坊意行無定在有花即相羊馬蹄穿夜市奚奴背詩囊三年一炊黍舊逰想微茫誰知涪江濱側翅不得翔醉飲無與和三歎熱中腸雨晴好風景輕輿便晚涼亂絮撲晚靄牡丹泫殘粧春物能幾何營巢燕飛忙茶事迫榆火餳膠催粥香我本樂煙霞失身縛簪裳官曹幸云冷詩債可不償錦城未即去十景兹難忘安能窘邊幅低頭甘鎖韁升沈自天分矯情恐有妨借我白玉壺為君歌慨慷餞寄菴居士龔彥質彥質僑處南山僧寮泊然無營趣尚髙潔某嘗為彥質謀投老不可無棲宿地亦當及兹時圖之贈以文庶幾見者或一動心而彥質素不茍求未嘗輕以示人也彥質逰甚廣莫如殿撰都承敷文大卿二趙公厚為彥質辦此更以古詩二十韻餞其行煌煌帝王都列第喧絲竹林園競選勝四匝湖山曲誰知南屏下老叟甘幽獨憶從古栝來紅頰鬢鬒緑王侯爭倒屣交友為屬目引觴百壺倒授簡千頴秃功名良誤人日月如轉轂侵尋四十年一往不可復浮雲玩身世投老寄僧屋堅忍不茍求趺坐淡無欲人生固幻夢要須有歸宿買山豈不念探囊一捧腹舊交上連璧情未忘伐木蘇臺香正凝寶婺駕已夙談笑百金揮拮据三間足何妨山水窟就訊髙燥卜行矣不可遲片帆浪花蹙歸來督工師涓選亟營築開軒納雲水繞檻藝松菊身閒心自平長把黃庭讀三伏中積雨如秋峨眉三日雨客館六月秋幽懷無與娛欹枕清夜逰炎官失聲勢萬木皆商謳一涼德我厚耿耿何隱憂憂多白人頭頭白可復休積隂忤正氣潢流冒崇邱世故莽難期病根寧易瘳履霜不知戒堅氷諒難尤天運不停機明當火西流勿以餘熱在而忘晚嵗謀家貧迫短晷及時戒衣裘縣圃蓮花方開同時木犀吐芳劉光逺仙尉賦詩為和韻季夏苦積隂泥徑殊窘步彼姝水花紅媚此晴色暮邂逅小山桂才洗仙掌露相携齊閣來不著丹鉛汚杲之與黃香胡為此同聚向來古錦丸散落不知數吟腸久荒澀幽賞但默喻殷勤吳市仙能供巖􅊤趣詩味淡愈佳交情凝有素我願同蔦蘿得與長松附十四日同張伯修羅堅甫大智賞月探韻即事感興殊激懦𠂻翌日㑹保福辱詩示教借張大韻同賦涉秋苦多隂嬋娟喜見乍天巧竟作難借此三五夜屯雲滃四面如騖俗士駕寶坊盍朋簪尊酒共清話諸君讀書眼明不失纎罅天眼物昏之誰為彎弓射連宵耿孤吟虛窗自髙挂竹風靜逾爽露葉燦可畫夢踏市橋去醉眠僧榻借隂晴且勿言幽賞可能罷恨缺截老龍三弄倚風榭酒酣歌慨慷四坐勿渠詫邊塵日澒洞志士惜閒暇君看古聖賢憂樂以天下持此閲人多何但如傳舍短氣吐復吞欲言恐遭罵徑思投紱去甘老漁樵社世論熟脂韋人物歎衰謝相期崇令猷蘭鮑觀所化重陽後一日親友㑹飲於滄洲以初九未成旬重陽即此辰探韻得初未二字雅志厭闤闠考槃樂郊墟言歸憩桑梓不憚躬拮据嵗晚此棲宿佳氣欎扶輿淫雨度陽節晴雲吐月梳獨酌良亦佳所思在羣居晨興喜復晴草具何可徐黃花有餘馥白酒無多儲清灘蟄雷吼輕霞綵幄舒翳然林水間舒嘯天籟虛雪髯醉先起衆賓且躊躇人生有定分適意不願餘衣食粗能給吾當賦遂初相期晚節堅結社同樵漁風露淡秋容汀洲肅秋氣吾廬倚髙寒逰目周品彚既空買山資恨缺除堂費醪觴漾籬菊淺酌殊有味蜜餌雜園蔬何妨食之既興酣一憑眺情感忽纍愾裔夷恃天驕邊關猶鼎沸殺氣纒慘淡將材乏沈毅吁嗟楚芡荒遑恤頃筐暨腐儒拙料事積憂漫如蝟伊昔賢哲人用智奔流未駟隙詎容追蟻潰可不畏索裘已較晚寒機密經緯過房公湖臨發廣文載酒登南樓聽隱士陳希逸彈琴讀鴈湖先生詩及悅齊先生賦湖蕩匝城府堤栁一徑通森㦸晝漏永閴如墟野中掣鈴三日留欎欎殊寡悰登埤展遐眺蕩我磊磈胸溝畦磨衲麗煙蕪圖采工廣文一尊酒邂逅清賞同慨昔石林老小駐雙旌紅燕坐鳬鶩退行散龜鶴從得句陵子美髙世猶房公想此據胡牀長嘯延清風想此躡珠履和月吸酒鍾想此援采毫醉題揖遙峯想此披綺裘憑髙目征鴻逸駕渺難追風光為誰容空餘翰墨香披拂葭葦叢翠琰子由賦正聲響笙鏞千年古徐州綺疏貫晴虹過眼不再讀恨我性識䝉喬木噪晚鴉低回馬首東緑綺有餘韻因之訊仙翁送安少愚下第東歸去年逰凌雲傳觀一篇書問客誰所作作者安少愚少愚賨城人萬里走東吳憫俗日搶攘正途欲荒蕪磊塊不能平憂憤何當攄推枕一長歎落筆萬字餘才難繆取舍政棼費爬梳國讎不可忘儲德要力扶肝膈無留藏首末詳繹鋪吾豈貪狥名致主於唐虞書成詣匭投甘心斧鉞誅九天隔雲雨萬目爭雎盱聖恩不忍殺放使歸田廬我心日起敬未見長欷歔今年科詔頒君來試成都邂逅忽傾蓋名下信不虛貌不踰中人若為膽滿軀革囊三尺劍束書一蹇驢蹙額談世事抵掌嗤俗儒慨慷三䇿陳傲睨衆口諛諸公眼如月誰遣紫奪朱少愚􅀈然笑得失毫髮如行止諒由天通塞何關渠歸歟三間茅搜我萬卷儲抱膝梁父吟曲肱味道腴雅志期古人昻昻千里駒安能徇衆兆泛泛水中鳬今晨忽叩門謁我摻執袪劇談重激昻欲去仍踟蹰時俗競佻巧捷徑爭馳趨悅耳或為忠仕道寧免迂啖以鼎食味誘以蛾眉姝煌煌萬釘饒翼翼潭府居衆醉日以酣獨立誰為徒世豈有巢由甘受泥滓汙或俯首州縣或遁跡樵漁顧謂今乏材毋乃幾厚誣失計如我輩茍為五斗驅有志困風塵浮沉非故吾思昔新法行士有鄭介夫斥監安上門憤世膽氣粗一朝勾驛傳奏疏列畫圖天子惻然感民力幾少蘇九原凜如生千載足起豫荆舒最護短植黨盤要途如何職冗賤九關許呌呼逼仄復逼仄視今良可吁喧然衆楚咻甘作嬴秦拘所以見君子羞汗如隕珠牛驥不同皂雞鳳寧同笯要當操此心聖賢為範模借問蘭玉棄如何蕭艾敷詩成為君歌臨風恍喑嗚向來清廟瑟忍濫齊門竽贈吳郡諸居士居士有官不仕善醫不責報以道義自持隱君子也友人楊良臣求詩故贈之終南徑甚捷結茒鄰帝鄉朝為谷口翁暮為省中郎先生獨何事寄傲臨滄浪才髙世莫染德薰名自香青黃分誰數膏火竟堪傷逰心聖賢域脫身憂患場世路雖齟齬天衢自騰驤捫虱竟誰見卧龍興何長借居仲奄里未升公德堂十年逐流擯千里坐相忘頽齡或可借辟榖豈無方終期繼青蓮搖筆頌紫陽過眉山謁鄉耆宿李八丈提刑憶昔下吳㑹拜公古渝州别來忽星紀不知幾三秋豈不願舂糧占烏渠渠屋良期若難儷千里勞逺目公家難兄弟與蜀關重輕峨眉疊連娟石筍屹峥嶸維國有蓍龜維士有司命並生天地間受命獨也正憂端日搶攘世論滋軟熟誰謂空谷逺有美人如玉我如南州橘托根非不深踰淮恐成枳望逺勞我心鮐背髮皤然齒頰探骨鯁跪履乞一言書紳以自警述志仙曹寄江干吏隱適吾願西軒館梅友屋老狸鼠覘坐令髙世姿不耐塵網罥殷勤數問訊餘力稍營繕八窗敞虛明孤標對老健佇立慘淡中恍覺容采絢天風發奇芬霜月潑冷艷官卑茍逃責交淡日相見凍搖哦詩吻堅作忍饑面癡頑信可憐無取復奚羡村醪未必佳苦味且耐咽洗盞壽親尊春和元不缺勿競桃李場恐為吾友玷三年銜恤絶不吟詩既奉祥祭觸緒摧裂偶得古詩三章呈叔逢兄併似彥威姪髠髦聨鴈隊娛侍三老人清風一家法歡顔四時春轉矚二十年俯仰含悲辛聚散泡起滅了知幻非真忽忽如有見耿耿恨難平孝愛自天性寧與迹俱陳母慈不逮養翁健長相依重關一回首及瓜時當歸平安墨未乾諱問心有疑繭足跛菅屨髙堂空繐幃罔象不可索流光倐如馳五鼎嗟奚及一生風樹悲秋風殷巖壑萬木皆商謳棘人有餘哀攬衣良夜遒三年輟清吟寸腸堆百憂淚眥日以眵霜根一何稠棣華幸有依竹林可俱逰心事期嵗晚庶無墜前修逰仙二章上范殿撰潔菴先生風埃曀八表濤瀾浩無涯岧嶤崑崙峯髙與星緯排真人撫元運太虛以為家控轡下碧落蜚步凌紫霞周覽興未已歸憩誰與偕喬松撫瑤瑟偓佺薦瓊花顰蹙睨塵世腐鼠紛攫拏迢遙五雲佩蕩漾八月槎我欲往從之層雲不可階素心耿相照退當三月齊空山學仙子幽獨性成癖誰令一念差失腳塵網密隨緣玩泡影隱思曉繼夕了了三生夢掣電了無跡豈不志逺逰誰為傅羽翼抱關覘紫氣跪履問黃石靜慮儻𡨕契𤣥機詎難入縞髮古仙公遺世而獨立惝恍如有遇一言曰守一引臂許相從長生託瑤籍送悅齊先生上躬攬權綱與天下更始悅齊先生洊被宸翰趨朝行闕擢畀秋卿渴佇黃髮之詢別膺白麻之拜某拏舟追送引睇嫪戀激奬訓誨真情郁然敢不肅戒行李拱俟造命作五言古體一章少抒𠂻曲語意斐拙惟髙明賜覽風塵三十年世途日險窄嬋娟棄土梗倚市競容澤大雅何寂寥志士三歎息維皇惠斯文為國永壽脉靈光巋獨存碩果有不食坤維返全璧北墅歸散策天開景氣新晴破層氷積疇咨耿宵慮圖任先耆德披雲絢天章趣駕覲宸極喉舌俄申命股肱待宣力解絃未為難航險那可忽涇渭不同流薰蕕詎相入所虞憤失職隂拱或伺隙事須衆賢和乃可殄行堲沉幾陛下聖虛已言路闢稍欣元氣充猶慮外憂迫敵情任反覆廟論須謹密功名百尺竿家國萬金璧平生一知己瓣香無愧色駑怯勉荷擔遲頑費推激大艑駕雲濤薰風飽帆席丁寧耳面命逺别何須惜寬以七月程修門拜赤舄上後樂劉先生左史十首用襄陽詩兩句行藏堅晚節進退法先民為韻永平昔全盛舊學尊五更惜哉趨舍繆眩眼車服榮恭惟自孔氏時止亦時行心泰無不足外內誰重輕峩豸凛霜簡立螭迫荷囊從渠衆醉酣我自深林芳嵗晚髮雪白德稱腰鞓黃世無香山老誰與論行藏前溪文緯國東溪學草𤣥補處自天授絶韋待誰編淵源後溪水脈絡千載傳兹事端不朽松石同其堅公有松石一峯以扁堂額厚德最耐看士當論志逺沄沄物歸根混混泉有本眼明長庚曉心知嵗華晚後生須矩矱所願加餐飯鹿門憶龎公栗里懷靖節我嘗評斯人用則同稷契空谷倚逍遙風塵俱騷屑明發耿不寐長歌彌激烈事往置勿言積厚報豈吝毫眉兩山尊照眼雙璧潤衮衮生公侯世佩斯文印譬之水盈科吾方見其進楚都初拜公里門跪承誨一言忽喚醒頓首汗浹背志逺苦力短寸進而尺退大書揭齊顔朝夕警不逮公許嘗請誨先生謂其資禀既純當加充養之功因以扁書齊云月冷塞垣刁塵暗西風箑所思天一方飄飄管寧帢我欲往從之問以安樂法雲深波浩蕩定自鷗鳥狎千載嗣韓統斯文諒關天字衮失所歸何以革其先陟屺有遺恨琢石圖方鐫百拜涕綆縻萬一彤史傳負米困風塵靦顔白頭親歎息執戈苦走也猶幸民依依孔牆夢拍拍芹水春安得萬里風駕豫往問津和大著何兵部兵部還南林寓居食鑑湖祠祿録寄近作中有和坡仙所賦鮮于子駿新堂二首末句寄語蓬萊仙千里永相望此意何可虛辱塵緒膠擾㑹移容臺奉祠太室始得和答何侯起膠庠巋立諸老後霜空茂檜柏驚秋笑蒲栁平生經世心短舞困長袖白頭謁承明彩闥炳郎宿去國一漁舟順風輕放溜寒花耀荒寒靈芝茁腐朽身閒淡無慮嵗熟宜釀酒更將自性觀妙契得無漏憶昔嵗云暮言趨君子堂昕班偶同歸三度金節涼木天並英逰東壁分餘光日者對宸扆直聲動巖廊豈不志歸田胡遽喧巧簧别久花竹秀山積書傳香時無塵外交若許令支郎願言從之逰圭璧保聞望和廬陵士尹八俊投贈韻白苧裁春衫京塵可得緇一麾江海去何成復何虧馳驅兩輪朱蕭騷雙鬢絲所欣嵗功就千里春臺熙素念恥伐檀煩政戒楚茨同心何自來邂逅得我師金華仙去逺文其不在兹諸公競唐體頽流誰楫維命將騷雅壇幸子無牢辭為我緩節歌紓我商謳悲邊塵塞鄉國介鱗語侏􅍣登樓仲宣賦遣興子美詩懷歸自無計慘戚將奚為排雲天九重抒我危苦詞壽張敬立二首髙堂八十親備福九五疇虎節安山國鴈序班霜秋積善有源委觸目皆琳璆一笑壽觴舉背諼可忘憂育德譬源泉務學如農疇盈科㑹歸海力穡當有秋期君懋逺業東序陳大璆對揚竭忠鯁一洗宵旰憂上憲使張郎中壽借西山集中甲申秋所賦雨荷詩韻榮途驚一世志士獨苦心君看曲江公中宵梁父吟豈無平反笑可使貫索沉獨醒睨衆醉枉尺那直尋世事本前期朱明多盛隂氣運有伸屈扶持要賢能金甌一擲誤天步深淵臨瓊圃擷衆芳願以遺美人繡斧岷雪外閶闔雲海深請彈薰風絃再拜壽斝斟功名儻來耳一念君與親壽憲使江寺簿八首以座右公亷勤謹忠信和緩八字為韻並生宇宙間分殊理則同訂頑有明訓造化與同功心腹與手足疴癢均我躬皇皇一仁字天下皆為公人心無底谷貪求何自饜徇名膏火熬徇財刀蜜甜受命獨也正取造物者亷孤竹有世守範防無乃嚴咸池浴曉光西汜俄夕曛流景寧我貫用志可不勤王事念靡盬聖恩期䇿勳嵗晚須糗糧及時力耕耘吾師孔子孫云莫見乎隱所以盡性學必於獨也謹兩間陟降異一念堂奧近何但丹筆持能使明克允乾坤奠崇卑君臣分則同中心一有慊何以字曰忠孔曽為矩矱伊周其事功千載誰嗣音我願順下風豚魚自物耳猶可孚以信疑心一芥我相靡而相刃君看易中孚義取說而巽虛心竊實理可不精體認和與同近似同乃異於和九官遜虞廷警戒而賡歌不然水濟水後患將如何期公調鼎食一柱障頽波緩有用有體事須明眼看用欲行而宜體則偏於緩射審固而發斯理一以貫仁靜壽可占巧厯那得算上游參預壽二首以檜石為韻余所寓館乃參舊第屏畫檜石題詩在焉並生覆載間肖翹無小大隂陽所發舒榮瘁各變態若為壽命獨厥有松柏檜鬱鬱被澗阿童童狀車蓋神明扶正直霜雪表堅耐豈不願擁腫而使匠石愛大厦須柱撑寧免萬牛載一柱屹擎天羣生此依賴尚念楹桷材無可柞棫拔風雨任震凌安宅遍宇內河流貫陜虢底柱自中立江水迸瞿唐灧澦制其溢豈此一拳多雲根閟奇質檜柏相因依煙霞老山澤閟世縱堅久於人果奚益漲洪彌八埏睨視如已溺巖巖國嵩岱萬仭峙鐵壁隻手障狂瀾九鼎奠磐石我自不動心深根而寧極還歸金泉山采藥錬金液壽曹大博以東憲臺治新築亭館扁榜寄意聖道如太極品彚自生成二人各言志㸃也心和平春風發髙詠懷哉沂水濱千載寄遐思光景無邊春一潭鑑寒碧方寸洞虛明執卷恍瞻前舍瑟鏗有聲勿遣柱後文醨我春風醇穹舞麗景舒琴歌南薰清誰知此中樂天理皆流行右詠歸亭蔚藍水中天岧嶤千萬重樓觀聳煙霞光景浮星虹天上老仙伯萬劫氷雪容笑下金華山長歌唳霜鴻一去五百年山頭忽重逢身衣直指繡神超蓬海東搖蕩瓊臺光拍浮玻瓈鍾瓊臺縱可樂虞庭渴䕫龍丹鳳銜詔來人侍甘泉宫右垂光亭涪江駛清瀏四山玉連環中有一掌平萬井浮晴煙鶯花隨世界妙語發天慳公來抉其祕作堂娛燕閒襲芳皆俗好伐木友士賢念昔白波洶止沸談笑間熙熙春臺樂誰知有今年初度沸歡謡願公眉壽延移此世界春浩蕩彌八埏右鶯花世界壽喬平章三首岧嶤崑崙顛縹眇虛皇宅下睨四大洲何啻一塵積萬類託其間擾擾無暫息强弱互吞噬殺氣干斗極虛皇燕五雲憑軒慘不懌絳節授金童瓊函探寶冊運㑹有度期欲藉老仙伯老仙何自來文熖貫東壁八十五春秋骨健神氣溢權衡有定度蓍蔡無遺䇿若非安期生定是李八百堅苦海津梁壽斯文命脉后皇大所畀陶冶妙無迹故山豈不思老屋須柱石屋老當奈何風雨撼四壁主公志經營所賴有匠石度材林藪幽計土帑廥積心思妙規製指授契繩尺逮其萬間具夫豈一人力柱天紀元功眉夀永無極周宣當中興拜手歌考室屏居北郊自秋涉冬絶省人事觸緒有感託之諷吟書雲前一日緝成八章寓興抒情非以言詩也氣運有盈虛品物迭滋耗人生於兩間誰能長不老胡為玩鮮榮而獨恨枯槁婉孌兒女態愛惜容色好志士競修名覽鏡慨華皓所念固有殊達觀同一笑本來真妙明何有少壯老茲理非言傳惟心自深造斷梗得棲泊髙堂擁圖書中宵風露氣營我方寸軀靜慮何易感有銜莫能袪今古一瞬息智愚等丘墟戰奪日相尋死生互吞屠念此耿無寐推枕長嗟吁天理諒好還人謀何可疏宿嗜本幽閒世途倦馳騁迫茲門戶託强把冠佩整招手誤一來麾退諒豫警寬恩假郡寄靜俟亦天幸橐空歸無家旅泊仰微廪如聞爛柯谷宛似飛仙境苦飢問豹胎留渴須逺井天將厚所畀吾寧不少忍睡起一缺伸篆煙凝晝永口為禍之穽異者同之仇誰能噤不語兀兀如羈囚我豈好違俗心未忘好修本不慕華顯寧有忮與求逍遙鵬鷃同貧賤非所羞風濤漲平陸駕豫一虛舟未如泯機智鷗鳥與之遊吾今已得師稽首漆園周鳥飛暮知還蟻微亦有藏逰子悵無託故鄉那得忘轒輼嵗橫騖生涯日淒涼骨肉各竄匿冡祠缺蒸嘗萬里一緘書臨風淚千行垂白念汝兄憂樂苦相望安得附羽翮奮飛同一觴西陲失支吾如老屋積腐墻闥縱蹂躪堂屋何依怙伊誰階此厲乃為元老誤疾痛切吾身利鈍難逆睹瘴暑困新恩隕星泣忠武梁壞將安仰天髙杳難訴向來十二樓捲簾誤一顧灑淚嫁時衣誰與論心素坤維以文瑞民俗本柔淑何代無戰爭寃哉今爾酷戎馬塞里墟劫鈔遍林谷平生金石交屈指半鬼録從子尤可哀别歸奉水菽伯姪併戕殞荼毒復荼毒探囊數幅書吞聲不忍讀崑岡焮烈熖寧辨石與玉叩首一爐香請為遺黎贖姪子能伯請假歸奉親同其伯父先後皆為敵所害南山翠鬅鬙四荔拱故宅采衣侍三壽教愛如夙昔曉然一夢䦨無復萬里隔了知恩愛縛障我修行力亦嘗勤遍參漸欲空結習妄念絶攀援自性非假借入聲百千三昧門惟此一事實持問諸老禪少露真消息
