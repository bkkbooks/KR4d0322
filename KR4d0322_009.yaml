body:
  text: 滄洲塵缶編卷九宋程公許撰七言律詩正旦上夀紫宸微臣以祀太一初獻不預賜茶酒退就殿門少歇俟追班拜正旦賀表去嵗楓橋度嵗除寒燈一盞自抄書誰知東觀歸翻史仍許西垣綴佩琚四闢不憂獰虎豹九成猶恐眩鶢鶋彤墀百拜陳金鑑只願中興似國初元日即事四首鳳銜丹詔紀初元餘恨難忘杞國天賢路會當三接晝宅家可卜中興年出車未可忘多難覃耜尤須祝大田千古逃吳稱至德有周篤慶更綿延端居俄換嵗華三荼苦於吾若薺甘照影菱花驚雪白強顔柏葉借春酣人間擾擾多岐路聖世悠悠欠指南一穟黃雲晴晝永叩門誰辨與同參憧憧行李不曾休消遣年華古渡頭得似青襟專挾册浪隨黃帽熟操舟歸裝趁得椒花頌洗盞連呼柏葉浮容易一年春又換賞心可欠七年酬屠蘇最後釂銀杯嵗月侵尋老景催離坎新工幾銖火乾坤生意一聲雷君親未報鬢驚雪名業倘來心欲灰一笑山頭氷萬仞曉晴還見翠屏開元正和洪司令紀事二首寸心炯炯水朝東雲繞通明一朵紅螭籀薦祥天眷顧雞竿銜赦日沖融遙知萬國趨堯彩可使前旒隔舜瞳京闕陵園須汛掃聖心原不慕邊功兔魄烏輪西復東流光那肯駐顔紅禮羅君不見溫造志廣吾寧如孔融難策材駑攀逸武相期親夀轉方瞳飛騰景暮何須問聖處慙無一髮功再和前韻條風吹轉斗杓東護日祥雲一段紅聖主慶成神璽重老親喜動夀杯融塵沙自染雙蓬鬢嵗月難磨兩碧瞳斗印垂腰吾分耳早看兒輩策新功和彥威紀事二首久戍兵殘將亦驕幸時轇轕與民仇邊關撤警久階厲甲胄棄殘尤誤謀淮浦方期三就緒王官忍賦四宜休江城永夜欹寒枕數盡殘更有幾籌三關不守反以綿襖代甲胄卒徒之易潰由此得之老將云民勞無訴卒長征安得天河洗甲兵虎出柙誰當任責鳥傷弓後可無驚峽山風雪清尊共楚澤雲濤去棹輕憂國寧忘絲髮補忍隨時態慕鮮榮聞山東捷報幾年豢虎費隄虞一旦芟夷快決疽黼扆可曾輕赫怒金甌幸未失枝梧戎車喜奏膚公捷獨栁寧煩傴僂誅更願清朝懲往轍剩須汲直折姦覦連日得關表捷報聞敵騎無復留境上者志喜成詩十里旌幢轉曉風行營日報捷書同悠悠何補青油畫栩栩驚回畫角雄壯士有懷時拔劒仁人無策弛張弓天機翕闢一翻手看取桃林騎火紅題卷子會龍飛景運詔賓興將相之階自此升毛頴銛鋒須快戰楮生衷甲作先登精思可使文加點抄寫能令價倍增努力殺青男子事功名未盡剡溪藤送彥威姪赴類省試吾兄仙去幾何年情未能忘一線傳相見幽明參勇決正須行藝兩渾全世科從此傳燈廣親黨同時奏凱旋孝友令恭天所祐修途萬里穩加鞭送句甥持敬赴省試外祖憐孫肇錫名瓊林宴匝兩周星果能冠嵗露頭角須信故家猶典刑笑問兩昆眉底白喜覘二老鬢猶青遄飛借與秋風便側耳英聲駭震霆送家朝南徵君二首萬里岷峨入貢琛怒風摶上九霄鵬人才於國猶元氣天步如今甚薄冰家父憂心宜有誦嗣王求助可無懲男兒不朽須名節黃木之灣又一燈獵獵霜風不滿旗留連尊酒話襟期紛紜世上無窮事慘淡江頭欲别時未必交枰無活著只憂起死欠神醫踈頑我亦宣州客傾耳囊封慰所思鹿鳴宴貢士蜀莊故里好揚鄰唐昌莊君平所生處名君平鄉衡山有故宅讀書臺墨池丹井皆無恙與郫之子雲鄉為鄰不盡斯文萬古存漢詔十行銜彩鳳禹門三級躍潛鱗傾心射策恩方渥努力摧堅語忌陳一第摘髭容易耳直須名業任千鈞聞喜宴恭和御製賜進士詩九五天臨德有元自應皇化軼羲軒囊封何日無忠諫延策今年許盡言端藉多材戡世難盡銷殺氣作春溫萬間華屋非難就杗桷應須妙選掄甲午嵗除即事二首初被聘召之命末章感遇述懷行年半百又加三隔一宵還一嵗添邱壑甚慙心賞誤軒裳可與道情兼醱醅酒熟頻㪺玉耐冷燈青密下簾絶愛緗梅開較晚雪晴要我日巡簷乞州如斗苦難諧遣戍蓬婆也自佳嚴詔自天疑過誤虛心造物與安排轒輼猶未空三輔鼙鼓何當靜兩淮經世無才羞汲引寸丹咫尺是堯階制閫初辟富順廟堂欲以威茂相處俄有入秦之命閲邸報上臨朝召用二三耆德志喜有賦過眉山呈悅齋人間二十八年事天運盈虛一剎那金塢漫憂無處著冰山想復誤人多問唐偃月消磨幾奈魯靈光岌嶪何黃道方看升日轂洗兵馬更挽天河參選銓曹竽瑟明知繆所操才疏分不與時遭扶犂輕失田家計斂版來趨吏部曹邂逅功名嫌預借馳驅州縣敢辭勞憂時空有崢嶸憤九鑰天關守護牢分直玉堂有懷儤直稍寬庚伏暑傳宣來自玉皇家冰盤滿掬三危露金榼頻㪺九醖霞衙鼓驟驚行抱牘索鈴猶誤吏催麻叵堪厨釀甜如蜜漫倚橋欄看水花和史子修投贈二首韻時被命至玉堂儒習平生祗自酸可能學古到商盤風塵世路知難拗潢潦詞源恐易乾已愧登瀛聨俊彥那堪上水費嘲彈叨榮愧乏經時策安得軍中有范韓厯盡羊腸足力酸湖山正好暫遊盤羈愁等是如鴻集鄉信難忘問鵲乾瓦屋三間非易借蒯緱長鋏莫多彈玉川那用輕參尹沽酒誰為赤令韓史欲謁京尹嘗力止之直舍紀事二首獨冷官曹可得禁近來冷過玉壺冰無錢沽酒休煩送有馬知誰許借乘罷謁最宜吟慘淡愛間贏得睡懵騰鸞凰自合翔千仞誰遣人間罣弋矰豈不懷歸畏簡書人生何處不蘧廬靜看世態冥心久貪問生涯畫計疏休作勞神狙賦芧可同貪啄鳥馴除飯疏有味親長健此樂千金莫換渠歸班之明日以六參入趁起居湖海飄搖誤召環春風入綴紫宸班恭聞聘幣及巖穴不以多材遺蒯菅靜念升沉皆命分喜因蹈舞拜天顔承明莫作官曹看汗簡須慿直筆刪題高廟宸翰古錦囊開兩軸書宸奎騰采動山墟能令使者分王命想見中興似國初九鼎可為宗社重萬年誰謂草茅疏襲藏何但傳家寶汗簡他年或作諸孫氏所藏高宗宸翰其一軸使敵回趣入奏事其一軸殿試編排上親擢鼎甲三人王十朋閻安中梁介試卷號皆聖語褒美閻公論國本尤忠鯁以西省職事被差孟夏景靈宮朝饗跪進茶酒齋宿道山承明三入笑陳人樂砌翻紅又一春英轂並馳慙領袖斐章何自稱絲綸駿奔數幸天顔近駑拙難勝寵渥頻月蠹腐紅無以報囊封敢不罄披陳上茶使鄒監丞祕閣年時觸熱曵長裾重拜劉公一紙書駑駟何堪蒙錦繡木瓜無復報瓊琚還因持檄親犀節恐趁追鋒侍玉除九萬扶搖鵬運濶可能倦翮借吹噓西省齋宿陪侍左史曹舍人話舊以除當字賦詩下教和答一行奎畫寵新除左陛濡毫要直書何幸鵷班連省闥誤令鼠璞雜瓊琚雲窗霧閣非官府璧月珠星近帝居二十年前舊騷律琢磨今乃過黃初潑面緇塵不易當佩蘭誰與共祗芳迂頑羞問翻階藥邂逅容分夾案香且可埋頭翻竹素底須繫肘詫銀黃看公自致青雲上老我何妨誚斗量寄呈座主李左史三首絲絇趁曉紫宸朝憫俗超然賦逺遊富貴儻來心止水隱思不耐鬢先秋誰知皓首太玄草獨對青山大白浮只恐萬牛勤挽致未須封户橘千頭九萬雲程不作遙暫教六月息鵬遊騷情吟徹湖天曉義膽寒生石劒秋想見床頭談屑墮時澆碗面乳花浮雲山不隔師牆戀憑仗緘書乞點頭石劒一峯髙丈許立三益堂前世紛棖觸不勝憂尚憶薰風故國遊惝恍夢回身八翼凄涼别久日三秋願馳玉車犬天津阻擬問星槎海浪浮千載指南先覺在行迷未逺却回頭夀楊浩齋二首駕鶴飛來白玉京疏髯秀色自仙真要看轉物天機密更念居間學力新孔孟以來扶墜緒羲黃向上屬誰人雅知仁靜宜黃耉仙谷煙霞不盡春澒洞風塵漲九垓萬牛何事首空回隱思未易甲兵洗商略須先根本培望望璽封頒紫閣駸駸鼎味熟黃梅頌言豈為摳衣舊黃道方期日月開立秋後隂雨踰旬新拜禮寺司直之除寓大卿廳一窗清邃伏熱翻成十日隂鬱蒸還復似梅霖常疑兵結蚩尤祲猶喜刑清貫索沈借得一窗堆簡册浪憑三尺替山林方池不斷簷花滴欹枕中宵響玉琴夏旱奉詔餘杭疏決歸上封事桑林忱禱極焦勞奉詔寬刑輟省曹玉食不怡先損已璇穹何忍尚屯膏運河今乃通車轍眢井誰能舉桔橰飽食太倉心自愧封章不隔九天髙久旱禱雨羅仙有應使君再賦索和未饒風伯怒吹雲且為仙翁薦寶熏光奪鍾山耕父室令傳古道阿香墳流膏泫泫溝塍溢喜氣酣酣麴糵醺太守同憂亦同樂兵厨餘瀝不難分禱雨有應和郡廣文希白韻金氣胚渾火尚流亢陽漸已裂龜疇沛然一雨酬精禱暫與羣黎緩隱憂千里耕桑猶樂土三邊鼙鼓又防秋白頭底是寬間日欵段令人羡少遊郡以閔雨勞民曹顔若春有禱於仰山塔誠念感格甘澤隨應辱教佳製借韻以謝鵲尾爐香半未灰古潭瞥地撼風雷單車陟降固勞止萬壑喧豗亦壯哉高廪正須端策驗應門已報送詩來憂時更願人才富重與南山詠有臺題射洪顯惠廟余以邊事有禱得籖今朝好晴景久雨不妨農靈皇夙嗜祗江山卜宅煙霞縹眇間帶水淨涵青黤黮畫屏中嵌玉孱顔耽耽洞府自宮闕裊裊天風來佩環一炷爐煙通肸蠁願開晴景遍人間再遊鳳凰山寺嘉定辛巳冬十一月南海崔尚書自成都帥攝行宣威府事余同於潛洪舜俞以掌記從一宿鳳凰山寺後十二年鄉先生內翰侍郎隴西公以制置使自左綿進治小益復以幕介陪後乘瓣香再為定慧大士祈印證許刻像為全坤銷釀兵劫留館方丈借熙寧詩將劉景文詩韻記事二首人生出處豈前謀嵗一星周再此遊世故鼎來憂似海壯心空在鬢先秋戎車擁路抽身去僧鉢分香勸我留擾擾戰爭何日定從前變滅幾浮漚西康州隔暮雲邊風去不來今幾年神眷此山良有以客行何恨獨澘然瑞圖那復來阿閣王澤何當復下泉定慧光中祈印證等慈心與佛齊肩已嘗早稻晚禾得雨亦驟長出城按行阡陌厯諸寺而還成七言二章歡謡千里慶西成小隊傳呼略按行雨足陳根重穎栗眼明多稼盡坻京靈君禪恱屏燔炙樂嵗人和喧送迎老守何功享成事祇憑一念輯和平稻壠楓林錦纈文秋郊樂事壓芳春為山谷訪竹尊者介衛公尋石丈人午暑緩觴休北寺夕曛趣駕度東津勝遊偶際文書暇一笑溪山面目親中秋節侍楊尚書待月南樓羽扇風清夙靄收元戎邀月上南樓卷回天外連宵雨借與人間一夕秋六合掃清知有待微雲點綴故宜休闌干直北頻搔首何限關山笛裏愁久雨快晴侍楊尚書燕鎮逺樓瘴雨彌旬快作晴小山香馥晚風清髙秋幕府間書檄落日江山擁斾旌形勢自應專一面關河猶未息交枰雅知牧御須才望盍早還朝洗甲兵和前送吳季永工侍韻二首寄宣城使君吳尚書叔永時季永尚留宣城郡齋對床有約二蘇公湖海何曾出處同得似公家情繾綣相看嵗晚樂沖融宛陵信是佳山水公館翛然若翠蓬吏散不妨談陸續是非馬耳射東風詞林巨擘久心降萬斛龍文隻手扛革履似因求見數朱衣暫隔引前雙明當歸闢翹材館想未能忘濯錦江剩向雲間籠白鶴他年携伴讀書窗嘉平八日禱雪崇福觀集霰隨車至晚大雪凡三日廣文邵文志喜賦詩勉和元韻集霰才隨紫馬回散花天已御風來塵寰瞥地開仙境和氣融春入酒杯寒沍潛消人物癘清吟肯傍簿書堆南枝陡覺精神别探借東皇信息催除夕立春送姪女歸句氏娣家兄弟甥姪皆會席上嵗除還有嵗更新華髮相看手足親千古風流企王謝兩家情味匹朱陳纒紅飲徹椒觴曉剪綵歡生綺席春瓜葛綢繆寧易有况兼樂事與良辰禱雪麻仙洞前立春一日湫壓縣境而雪霰已集連日六花呈瑞以元宵設供權父及士友皆賦詩二首和韻以謝駑怯深慙政理愆驕陽積擅北風權青鸞趣駕賓蒼皥白鳳先驅從列仙坯蟄夢驚離貝闕裂龜渴飲變瓊田空餐那有涓埃報只辦爐薰薦洞天陽烏且緩浴虞淵瑞白春花勝臘前臺笠看人爭播種扶犁撩我夢歸田千金何術能醫國十雨從今更問天暫駐飈遊須淨供元宵未暇寶燈燃觀壁間鄭宣威早春賞杏花之作司令洪丈命余即事用韻乍聽歸燕語窗櫳催放蓮燈萬炬紅掃盡妖氛春色外喚回和氣雨聲中時機翻覆須天定人事扶持願歲豐幕府賢勞愧羣彥吟詩留俟採民風再用前韻過雨麴塵繅淺緑倚風綬帶娜殷紅稍知春在酒深處尤覺日長書課中典記誤令參鄴下封囊也擬學新豐黃雲催熟崆洞麥破敵何須鶴唳風邑令招講上元故事與簿尉同賦二首星辨熒煌鼎足三河陽春意十分添和𠂻總是清時瑞令節應須樂事兼山徑晚陪瓊玉佩訟堂夜醉水晶簾羽書撤警年方熟賸折梅花插帽簷人情恱豫樂音諧新覺華譙氣象佳璧月輝輝三夕永榆星歷歷九霄排笙歌圍坐花如海殽核堆山酒若淮富貴方來付公等五雲深處豈無階借寓楊和王府秀芳空屋寬靜爽潔意甚樂之紅塵難得安棲處借屋三間委巷深地僻喜無車馬過官間不廢簡編尋傍牆幸有數竿竹護筍看成滿院隂須信市朝為大隱心無事纍即山林李德夫司理即永康官居闢小軒賦詩二首求京花和韻遣送老於俗嗜異酸鹹枯木無心倚碧巖花事因循渾漫與吟邊荒落幾曾芟似聞公館小軒闢遙揖靈峯萬石漸竹素堆床官事省燕梁日永語呢喃西洛風流壓衆芳十分國艷與天香護持翠幕千窠錦羞澀青銅兩鬢霜不怕眼花疑保福羅漢和尚一日同保福長慶三人見牡丹障子保福道好一朵花長慶云莫眠花羅漢云可惜許一朵花且將色相問空王書窗不要笙歌雜茗碗相娛味更長賀府尹董侍郎落成貢院縱壑潛蛟變化秋岷精表瑞協人謀萬間指顧璇杓運千柱穹窿玉斧修小試鳳樓心匠巧快看蟻陳戰功收向來三策天人學盍為諸生一點頭廣漠亭二首和陳憲益之舊韻吕汲公所創百乘去為天下宰暮年嶺瘴隔京都君看封禁嚴邊瑣力碎調停此範模赤舄儻來金鉉貴青衫依舊紙屏糊秦關北望煙雲渺何日重還舊地圖萬峯銀雪排天險千里封溝闢蜀都盡揖瀆靈趨几席始知國相妙規模心同典午深衣樂褊笑荆文紙閣糊元祐風流如可問羣賢登用是良圖陪憲節飲見易亭及萬里樓和韻二首郭洞春深物象妍得陪繡斧漾觥船連山􅍶崒簷楹外六畫分明几席前記就儘教騰紙價碑成還恐費松煙見易亭憲使新創并作碑記熟知邱壑饒心賞正未能忘賦下泉天宇修眉分外妍雷垣波靜穩行船向來蛟鰐驕無奈今日鳬鷖戲滿前爽氣逼人溥瑞露醉題眩眼爛非煙薄才羞與雲龍啜脫骨端須第一泉余為華陽尉三年事制置使𣙜牧都漕兩使者皆以文字辱知不盡責以吏也既滿戍擬濛陽丞歸親旁范使者為改注左綿學官瘧病再作未即就戍成二詩呈兄長及諸友錦江傲吏真癡絶公事無多日賦詩風月諱人貪捃拾煙霞痼我費醫治非關瘧鬼工為厲豈有詩人不耐飢三月不曾吟一句汗顔何以有毛錐挂笏西山興已濃蚌溪邀我採芙蓉客遊舊有詩盟在余冠嵗隨侍仲兄遍遊涪上十景皆有賦咏官冷新添野性慵世路今方悲梗塞家山暫許樂從容等間袖手棋枰外紫電中宵掣劒鋒和馮潔已節夜見過二首我生恨不際休嘉浩蕩憂思未有涯書劍伴人常作客氍毹暖夢暫還家葭灰漸喜回陽律麥隴時須潤雪花休沐許寬書檄繞靜中較似日長些破悶孤斟莫厭深風箏時為送清音平生遇境無餘戀令節因君忽愴心梅角吹殘愁不寐栁枝放去杳難尋蛾眉列屋功成後未用凄涼學越吟載酒泛芙蓉溪遊富樂伯用再和前韻牽課同作霸氣凄涼憶豫州薜蘿掩映小山幽不知今古幾枰誤空使英雄兩淚流借問長槍威塞外何如短棹老滄洲臨分更隔芙蓉語投贈慙無玉可舟江漲有感余歸期尚緩於黃池度嵗賦絶句云趁取青梅煮酒時意謂必可及此時歸家矣沙津留滯半月入峽後江漲為阻日不行二三十里自離古渝以後雖抵家不逺而約日尚賖沿江荔子爛熟見之有感惆悵天涯私自憐錦囊有句愧重編忍心寬作青梅約眩眼俄驚丹荔燃浩蕩修途今幾驛紛紜歸思日如年不因煤穎相料平理何以遣懷風月前買舟至崖祀陸使君水曹羈我窘于囚貸與潼江一釣舟柂轉清灘微觱沸棹移曲巷且夷猶偶因𣟵岸穿沙徑絶愛寒煙簇晚洲明日玉屏重覩面九歌待續水安流
