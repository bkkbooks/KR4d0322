body:
  text: 滄洲塵缶編卷十三宋程公許撰記寶慶府改建設㕔記皇帝御極之明年紀年寶慶制詔在昔潛躍之地命有司搜典故以聞邵陽郡得以寶慶名其府後二十二年升為軍節度至是長沙趙侯由著作郎兼户部郎官參江淮督視軍馬行府幕議未及期以親老丐便郡上俞其請若曰邵距京僻且逺爾父母國之比鄰也其往為朕撫循其旄倪州境介潭衡控湖右地磽産薄民魯而勤穡事士願而無異習侯審其易理始至諏咨利病簡節條目待之猶父兄之於子弟令行化洽人喻其心賦輸以時庭無留訟公暇周覽官寺位置卑狹率不中程度而黃堂為甚丹堊漫漶搘拄欹傾楹柱蠧敗過者怵惕若將壓焉侯愕曰郡由偏壘升節鎮而饗軍之堂圮敝若此將何以飭侯度肅視瞻於吏民吾將擴大而更張之合二邑嵗入供上送使具有彞制而留州之數殆無以給用度前此堂寢之加葺園池之茍有不亦艱乎哉吾聞之廉可以律衆勤可以集事儉可以無煩於民矧吾州阻山為國非通都大邑車馬馳騖之衝非公燕庖厨經旬朔閴無㸑烟約已節用是究是圖庶克有濟謀之掾屬信期㑹核登耗節浮冗苞苴不以交鄰無名錢不入私府日積月纍期嵗而帑藏之儲有羡乃度面勢拓其尺度悉撤而更新之以廣壯革隘陋以輪奐易腐撓堅密宏巨可支久逺即此宣布條教延接寮吏平理訟訴及大賓客大宴饗始足以嚴等威之辨備禮樂之容問梓匠奚所取則選衆以募之浙右問章箇奚自致則計直以貨之士民胥吏以稽簿書營卒以供役使費錢米以緡計一萬有竒以斛計七百有竒司理參軍眉山楊辰應蒞其事肅賔有館司饔有所以次繕治皆底於成惟麗譙及軍資公使常平等庫方將以餘力撤而新之侯以內艱不克受代解印組去參佐相與謀曰侯之牧州也焦思以軫民瘼嗇已以裕公儲更造斯堂匪事遊覽將礱石求記於舊同朝程子而侯也棘心之疾方新士曹於程子有葭莩契侯意所屬盍介以請伻來以圖義不可郤聞之春秋之書新作譏不時也是役也僝工己酉之冬竣事庚戌之秋易故為新而不奪農時不傷民力刻辭紀事可無愧侯名􅙫字希周擢嘉熙戊戌進士第三人第文學行誼蔚然為時聞人乘一障萬山中治行焯焯若此一堂之建未足展才而營建顛末弗可以弗志也乃大書而夀之石俾來者有考淳祐十有一年龍集辛亥夏四月吉日中大夫寶章閣待制新知婺州軍事兼管內勸農營田使眉山縣開國子食邑五百户賜紫金魚袋程公許纂朝請郎荆湖南路提㸃刑獄公事髙斯得書并篆額序周鑑序昔者孟軻氏嘗述夫子之言曰王者之迹熄而詩亡詩亡然後春秋作晉之乘楚之檮杌魯之春秋一也蓋列國皆有史官周天王為天下共主禮樂征伐所自出焉得獨無紀載歟周禮春官之屬有外史掌書外令掌四方之志掌三王五帝之書此即周史官之職也墳典達之四方人人得以誦讀故能長存於世周史不知何自散逸幾與晉乘楚搗杌偕泯沒而無聞甚可惜也猶幸魯史經聖人筆削得與易詩書二禮並傳年月日之間加一王字所以示賞罰豫奪非周天子不得專名曰魯史實周史也書法謹嚴賴左氏傳旁採列國史詳記其事使後世沿事以求經不為無補然周自后稷基王業至文王受命作周武王克殷以有天下成康以守成繼統宣王以勵精中興平王東遷訖於季末歷三十四世享祚八百六十七年其間理亂得失散見於詩書六典大小戴記諸子百家之文可為萬世鑑者莫容勝紀惜未有博採精擇輯為一書以補墜典翼聖經者豈一代謨訓闡揚固有其時耶吾友宋輝彥祥幼嗜古及壯自知命不偶時棄去科舉鋭精典籍創義例著成周鑑一書因系序之後先托經傳之紀述研核同異斷以己見積二十年薈萃之功始克脫藁蜀罹敵難彥祥避地峩眉山中寢食與俱間關出峽届洪都探篋校所亡失借屋蕭寺杜門省記久之而成全書余時以少蓬直西掖移檄江右俾索本上祕府有司視為迂緩弗之省㑹出守宜春招彥祥館郡齊為裒札翰集小史抄録移書達之部使者江公子逺子逺嘉賞欲轉以上聞留備乙覽亡幾罷去彥祥以余悉其論著之苦丐為序引記以永其傳竊惟三代有道之長周為盛此無他仁之涵養也厚禮之維持也固而已行葦之序以仁及草木或以福祿言王通氏亦云周禮其敬天命茲其證也誠使文武成康之後子孫繩繩世守勿墮則召旻之詩安得隱然以池之竭矣不云自頻為刺而天下蕩蕩無綱紀文章衛武公寧遽為之戚嗟乎以古為鑑可知興替彥祥此書之作所以為萬世有天下者之戒意甚切也成周逺矣即是編求之一得一失一理一亂如鑑對形萬古猶目前也彥祥眉山人先考君擢慶元丙辰鄒某榜進士第以文墨議論推重搢紳彥祥與兄光載熟聞過庭之訓常以所學質疑於鄉長老雁湖恱齊二李先生源委濬深其得之父師者蓋有自云淳祐四年嵗在甲辰良月五日同郡程某序送軍器監丞秦侯入覲序安嶽秦侯以儒學起家為二千石其為人碩大頎整器識稱之文章自作一家體不為陳言理體密察而本以寬恕由銅梁更巴郡所至籍籍有治行㑹西垂連年用師武備單弱敵兵坌入天漢三泉武休潰卒相挻為變侯以偏壘遏其鴟張列柵近郊意有憚而不敢肆逡巡引郤騖入他境武不足以折其暴誠不足以戢其偷燎原炎炎寢不可遏閬果遂之民其孰不以巴民為天幸而恨秦侯之施局於千里也㑹有詔起節度使儀同安公于家授鉞專征督諸將合圍進擊不淹月妖腰亂領併膏鈇鑕幕府上功簿安公愀然變色曰爪牙之衛而腹心之梗赤子於昔而蟊賊於今是孰使之然哉有告於公方變作之初秦侯嘗有意於招降之策矣人情不大相逺捨逆為順不過翻覆手間斯策果行禍不若是慘也既往何咎方來可圖世故多端人物滋眇有才若此不以白之吾君公之天下而私以為賔介之選於心獨無愧歟飛章籲天上頷其奏詔以軍器監丞入覲士大夫交手相慶不但為秦侯一吐氣抑亦幸公道之獲伸而蜀産之不遂終棄也重南輕壯昔人有逺識謂為分裂之萌邇年以來廟堂意忽遐外士之進用者落落如辰星不能獨當東南一郡憤氣鬱積天用疾威假時運之搶攘彰才具於艱棘而侯也首以瑰望為蜀士召用之倡秋濤噴薄鼓枻東去延頸乎登仙之慕拜手乎三接之禱愛人以德者所不當爾耶公許嘗拜侯於成都再侍於武信望其容毅而溫接其詞莊而裕退而欿然若有失已而充然如有得夫遇合之難自昔為病或失之於交臂或迷之於目睫然世固有一言之契不由紹介而意氣相許者殆天授非人合也未同而言古訓所戒然後學所以事長者不當援此以自晦敢誦所聞請於侯侯其許之乎西南一面幸奪命於蛟涎改絃更張未可中輟事有可否見有異同裁之以公雖怫何病然上流之託以今揆昔其難百倍若非公朝推誠委任使得以展布四體即諸葛復生亦無所措手昔威愍宗公留守東京經理有緒異議中沮憤不得伸遂使王業偏安中原淪沒遺恨千古言之痛心愚以為今日所當鑒殘敵窮蹙相挻為變兩河山東雄傑環起兵交始此憂端日滋蜀自古以陸海擅名以天險立國今財殫兵弱險為虛設變故繼扇人心易搖所當中外一心上下併力往復可否協濟艱難如韓范以西事並命宣威陜西河東之時范議增兵韓與之異杜富當國主韓抑范而范意亦不以為忤也愚以為今日所當法侯以儉府元僚入為中都官面對宸扆退謁宰相於政事堂安知不以西事咨焉從容敷陳所以沃帝心贊朝算者取之胸腹如繭抽絲緯文經武何適非用蜀父母邦也言之可不盡乎公許少讀書知所趨向見有抱才藴識可期以古人者私竊企慕恨不為之執鞭聞之伯修張君嘗辱侯之譽以齒牙也於其行義不可以無贈詩不云乎我儀圖之愛莫助之請書以為送侯之序送果州使君楊文叔赴召序公許童丱粗省事侍儒林文人評當代人物聞有古遺直曰老圃楊先生學粹行芳日光玉潔拱手問姓字不覺神悚形肅私願為之執鞭而生晚無由窺牆仞常怏怏為終身恨嘉泰癸亥始識今果州太守楊徵君於左綿郡泮知其為老圃之嫡子竊自以心語口此生何幸得端士為楷模而後喜可知也流風不競以多自證以同自慰求如徵君父子一家後先相望譬之朱絃疏越清廟之遺音天球粹溫有國之鎮瑞俗眼之所眩而俚耳之所愕獨何怪歟老圃以直言擢上第以廉平稱吏師纍辭旌招持節建閫藹有聲聞晚節不樂通訊權幸白首卧家十餘年士論歸重以為范景仁劉器之一等人也徵君胚胎先烈正直强毅得於生知輔以趨庭義方之訓麗澤講習之功以名節行義為膏梁視軒冕金玉如塵土先皇帝在御宣威大臣露章薦於朝一再命召循牆固避㑹丹成鼎湖嗣聖訪落收攬耆舊協濟艱難以徵君為賢有詔趣召徴君躍然投袂而起吾黨之士一為公朝賀一為徴君疑公許曰不然凡出處去就何常惟適於義而已晨門之吏以知其不可而為之為夫子譏荷蕢之夫以有心哉擊磬乎為夫子疑二子勇於避世果於忘世者也聖人以利澤生民為心視天下無不可為之時而忍於避忍於忘之乎不寧惟是公山弗擾召佛肸召子皆欲往而子路不恱彼師友函丈薰而炙之如由也勇於義尚不能盡知聖人之心則亦無怪乎晨門荷蕢之流也已故曰夫召我者而豈徒哉如有用我者吾其為東周乎又曰吾豈匏瓜也哉焉能繫而不食徴君行矣士大夫風俗一壞於嘉泰開禧之學禁再壞於嘉定之更化三十年間方刓為圓剛揉而柔波蕩風靡拱視天下事變之極如大厦之仆風雨漏舟之沉江湖猶且委曲遮護相與誦歌談笑若無事時其間毅然有特操能以忠言讜論為國家扶綱常於綴旒續氣脉於沉痼屈指中外落落幾何人徴君行矣直已以信其道至誠以盡其言隂極而陽剝盡而復安知夫不能牖聖君於一聽聞之頃乎雖然磨而不磷涅而不緇惟至堅至白者能之堅白未至而欲嘗試於磨涅此滔滔者所以甘心乎磷緇而莫之悟也若徴君者其堅之至而白之至者歟昔逡巡而避今翻然而往徴君之於進退語默權衡之審矣道之行不行是則有命焉若徴君者其能磨而不磷涅而不緇也決矣先兄伯剛父仲遜父於徴君為同年生某疇昔又從徴君遊故其贈行請以聖門出處去就之大義為士大夫釋所疑他日持斯文以證當知老圃為有子而某為知言也寶慶元年九月日序送前益部漕寶謨寺丞范公赴召序始朝廷以江西范公戍安豐有異績擢守涪㑹尋改鎮嘉邸所至不待黔突至是持節將漕益部久駐踰六年中間以備禦奏功璽書加賜顯秩由中祕郎拜太府寺丞升寶謨閣恩寵赫奕同時乘軺車使西南者不逮也公感渥恩殫勞厥官久益不懈纍疏請代詞㫖懇切制詔入奏事公使蜀日久樂其風俗之媺教化之易以施也時其喜怒哀樂而調適之剔其螟蟊稂莠而扶植之故惠利之洽於民者深民愛之若父母誠心之孚於士大夫者一士大夫尊之若師保父母之顧復而師保之振德不虞一朝之舍我而惸惸其無依也是以驛召之始至也其君子抃手以相慶其小民蹙額以相告其抃手以相慶也幸其功之見知而公之所施者溥也其蹙額以相告也畏二天之奪去而蜀之所芘者遐也人情不大相逺或欣或戚無非發於誠而厚於公者有質於某曰子昔以文贄范公一見賞晤命掌記室旋擬為左綿文學掾削牘論薦游談引重公之門多士雲滃而子則薦臺之隗也於公之行也將何詞以寬其小人之戚又何說以答其君子之望某薰炙公道誼嵗月逺矣其明練靜密者不敢臆度論也其劬躬而惻民隱泛愛而别品流則未知與古人何如耳蜀自更多故利在齊民取無遺算行齎居送公疇昔軫如傷之視而汲汲乎一分之寬不啻已之饑渴入對便殿必能為上開陳圖所以利其後岷峨悽愴未嘗一息不在公思慮間而尚奚戚乎雖然寬小民之戚也易而答君子之望也難今中外事勢沸渭紛紜如杭漏舟涉大川海飈起濤洶莫知所屆而執事者未有深思碩畫為國家固基本排患難之道奏疏之傳四方類皆鈎托微細茍以塞責免咎豈朝廷之大獨無一士諤諤昌言者乎習俗弊其前名位怵其後自非秉志剛强其不淪胥以溺者鮮矣文正公先天下之憂而憂後天下之樂而樂以終其身忠文公十九疏請建儲卧家百日鬚髮為白此公之家法也大丈夫願忠於君不以官之崇卑二其志公由儒學超擢官不為卑矣榮晝日之三接效朝陽之一鳴茲非其時歟某受知於公也厚感恩於公也深而所以期於公也逺且大倚廬銜恤竊慕昔人上書時宰論天下事而聲迹冗賤瘖不敢吐夫善類不常有有則天下之責四面至矣此某所以妄臆其易者之無不言而期其難者之能盡言也憤悶感激因或者之問矢詞以答而書以為送行之序詩不云乎誰能烹魚溉之釡鬵誰將西歸懷之好音嘉定十七年二月日門人程某序送制置閣學侍郎崔公赴召序先是北敵乘勝奮長驅之師闖我三邊蜀口以不戒禍尤慘武休潰卒倒戈挻變既芟既夷民志未固上當寧太息亟命冬官侍郎五羊崔公以鈇鉞鎮益部入辭便殿玉音隱然蜀逺且陋民警於多難惟是吏治臧否邊防緩急合六十四郡咸汝咨公頓首奉詔即日戒途始公奮自孤逺遊膠庠擢名第以清忠端亮為廟堂簡注立功立事藹有聲實龜鶴萬里未至而人已孚入境下車刑賞信必官祗厥事民無惰遊軍律以修吏姦以戢未期年治成制定㑹旬宣虛位公以便宜密㫖往蒞其軍旋有詔由候對升雜學士真除四川制置使邊不撤戍至是五年矣將驕卒惰怯戰而怙亂重以士大夫溺心功利之說不奪不厭民病警警訴天靡所公疇昔軫念於斯牽掣而莫得伸者一朝如轉圜石於千仞之山決積水於千丈之堤民氣太和無憤不泄易諸將搜練卒乘號令風采能使人畏而愛之某幸甚辱公深知於入蜀問士之初十乘啓行命執鉛槧從賔客後侍言笑於碧油之幕凡六閲月握吐接士則姬公旦夙夜匪懈則仲山甫諸葛亮之公道范孟博之清德羊叔子之方略凡異時想像於簡冊者幸薰而炙之請别轅門歸遭酷罰伏苴絰以奉喪葬尚公之德宇焉依郵音飛傳上有閔勞賜環之詔搢紳戀嫪介胄愕顧賈議於途農蹙於畝昔公未來有銜莫吐公既來止如病得愈天胡忍此奪我慈母客有聞而諗之曰國家南渡今茲百年中原瓜分敵亡無日銀夏諸部不可以為援山東新附尤難於堅凝師老力殫隱憂轇轕此固不待智者而後知也況中外寒心於國本而儲極未正尚不能無疑於憂國者之懷論人才則軟熟者容鯁直者斥天下大勢危若綴旒而士大夫恬不知畏得如公數十輩坐廟堂主國論庶乎其砭針於斯世奚西南一隅獨能私其利哉聞者愀然變乎色曰子之言諒矣雖然公之未專事任於全蜀也將佐之能否無所辨卒伍之功罪無所别户籍檢括鹽酒規贏營田屯田騷然椎剝威假於狐鼠冠竊於沐猴公之開府也髮櫛而苗薅之事聞於朝久乃不決夫去數汙吏難若拔山於公心寧不拂鬱於此使公而入贊樞軸吾知其決不能模棱兩端容容以取厚福也審矣客聞斯言疑以質於某曰子獲私於崔公盍為訂其說某竊嘗聞之孟子夫天未欲平治天下也如欲平治天下當今之世舍我其誰也蓋時運有興替吾道有汙隆謂之命直道而行不可枉者謂之義君子信其在已惟義之從君子不謂命也公之心若權衡因物以見輕重不能為物作輕重彼黷貨讎民而莫知夫禍人刑之可畏者公固因民之怒執而付之有司矣網漏吞舟則有任其責者公心其何慊歟天祐國家錫公以康寧夀考使之儀刑百揆宰制六合則凡志士仁人為吾君癙思而不得釋者吾將有望矣詩不云乎籊籊竹竿以釣于淇豈不邇思逺莫致之某素韠端憂聞公之去不得再拜以别懷恩未報望逺悽斷搔首秋風渺不知再侍之何日也嘉定十七年二月日門人程某拜手謹序送新懷安使君度侯西歸成都序浩齊先生楊公為益部詳刑使者忠厚欽恤事存大體公退引賔客人士與之講學漢嘉舊𨽻臺治郡丞合陽度侯與公為師友每請見談經析理往往卜夜不能罷官滿當代上命為金堂守未及瓜為楊公留七閲月江風清暑扁舟至成都士與民咸惜其去客有聞而諗之曰地方千里齒民版者不啻數萬丞二郡政事任之專非牧守比度侯何以得此於民也曰不然今薦紳之論鮮不曰為州縣之難而為州縣之難不若為民之難男耕女絲應縣官之須日不遑給憔悴困苦未有甚於此時而為之上者方且掌握三尺假公以濟其私一有怨嗟又從而讐之曰是有分焉如之何其不使民厲且戚也侯之丞吾州也亦豈家至户到人人恱之耶寬大樂易凡前後守將以慘毒為能侯從容贊決隂以義理化其悍强使之感愧而無所肆如斯而已矣余聞之憮然昔明道先生所居官每書視民如傷一語於左右常恐其行之有愧士大夫茍能一日用其力於斯則所謂若保赤子心誠求之雖不中不逺矣者其慈愛之實固非外鑠而强為之也侯自蚤嵗讀伊洛書有所省入齎糧萬里請問於晦翁先生得求放心之一言由是而後充其所知體驗力行覃思不舍今德益懋行益粹而欿然於懷玩索講求無一息之間斷自其與楊公游也志合道同神㑹心契其於一事一理格之至而發之審譬之水盈科而進燈加膏而光固亦理之常北風驛騷機不容髮懲羮吹虀之論滔滔滿天下而嫠緯隱憂則有大可寒心者愚以謂今日扶持國家之本在得民心得民心有道在革士大夫之心士大夫之心之蠧也甚矣誠使知味乎講學之樂致察乎義利之分移愛子孫之心以愛民推為己之念以為國天下之事奚足慮哉以侯之博大純實其欲已立而立人已達而達人蓋自以聖學為重任聲名暴白當有引類而進之者行將去是而羽儀天朝願有以告於吾君起民病於沈痼導人心於公直夀國脉於無窮事在今日如拯溺救焚不可緩矣公許不敏承學於楊公之門且幸朝夕辱從侯游不鄙其陋以為可教演充養之義為之銘坐右觀省敢不求所以克私補過重拜侯賜詩云心乎愛矣遐不謂矣中心藏之何日忘之於其行請誦斯語為序以别嘉定八年六月庚子眉山程某謹序送江油使君司令洪公赴召四川制屬項公入候班引序璧瓚瑚璉輝煌乎宗廟之美杞梓楩楠委輸乎匠石之門國有巨人焉其寶器之府而異材之藪歟五羊崔先生之鎮蜀也其賔介皆一時選曰於潛洪公宣城孫公括蒼季公後一年而永嘉項公始至先生清峻威重居今行古劬躬而務博施密察而崇大體其為文章尤精徑雅健搢紳大夫造其門踧踖悸悼斤輟於手絃縮於袖而四君子者從之游獨久而不渝大率人奮所長畢知無隱而言行皆以先生為凖的故能情親若父子義重若師友殆天作之合非茍然也公許蜀之鄙人不自意一言之孚攜手而升之堂上退得與四君子者相周旋雜蒹葭於琬琰之林藝艾蕭於蘭茝之徑光采之所照耀芬馨之所薰襲縱未能化而同退而察其私則亦幸而不為善類之棄也先生匪躬盡瘁拯蜀民於險厄至是三年餘矣治定制成奉詔入覲洪公守江油期月同賜命召而項公亦以通籍入侍班引舟自嘉陵銜尾下三峽獨孫季二君子以官守宿留未即去搴芳杜若之浦排雲蒼龍之闕志同而氣合蔚相扶而炳相輝鴛鷺歸仙仗之詩彰義主賔未得專媺於前也公許孤苦病羸壯志銷蝕千金敝帚拜貺於先生者厚矣游談引重曷敢復以纍諸君子嘗竊自念洪公下筆妙天下而屈與商論項公溫雅有檢柙而辱為同年親喪未除銜恤丘隴離羣索居之感安得而默耶太史公有言曰同明相照同類相求閭巷之人欲砥行立名非附青雲之士惡能施於後世諸君子得先生而事之終身其為名也逺矣君子疾沒世而名不稱驥尾蒼蠅千里可致先生抑有意乎願從諸君子證之北巖序徽學尚書𢎞農公授鉞鎮瀘以無事治暇日領客北巖憑髙四顧景與心㑹乃即仁祠之舊創為禪林左有五峯連娟競秀作書院其下以來四方之游學者追漢忠武侯遺志為北定堂因山之崇卑搜竒抉勝壓以小亭危榭覆苫鱗瓦簡朴幽雅而曠如奧如之境皆擅其妙公許晉謁節下一再侍杖屨相徉觀覽每欲選義考辭有所紀述而文不逮意間得數語隨筆抄記歸舟容與乃能編綴為北巖二十詠思荒語澀無以摹繪勝槩庶幾萬一託不朽於名世如太虛賦黃樓云寶慶嵗丁亥重陽節前四日門人程某拜手謹序送胡侊子仁序杜少陵﨑嶇戈㦸間轉徙巴蜀簡成華諸子詩自訴其飢餓彌旬敝衣百結空堂日晚吞聲灑淚厄窮亦甚矣賴嚴中丞為結屋浣花溪上舉家始有棲託盧玉川洛師破屋數間怪辭驚衆韓吏侍時為河南令愧鄰僧之送米捐餘俸以助其祭祀自昔騷人墨客類皆拙於謀生而巨公達官則不以傾身下士為憚風流相尚千載猶可想見其髙致也金華胡君子仁雋永書傳嘗以多聞自列落落不偶則退而殫思於詩詩益工而家益貧西山鶴山二君子盛稱道之負笈京都以明道明經明學三論進闕下不報朝紳髙其義為白大尹延致三賢堂戊戌七月颶風大作蘇堤之栁拔者十之三四有司規以為薪給酒人之須子仁曰不可此蘇公手植愛其人而思其樹忍加之斧斤乎家餘良田二十畝走僕鬻於鄉之大姓得錢緡課丁夫盡舉而築之緑隂界湖還復舊觀身之寒餓不遑恤而懇懇乎惟蘇公茇憩之是謀人之迂子仁者衆矣子仁方且移胡床嘯歌於清䕃之下攬湖山穠秀於几席間休休自得不知其為迂也藥房荷屋蓀壁辛楣三賢之與儕而風月之與鄰子仁之取於世也能幾何而尚不容一朝寧其居嗚呼嚴中丞韓吏侍代豈無其人哉子仁之游道甚廣凡今之大夫士以勳業聲名暴天下者半為子仁之知已子仁奚旅瑣之病而不即以謀之乎子仁行矣鼴鼠之腹奚耗乎河流鷦鷯之巢奚侵乎喬木然而湖漘三間之茅以燕以處於子仁不啻足矣衡門之下可以棲遲泌之洋洋可以樂饑載歌此章豫為子仁賀厦送道傳姪補中國學序吾姪道傳父以詞賦試中紹定元年類省附試待補生理舟入膠庠期以名業自奮先是道傳父之母太孺人孫氏歸我從兄貢士希文期年而嫠居矢死靡他父母不能奪道傳父自近屬入繼鞠育教誨以克有立郡太守髙其節義表聞於朝前後三奏始有㫖命州縣長吏旌其門閭適道傳父補中當理舟東征宗族鄉黨榮之維聖朝表節義以勸風俗雖著在令甲而䝉被渥惠者實為希闊之遭太孺人躬其艱而食其報可無愧道傳父謹佩慈訓篤志修名期無忝於所後斯可尚已膠庠英俊之藪上國衣冠之㑹道傳父自遐逺遊其間所見者大所交者廣氣當益充學當益進文當益工令聞廣譽歸恱其親科級之華抑又其次也道傳父立志甚𢎞不以已之一得為矜而惟以親之節義顯著為喜方將移孝於忠精行藝以答聖天子教育造物當有以相其逺者大者於其行贈以詩而冠之以序
